openapi: 3.1.0
info:
  title: INHERIT Reference REST API
  version: 1.0.0
  description: |
    Reference CRUD REST API for the INHERIT open estate data standard.
    This API provides estate lifecycle management — create, read, update,
    delete, import, export, and companion linking — built on top of the
    INHERIT JSON Schema bundle.

    For the schema bundle and validation endpoint, see openapi.yaml.
    For the full specification, visit https://openinherit.org
  license:
    name: Apache 2.0
    identifier: Apache-2.0
  contact:
    name: OpenInherit
    url: https://openinherit.org
    email: hello@openinherit.org
servers:
  - url: https://api.example.com/v1
    description: Reference implementation server
security:
  - bearerAuth: []
tags:
  - name: Estates
    description: Estate lifecycle management
  - name: People
    description: People within an estate
  - name: Relationships
    description: Relationships between people in an estate
  - name: Kinships
    description: Legal kinship records within an estate
  - name: Properties
    description: Real property held by an estate
  - name: Assets
    description: Financial and other assets held by an estate
  - name: Liabilities
    description: Liabilities and debts of an estate
  - name: Bequests
    description: Bequests and gifts made by the estate
  - name: Trusts
    description: Trusts established within an estate
  - name: Executors
    description: Executors appointed to administer an estate
  - name: Guardians
    description: Guardians appointed for dependants within an estate
  - name: Wishes
    description: Wishes and preferences recorded against an estate
  - name: Documents
    description: Legal and supporting documents attached to an estate
  - name: Attestations
    description: Attestations and witness records for an estate
  - name: NonprobateTransfers
    description: Nonprobate transfers associated with an estate
  - name: ProxyAuthorisations
    description: Proxy authorisations granted within an estate
  - name: DealerInterests
    description: Dealer and third-party interests registered against an estate
  - name: Import/Export
    description: Bulk import and export of complete INHERIT documents
  - name: Validation
    description: Progressive conformance validation of stored estates
  - name: Couples
    description: Companion estate linking for couples and household planning
paths:
  /estates:
    post:
      operationId: createEstate
      summary: Create a new estate
      description: |
        Creates a new estate record. The request body must conform to the
        INHERIT Estate schema. Returns the created estate with an ETag for
        optimistic concurrency control.
      tags:
        - Estates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/estate'
      responses:
        '201':
          description: Estate created successfully
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/estate'
        '400':
          $ref: '#/components/responses/ValidationError'
    get:
      operationId: listEstates
      summary: List estates
      description: |
        Returns a paginated list of estates visible to the authenticated caller.
        Supports cursor-based pagination and filtering by status and jurisdiction.
      tags:
        - Estates
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - name: status
          in: query
          description: Filter by estate status
          required: false
          schema:
            type: string
            enum:
              - draft
              - active
              - locked
              - archived
        - name: jurisdiction
          in: query
          description: Filter by jurisdiction code (ISO 3166-2)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of estates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEstateList'
  /estates/{estateId}:
    parameters:
      - $ref: '#/components/parameters/estateId'
    get:
      operationId: getEstate
      summary: Get a single estate
      description: Returns a single estate by its unique identifier.
      tags:
        - Estates
      responses:
        '200':
          description: Estate retrieved successfully
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/estate'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateEstate
      summary: Update an estate
      description: |
        Partially or fully updates an estate. Callers SHOULD supply an
        If-Match header containing the ETag from a previous GET or POST
        response to enable optimistic concurrency control. If the ETag does
        not match, a 412 Precondition Failed is returned.
      tags:
        - Estates
      parameters:
        - name: If-Match
          in: header
          description: ETag value from a previous response for optimistic concurrency control
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/estate'
      responses:
        '200':
          description: Estate updated successfully
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/estate'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          description: Precondition failed — ETag mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteEstate
      summary: Delete an estate
      description: Permanently deletes an estate and all its associated entities.
      tags:
        - Estates
      responses:
        '204':
          description: Estate deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
