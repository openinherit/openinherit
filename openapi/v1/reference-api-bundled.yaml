          content:
            application/json:
              schema:
                $ref: '#/components/schemas/person'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: replacePerson
      summary: Replace a person (full update)
      tags:
        - People
      parameters:
        - name: If-Match
          in: header
          required: false
          description: ETag value for optimistic concurrency control
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/person'
      responses:
        '200':
          description: Person replaced successfully
          headers:
            ETag:
