            - excellent
            - good
            - fair
            - poor
            - unknown
            - not_applicable
          $comment: Use 'not_applicable' for financial assets.
        quantity:
          type: integer
          minimum: 1
        location:
          type: string
          description: Where this asset is stored or held
        propertyId:
          type: string
