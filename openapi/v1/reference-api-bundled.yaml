    schema:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/schema.json
      $comment: '$ref resolution convention: all $ref paths are resolved relative to the schema''s $id URI, NOT filesystem paths. Core schemas use relative paths (e.g., ''common/money.json'' resolves to ''https://openinherit.org/v1/common/money.json''). Extension schemas use ''../common/money.json'' (resolves relative to their $id in the extensions/ directory). All schemas MUST be registered with the validator before $ref resolution will work.'
      title: INHERIT v1 Root Schema
      description: Root entry point for an INHERIT v1 estate data interchange document. Contains a single estate and arrays of all entity types.
      type: object
      properties:
        inherit:
          type: string
          const: https://openinherit.org/v1/schema.json
        version:
          type: integer
          const: 1
        exportedAt:
          type: string
          format: date
        exportedBy:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            organisationName:
              type: string
          additionalProperties: false
        generator:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            url:
              type: string
          required:
            - name
          additionalProperties: false
        estate:
          $ref: '#/components/schemas/estate'
        people:
          type: array
          items:
            $ref: '#/components/schemas/person'
        kinships:
          type: array
          items:
            $ref: '#/components/schemas/kinship'
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/relationship'
        properties:
          type: array
          items:
            $ref: '#/components/schemas/property'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/asset'
        liabilities:
          type: array
          items:
            $ref: '#/components/schemas/liability'
        bequests:
          type: array
          items:
            $ref: '#/components/schemas/bequest'
        trusts:
          type: array
          items:
            $ref: '#/components/schemas/trust'
        executors:
          type: array
          items:
            $ref: '#/components/schemas/executor'
        guardians:
          type: array
          items:
            $ref: '#/components/schemas/guardian'
        wishes:
          type: array
          items:
            $ref: '#/components/schemas/wish'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/document'
        nonprobateTransfers:
          type: array
          items:
            $ref: '#/components/schemas/nonprobate-transfer'
        proxyAuthorisations:
          type: array
          items:
            $ref: '#/components/schemas/proxy-authorisation'
        dealerInterests:
          type: array
          items:
            $ref: '#/components/schemas/dealer-interest'
        extensions:
          type: array
          items:
            type: string
          $comment: URIs of extension schemas applied to this document.
      required:
        - inherit
        - version
        - estate
        - people
        - kinships
        - relationships
        - properties
        - assets
        - liabilities
        - bequests
        - trusts
        - executors
        - guardians
        - wishes
        - documents
        - nonprobateTransfers
        - proxyAuthorisations
        - dealerInterests
      patternProperties:
        ^x-inherit-:
          $comment: Extension data blocks. Each can contain any structure incl. arrays. Extension schema validates.
      unevaluatedProperties: false
    ValidationResult:
      type: object
      required:
        - valid
        - conformanceLevel
        - errors
      properties:
        valid:
          type: boolean
        conformanceLevel:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
          description: |
            0 = Invalid, 1 = Schema Valid, 2 = Referentially Intact,
            3 = Jurisdiction Complete
        errors:
