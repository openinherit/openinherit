  /estates/{estateId}/export/json:
    parameters:
      - $ref: '#/components/parameters/estateId'
    post:
      operationId: exportEstateJson
      summary: Export estate as INHERIT JSON document
      description: |
        Returns a complete INHERIT root document containing all entities for the
        estate. The exportedAt, exportedBy, and generator fields are set by the
        server at the time of export.
      tags:
        - Import/Export
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportJsonRequest'
      responses:
        '200':
          description: INHERIT document exported successfully
          content:
            application/vnd.openinherit.v1+json:
              schema:
                $ref: '#/components/schemas/schema'
            application/json:
              schema:
                $ref: '#/components/schemas/schema'
        '404':
          $ref: '#/components/responses/NotFound'
  /estates/{estateId}/export/pdf:
    parameters:
      - $ref: '#/components/parameters/estateId'
    post:
      operationId: exportEstatePdf
      summary: Export estate as a PDF report
      description: |
        Renders a PDF report of the estate using the specified template.
        Three templates are available: full (for the testator), summary (for
        the family), and professional (for an estate planning professional).
      tags:
        - Import/Export
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportPdfRequest'
      responses:
        '200':
          description: PDF report generated successfully
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
  /estates/import:
    post:
      operationId: importEstate
      summary: Import an INHERIT JSON document as a new estate
      description: |
        Accepts a complete INHERIT JSON document and creates a new estate from it.
        Level 1 conformance is required for import to succeed. Levels 2–3
        produce non-fatal warnings included in the response.
      tags:
        - Import/Export
      requestBody:
        required: true
        content:
          application/vnd.openinherit.v1+json:
            schema:
              $ref: '#/components/schemas/schema'
          application/json:
            schema:
              $ref: '#/components/schemas/schema'
      responses:
        '201':
          description: Estate imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '400':
          $ref: '#/components/responses/ValidationError'
  /estates/{estateId}/validate:
    parameters:
      - $ref: '#/components/parameters/estateId'
    get:
      operationId: validateEstate
      summary: Validate a stored estate at all conformance levels
      description: |
        Validates the stored estate against all three INHERIT conformance levels
        progressively. Returns detailed validation results including the highest
        level achieved and any violations found at each level.
      tags:
        - Validation
      responses:
        '200':
          description: Validation result returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '404':
          $ref: '#/components/responses/NotFound'
  /estates/{estateId}/companion:
    parameters:
      - $ref: '#/components/parameters/estateId'
    post:
      operationId: linkCompanion
      summary: Link a companion estate
      description: |
        Links another estate as a companion to this one, typically used for
        couples where each partner has their own estate record. Both estates
        must exist and must not already be linked to a companion.
      tags:
        - Couples
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanionLink'
      responses:
        '200':
          description: Companion linked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/estate'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      operationId: getCompanion
      summary: Get the companion estate summary
      description: |
        Returns a summary of the estate linked as a companion to this one.
        Returns 404 if this estate has no companion linked.
      tags:
        - Couples
      responses:
        '200':
          description: Companion estate summary returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstateSummary'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: unlinkCompanion
      summary: Unlink the companion estate
      description: Removes the companion link between this estate and its companion.
      tags:
        - Couples
      responses:
        '204':
          description: Companion unlinked successfully
        '404':
          $ref: '#/components/responses/NotFound'
  /estates/{estateId}/summary:
    parameters:
      - $ref: '#/components/parameters/estateId'
    get:
      operationId: getEstateSummary
      summary: Get derived estate summary statistics
      description: |
        Returns derived statistics for the estate including entity counts,
        estimated values, conformance level, completeness indicators, and
        complexity indicators. Complexity data is used by the INHERIT matchmaker
        to assess suitability for estate planning professional referral.
      tags:
        - Estates
      responses:
        '200':
          description: Estate summary returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstateSummary'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by the INHERIT identity provider
  parameters:
    estateId:
      name: estateId
      in: path
      description: Unique identifier for the estate (UUID v4)
      required: true
      schema:
        type: string
        format: uuid
    cursor:
      name: cursor
      in: query
      description: Opaque cursor for pagination — use the value returned in the previous response
      required: false
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of items to return (1–100)
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: ESTATE_NOT_FOUND
            message:
              type: string
              description: Human-readable error description
              example: No estate found with the given identifier
            details:
              type: object
              description: Additional structured detail about the error
              additionalProperties: true
    PaginatedEstateList:
      type: object
      required:
        - items
        - hasMore
      properties:
        items:
          type: array
          description: Page of estate records
          items:
            $ref: '#/components/schemas/estate'
        cursor:
          type: string
          description: Opaque cursor to fetch the next page; absent when hasMore is false
        hasMore:
          type: boolean
          description: Whether further pages are available
    ImportResult:
      type: object
      required:
        - estateId
        - conformanceLevel
      properties:
        estateId:
          type: string
          format: uuid
          description: Identifier assigned to the newly imported estate
        conformanceLevel:
          type: integer
          enum:
            - 1
            - 2
            - 3
          description: |
            Highest conformance level achieved:
            1 = Schema Valid, 2 = Referentially Intact, 3 = Jurisdiction Complete
        warnings:
          type: array
          description: Non-fatal warnings produced during import
          items:
            type: string
        entitiesCreated:
          type: object
          description: Count of each entity type created during import
          properties:
            persons:
              type: integer
            relationships:
              type: integer
            kinships:
              type: integer
            properties:
              type: integer
            assets:
              type: integer
            liabilities:
              type: integer
            bequests:
              type: integer
            trusts:
              type: integer
            executors:
              type: integer
            guardians:
              type: integer
            wishes:
              type: integer
            documents:
              type: integer
            attestations:
              type: integer
            proxyAuthorisations:
              type: integer
            dealerInterests:
              type: integer
            nonprobateTransfers:
              type: integer
    ExportJsonRequest:
      type: object
      properties:
        includeExtensions:
          type: array
          description: List of extension identifiers to include in the export
          items:
            type: string
        conformanceLevel:
          type: integer
          enum:
            - 1
            - 2
            - 3
          description: Minimum conformance level required for export
    ExportPdfRequest:
      type: object
      required:
        - template
      properties:
        template:
          type: string
          enum:
            - full
            - summary
            - professional
          description: PDF template to use for rendering
        includeExtensions:
          type: array
          description: List of extension identifiers to include in the PDF
          items:
            type: string
        recipientName:
          type: string
          description: Name of the person receiving the PDF (used in the document header)
    CompanionLink:
      type: object
      required:
        - companionEstateId
      properties:
        companionEstateId:
          type: string
          format: uuid
          description: UUID of the estate to link as a companion (e.g. a spouse's estate)
    EstateSummary:
      type: object
      required:
        - estateId
        - status
        - jurisdiction
        - entityCounts
        - conformanceLevel
        - lastModifiedAt
      properties:
        estateId:
          type: string
          format: uuid
          description: Unique identifier for the estate
        status:
          type: string
          enum:
            - draft
            - active
            - locked
            - archived
          description: Current lifecycle status of the estate
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        entityCounts:
          type: object
          description: Count of each entity type present in the estate
          properties:
            persons:
              type: integer
            relationships:
              type: integer
            kinships:
              type: integer
            properties:
              type: integer
            assets:
              type: integer
            liabilities:
              type: integer
            bequests:
              type: integer
            trusts:
              type: integer
            executors:
              type: integer
            guardians:
              type: integer
            wishes:
              type: integer
            documents:
              type: integer
            attestations:
              type: integer
            proxyAuthorisations:
              type: integer
            dealerInterests:
              type: integer
            nonprobateTransfers:
              type: integer
        totalEstimatedValue:
          $ref: '#/components/schemas/money'
        totalLiabilities:
          $ref: '#/components/schemas/money'
        netEstimatedValue:
          $ref: '#/components/schemas/money'
        conformanceLevel:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
          description: |
            Current conformance level:
            0 = Not validated, 1 = Schema Valid,
            2 = Referentially Intact, 3 = Jurisdiction Complete
        completeness:
          type: object
          description: Key completeness indicators for the estate
          properties:
            hasWill:
              type: boolean
            hasExecutor:
              type: boolean
            hasGuardian:
              type: boolean
            hasAttestation:
              type: boolean
            allBequestsHaveBeneficiary:
              type: boolean
        complexityIndicators:
          type: object
          description: Indicators used to assess estate complexity
          properties:
            jurisdictionCount:
              type: integer
              description: Number of distinct jurisdictions involved
            hasTrusts:
              type: boolean
            hasForcedHeirship:
              type: boolean
            hasNonprobateTransfers:
              type: boolean
            hasCrossJurisdictionAssets:
              type: boolean
        lastModifiedAt:
          type: string
          format: date
          description: Date the estate was last modified (ISO 8601)
    attestation:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/attestation.json
      title: Attestation
      description: Will execution formalities. Standalone — reused by estate, codicils, trusts, extensions. Supports written (E&W Wills Act s.9), oral (Islamic/customary), seal-based (Japanese inkan), kinyan-based (Jewish).
      type: object
      properties:
        date:
          type: string
          format: date
        witnessPersonIds:
          type: array
          items:
            type: string
            format: uuid
        method:
          type: string
          enum:
            - in_person
            - video
            - remote
            - none
            - kinyan_sudar
            - kinyan_agav
            - seal_based
            - inkan_registered
        attestationType:
          type: string
          enum:
            - written_signed
            - oral_witnessed
            - oral_community
            - seal_based
        solicitorSupervised:
          type: boolean
        testatorSignedInPresenceOfWitnesses:
          type: boolean
          $comment: Wills Act 1837 s.9(c).
        witnessesSignedInPresenceOfTestator:
          type: boolean
          $comment: Wills Act 1837 s.9(d).
        witnessConflictCheck:
          type: boolean
        witnessConflictCheckScope:
          type: string
          enum:
            - english_law
            - halachic_broad
            - shariah_standard
            - civil_law_standard
            - customary_oral
            - community_testimony
        notes:
          type: string
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    jurisdiction:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/jurisdiction.json
      title: Jurisdiction
      description: A legal jurisdiction identified by ISO 3166 codes.
      type: object
      properties:
        country:
          type: string
          pattern: ^[A-Z]{2}$
          description: ISO 3166-1 alpha-2
        subdivision:
          type: string
          pattern: ^[A-Z]{2}-[A-Z0-9]{1,6}$
          $comment: ISO 3166-2. Most codes 2-3 chars; some historic codes longer.
          description: ISO 3166-2 subdivision code (e.g. GB-SCT, US-CA)
        legalSystem:
          type: string
          enum:
            - common_law
            - civil_law
            - mixed
            - religious
            - customary
            - religious_islamic
            - religious_jewish
            - religious_hindu
            - religious_canon
            - plural
          $comment: '''plural'' for dual civil/religious systems (Malaysia, Pakistan, Israel, Nigeria). Use ''religious_*'' when identifying a specific religious legal system as an adjudicating authority.'
        name:
          type: string
          description: Human-readable jurisdiction name (e.g. 'Scotland', 'California')
      required:
        - country
      additionalProperties: false
    money:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/money.json
      $comment: 'Consumers must look up the ISO 4217 exponent for the currency code. JPY/KRW: exponent 0 (amount IS face value). KWD/BHD/OMR: exponent 3. Most currencies: exponent 2.'
      title: Money
      description: Monetary value in integer minor currency units with ISO 4217 code. Never floating point.
      type: object
      properties:
        amount:
          type: integer
          description: Value in smallest currency unit (e.g. 32500 = £325.00)
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          description: ISO 4217 three-letter code
      required:
        - amount
        - currency
      additionalProperties: false
    TestamentaryCapacity:
      type: object
      properties:
        assessed:
          type: boolean
        assessmentDate:
          type: string
          format: date
        assessorName:
          type: string
        assessorRole:
          type: string
        capacityConfirmed:
          type: boolean
        goldenRuleComplied:
          type: boolean
          $comment: The 'golden rule' (Kenward v Adams [1975]) — elderly/seriously ill testators should have a medical practitioner assess capacity.
        notes:
          type: string
      additionalProperties: false
    Codicil:
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        description:
          type: string
        attestation:
          $ref: '#/components/schemas/attestation'
        documentId:
          type: string
          format: uuid
      required:
        - id
        - date
      additionalProperties: false
    ForcedHeirship:
      type: object
      properties:
        applies:
          type: boolean
        reservedPortion:
          type: number
          minimum: 0
          maximum: 100
        disposableQuota:
          type: number
          minimum: 0
          maximum: 100
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        claimNature:
          type: string
          enum:
            - property_share
            - cash_claim
            - usufruct
            - court_discretion
        calculationBasis:
          type: string
          enum:
            - fixed
            - per_child_sliding
            - court_discretion
            - conditional
        applicableTo:
          type: string
          enum:
            - children_only
            - children_and_spouse
            - all_descendants
            - all_heirs
        deferralRule:
          type: string
        effectiveDate:
          type: string
          format: date
          $comment: 'When these forced heirship rules took effect. Swiss 2023 reform: 2023-01-01.'
        reformVersion:
          type: string
          $comment: e.g., 'Swiss Code 2023 revision', 'French loi 2006-728'.
        notes:
          type: string
      additionalProperties: false
    AdjudicatingBody:
      type: object
      properties:
        type:
          type: string
          enum:
            - secular_court
            - religious_court
            - beth_din
            - shariah_court
            - tribal_court
            - family_court
            - family_council
            - community_elders
            - partition_meeting
            - karta_decision
            - maori_land_court
            - high_court
        name:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        caseReference:
          type: string
        authoritative:
          type: boolean
      required:
        - type
      additionalProperties: false
    ParallelDistribution:
      type: object
      properties:
        system:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        description:
          type: string
        notes:
          type: string
      required:
        - system
      additionalProperties: false
    ProbateGrant:
      type: object
      properties:
        grantType:
          type: string
        grantDate:
          type: string
          format: date
        grantReference:
          type: string
        issuingCourt:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        notes:
          type: string
      additionalProperties: false
    DeathRecord:
      type: object
      properties:
        dateOfDeath:
          type: string
          format: date
        placeOfDeath:
          type: string
        deathCertificateRef:
          type: string
        domicileAtDeath:
          $ref: '#/components/schemas/jurisdiction'
        notes:
          type: string
      additionalProperties: false
    SuccessionConflict:
      type: object
      properties:
        description:
          type: string
        systems:
          type: array
          items:
            type: string
        resolutionStatus:
          type: string
          enum:
            - unresolved
            - resolved
            - pending_court
            - pending_arbitration
        notes:
          type: string
      required:
        - description
      additionalProperties: false
    estate:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/estate.json
      title: Estate
      description: The root estate record — will, intestacy, or trust-based succession plan. Contains testator details, jurisdiction, will formalities, forced heirship, probate grants, death record, multi-jurisdiction administration, and tax treaty positions.
      type: object
      $defs:
        Codicil:
          type: object
          properties:
            id:
              type: string
              format: uuid
            date:
              type: string
              format: date
            description:
              type: string
            attestation:
              $ref: '#/components/schemas/attestation'
            documentId:
              type: string
              format: uuid
          required:
            - id
            - date
          additionalProperties: false
        TestamentaryCapacity:
          type: object
          properties:
            assessed:
              type: boolean
            assessmentDate:
              type: string
              format: date
            assessorName:
              type: string
            assessorRole:
              type: string
            capacityConfirmed:
              type: boolean
            goldenRuleComplied:
              type: boolean
              $comment: The 'golden rule' (Kenward v Adams [1975]) — elderly/seriously ill testators should have a medical practitioner assess capacity.
            notes:
              type: string
          additionalProperties: false
        ForcedHeirship:
          type: object
          properties:
            applies:
              type: boolean
            reservedPortion:
              type: number
              minimum: 0
              maximum: 100
            disposableQuota:
              type: number
              minimum: 0
              maximum: 100
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            claimNature:
              type: string
              enum:
                - property_share
                - cash_claim
                - usufruct
                - court_discretion
            calculationBasis:
              type: string
              enum:
                - fixed
                - per_child_sliding
                - court_discretion
                - conditional
            applicableTo:
              type: string
              enum:
                - children_only
                - children_and_spouse
                - all_descendants
                - all_heirs
            deferralRule:
              type: string
            effectiveDate:
              type: string
              format: date
              $comment: 'When these forced heirship rules took effect. Swiss 2023 reform: 2023-01-01.'
            reformVersion:
              type: string
              $comment: e.g., 'Swiss Code 2023 revision', 'French loi 2006-728'.
            notes:
              type: string
          additionalProperties: false
        AdjudicatingBody:
          type: object
          properties:
            type:
              type: string
              enum:
                - secular_court
                - religious_court
                - beth_din
                - shariah_court
                - tribal_court
                - family_court
                - family_council
                - community_elders
                - partition_meeting
                - karta_decision
                - maori_land_court
                - high_court
            name:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            caseReference:
              type: string
            authoritative:
              type: boolean
          required:
            - type
          additionalProperties: false
        ParallelDistribution:
          type: object
          properties:
            system:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            description:
              type: string
            notes:
              type: string
          required:
            - system
          additionalProperties: false
        ProbateGrant:
          type: object
          properties:
            grantType:
              type: string
            grantDate:
              type: string
              format: date
            grantReference:
              type: string
            issuingCourt:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          additionalProperties: false
        DeathRecord:
          type: object
          properties:
            dateOfDeath:
              type: string
              format: date
            placeOfDeath:
              type: string
            deathCertificateRef:
              type: string
            domicileAtDeath:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          additionalProperties: false
        SuccessionConflict:
          type: object
          properties:
            description:
              type: string
            systems:
              type: array
              items:
                type: string
            resolutionStatus:
              type: string
              enum:
                - unresolved
                - resolved
                - pending_court
                - pending_arbitration
            notes:
              type: string
          required:
            - description
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        testatorPersonId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - draft
            - active
            - locked
            - archived
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        willType:
          type: string
          enum:
            - secular
            - religious
            - dual
            - composite
            - oral_witnessed
            - oral_customary
            - holographic
            - notarised
            - privileged_will
        extensionWillType:
          type: string
          $comment: Non-core will types (e.g. jihi_shosho for Japanese holographic wills). Extension schemas validate.
        companionEstateId:
          type: string
          format: uuid
          $comment: For dual-system estates — links secular and religious estate records.
        primaryInstrument:
          type: string
          enum:
            - will
            - revocable_trust
            - both
            - intestacy
        defaultPropertyRegime:
          type: string
          enum:
            - community_property
            - separate_property
            - equitable_distribution
            - deferred_community
            - universal_community
            - participation_in_acquisitions
            - islamic_dower
        totalEstimatedValue:
          $ref: '#/components/schemas/money'
        attestation:
          $ref: '#/components/schemas/attestation'
        testamentaryCapacity:
          $ref: '#/components/schemas/TestamentaryCapacity'
        codicils:
          type: array
          items:
            $ref: '#/components/schemas/Codicil'
        revokesDocumentIds:
          type: array
          items:
            type: string
            format: uuid
        revocationClause:
          type: boolean
        forcedHeirship:
          $ref: '#/components/schemas/ForcedHeirship'
        adjudicatingBodies:
          type: array
          items:
            $ref: '#/components/schemas/AdjudicatingBody'
        parallelDistributions:
          type: array
          items:
            $ref: '#/components/schemas/ParallelDistribution'
        probateGrant:
          $ref: '#/components/schemas/ProbateGrant'
        deathRecord:
          $ref: '#/components/schemas/DeathRecord'
        successionConflicts:
          type: array
          items:
            $ref: '#/components/schemas/SuccessionConflict'
        choiceOfLaw:
          type: object
          $comment: Brussels IV Regulation choice of law. Allows EU nationals to choose their nationality's law for succession.
          properties:
            chosenLaw:
              $ref: '#/components/schemas/jurisdiction'
            basis:
              type: string
            documentRef:
              type: string
          additionalProperties: false
        electiveShareRight:
          type: object
          $comment: US — surviving spouse's right to elect against the will.
          properties:
            available:
              type: boolean
            electedAmount:
              $ref: '#/components/schemas/money'
            statute:
              type: string
            notes:
              type: string
          additionalProperties: false
        priorMatrimonialClaim:
          type: object
          properties:
            exists:
              type: boolean
            description:
              type: string
            claimantPersonId:
              type: string
              format: uuid
            notes:
              type: string
          additionalProperties: false
        noContestClause:
          type: object
          $comment: In terrorem clause — beneficiary forfeits gift if they challenge the will.
          properties:
            present:
              type: boolean
            enforceability:
              type: string
            notes:
              type: string
          additionalProperties: false
        pretermittedHeirClaims:
          type: array
          $comment: Claims by children born/adopted after the will was made.
          items:
            type: object
            properties:
              claimantPersonId:
                type: string
                format: uuid
              status:
                type: string
              notes:
                type: string
            additionalProperties: false
        testamentaryPromises:
          type: array
          $comment: NZ — claims under the Law Reform (Testamentary Promises) Act 1949.
          items:
            type: object
            properties:
              claimantPersonId:
                type: string
                format: uuid
              promiseDescription:
                type: string
              status:
                type: string
              notes:
                type: string
            additionalProperties: false
        judicialVariationPower:
          type: object
          $comment: UK/NZ — court power to vary a will under the Inheritance (Provision for Family and Dependants) Act 1975 or equivalent.
          properties:
            available:
              type: boolean
            statute:
              type: string
            notes:
              type: string
          additionalProperties: false
        commorientesRule:
          type: object
          $comment: Rule determining order of death when people die in the same event. Varies by jurisdiction.
          properties:
            applicable:
              type: boolean
            rule:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          additionalProperties: false
        ancillaryProbate:
          type: array
          $comment: Multi-jurisdiction estate administration. Each entry represents one jurisdiction's administration.
          items:
            type: object
            properties:
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              fiduciaryPersonId:
                type: string
                format: uuid
              status:
                type: string
                enum:
                  - not_started
                  - applied
                  - granted
                  - completed
                  - waived
              grantReference:
                type: string
              localCounsel:
                type: string
              notes:
                type: string
            required:
              - jurisdiction
            additionalProperties: false
        registrations:
          type: array
          $comment: Will registries worldwide (DIFC Wills Service Centre, UK Probate Registry, etc.).
          items:
            type: object
            properties:
              registry:
                type: string
              registrationNumber:
                type: string
              jurisdictionScope:
                type: string
              registrationDate:
                type: string
                format: date
            required:
              - registry
            additionalProperties: false
        reportingCurrency:
          type: string
          pattern: ^[A-Z]{3}$
          $comment: ISO 4217 currency for probate reporting.
        conversionRates:
          type: array
          $comment: Exchange rates used for estate valuation in cross-border estates.
          items:
            type: object
            properties:
              fromCurrency:
                type: string
                pattern: ^[A-Z]{3}$
              toCurrency:
                type: string
                pattern: ^[A-Z]{3}$
              rate:
                type: number
                exclusiveMinimum: 0
              rateDate:
                type: string
                format: date
              source:
                type: string
            required:
              - fromCurrency
              - toCurrency
              - rate
              - rateDate
            additionalProperties: false
        taxTreatyPositions:
          type: array
          $comment: Bilateral tax treaty claims relevant to the estate.
          items:
            type: object
            properties:
              treaty:
                type: string
              primaryTaxingJurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              claimedCredits:
                type: string
              relevantArticle:
                type: string
              notes:
                type: string
            required:
              - treaty
            additionalProperties: false
        suggestedPractitionerNeeds:
          type: array
          items:
            type: string
          $comment: Informational. Activity codes computed from estate complexity — e.g. trust_preparation, cross_border, iht_planning. Canonical taxonomy at openinherit.org/reference/practitioner-activities.json.
        createdAt:
          type: string
          format: date
        lastModifiedAt:
          type: string
          format: date
        notes:
          type: string
      required:
        - id
        - testatorPersonId
        - status
        - jurisdiction
        - createdAt
        - lastModifiedAt
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    address:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/address.json
      $comment: All fields optional. Supports Western, Japanese (reversed), Indian (landmark-based), African (informal) addressing. An empty object is valid — some jurisdictions have no formal address system.
      title: PostalAddress
      description: A physical address. Culturally neutral — supports any global addressing convention.
      type: object
      properties:
        streetAddress:
          type: string
          description: Street number and name
        addressLine2:
          type: string
          description: Flat, suite, building, floor
        addressLocality:
          type: string
          description: City, town, village, or ward
        addressRegion:
          type: string
          description: State, prefecture, province, county
        postalCode:
          type: string
        addressCountry:
          type: string
          pattern: ^[A-Z]{2}$
          description: ISO 3166-1 alpha-2
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        landmark:
          type: string
          $comment: Common in India, Nigeria, rural areas. 'Near Meenakshi Temple' or 'Behind Shoprite, Lekki Phase 1'.
        directionNotes:
          type: string
          $comment: Free-form directions when no formal address exists. Common in rural Africa, parts of India.
        addressOrder:
          type: string
          enum:
            - western
            - japanese
            - indian
            - arabic
            - custom
          $comment: japanese = country → prefecture → city → ward → block → building (reversed from Western). Determines display order.
      additionalProperties: false
    identifier:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/identifier.json
      title: Identifier
      description: A typed external identifier. Use 'system' to namespace (e.g. 'urn:hmrc:nino').
      type: object
      properties:
        system:
          type: string
          description: Namespace URI or name
        value:
          type: string
          description: The identifier value
        type:
          type: string
          description: Type label (e.g. 'passport', 'national_insurance', 'charity_number')
      required:
        - value
      additionalProperties: false
    person:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/person.json
      title: Person
      description: A person involved in the estate. Schema.org name alignment. Any Unicode script. Supports CJK phonetic readings, chieftaincy titles, clan/lineage identifiers, dual legal personalities, and tax residency across multiple jurisdictions.
      type: object
      properties:
        id:
          type: string
          format: uuid
        givenName:
          type: string
          minLength: 1
          description: 'First/given name (Schema.org: givenName)'
        familyName:
          type: string
          minLength: 1
          $comment: Optional — Tamil naming uses a single name. Systems must handle absent familyName.
          description: 'Last/family/surname (Schema.org: familyName)'
        additionalName:
          type: string
          description: 'Middle name(s) (Schema.org: additionalName)'
        preferredName:
          type: string
          description: Name the person prefers to be called
        phoneticReading:
          type: object
          $comment: 'Required for CJK names. Japanese: furigana/romaji. Chinese: pinyin. Korean: romanisation. Ensures names can be read by non-native systems.'
          properties:
            givenName:
              type: string
            familyName:
              type: string
            fullName:
              type: string
          minProperties: 1
          additionalProperties: false
        titles:
          type: array
          $comment: Chieftaincy titles (Nigerian), honorifics (Japanese), caste/clan titles (Indian), religious titles, academic degrees.
          items:
            type: object
            properties:
              title:
                type: string
              type:
                type: string
                enum:
                  - chieftaincy
                  - traditional
                  - religious
                  - professional
                  - honorific
                  - clan
                  - academic
                  - military
                  - other
            required:
              - title
            additionalProperties: false
        clanOrLineage:
          type: string
          $comment: Tribal clan, Indian gotra/caste, family lineage. Determines inheritance rights in customary/Hindu systems.
        dateOfBirth:
          type: string
          format: date
          description: ISO 8601 date of birth
        dateOfDeath:
          type: string
          format: date
          description: ISO 8601 date of death (if deceased)
        gender:
          type: string
          enum:
            - male
            - female
            - non_binary
            - other
            - prefer_not_to_say
            - unknown
          $comment: Optional but needed for gender-dependent inheritance (Islamic faraid, Hindu succession pre-2005). Halachic/Islamic gender categories available via x-inherit-* extensions.
        domicile:
          $ref: '#/components/schemas/jurisdiction'
          $comment: Domicile (not residence/nationality) determines succession law for moveables in conflict-of-laws. A British citizen domiciled in France has moveables governed by French forced heirship.
        roles:
          type: array
          items:
            type: string
            enum:
              - testator
              - beneficiary
              - executor
              - guardian
              - trustee
              - witness
              - attorney
              - proxy
              - protector
              - enforcer
          minItems: 1
          uniqueItems: true
          $comment: Core roles define the person's function in the estate. Extension-specific roles (bekhor, karta, okpara, mutawalli) should be added via x-inherit-* blocks alongside core roles. The array is intentionally extensible — a person can be both 'executor' (core) and 'karta' (x-inherit-india-hindu). Extensions should NOT attempt to add values to this enum.
        contact:
          type: object
          properties:
            email:
              type: string
              format: email
            phone:
              type: string
              description: Phone number (E.164 recommended)
            address:
              $ref: '#/components/schemas/address'
          additionalProperties: false
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/identifier'
          description: External identifiers (passport, national ID, etc.)
        ritualName:
          type: object
          $comment: 'Structured religious name. Hebrew: ''Dovid ben Avraham''. Arabic nasab: ''Ahmed ibn Muhammad''. Hindu: gotra + name. Used for halachic documents, Shariah court filings, religious ceremonies.'
          properties:
            name:
              type: string
              description: The full ritual/religious name
            patronymic:
              type: string
              description: Patronymic element (ben/bat, ibn/bint, etc.)
            nameSystem:
              type: string
              description: 'Naming tradition: hebrew, arabic_nasab, hindu, buddhist, etc.'
          required:
            - name
          additionalProperties: false
        legalPersonalities:
          type: array
          $comment: 'A person can have different legal identities across systems. Under statutory law: property owner. Under customary law: okpara (first son) with custodial authority. Under religious law: a Kohen.'
          items:
            type: object
            properties:
              system:
                type: string
                enum:
                  - statutory
                  - customary
                  - religious
                  - traditional
              role:
                type: string
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              notes:
                type: string
            required:
              - system
              - role
            additionalProperties: false
        taxResidency:
          type: array
          $comment: Tax residency in one or more jurisdictions. Handles FATCA (US), CRS, JP/US estate tax treaty, expat tax. A person may be tax-resident in multiple jurisdictions simultaneously.
          items:
            type: object
            properties:
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              taxpayerIdentifier:
                type: string
                $comment: SSN (US), TFN (AU), My Number (JP), NINO (UK)
