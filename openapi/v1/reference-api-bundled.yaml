            - social_media_account
            - digital_subscription
            - sukuk
            - takaful
            - islamic_deposit
            - other
          $comment: sukuk = Islamic bond. takaful = Islamic insurance. islamic_deposit = Shariah-compliant deposit.
        subcategory:
          type: string
        estimatedValue:
          $ref: '#/components/schemas/money'
        professionalValuation:
          $ref: '#/components/schemas/money'
        valuationDate:
          type: string
          format: date
        valuationConfidence:
          type: string
          enum:
            - estimated
            - professional
            - probate
            - unknown
        condition:
          type: string
