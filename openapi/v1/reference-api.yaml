            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/Person'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updatePerson
      summary: Partial update a person
      tags:
        - People
      parameters:
        - name: If-Match
          in: header
          required: false
          description: ETag value for optimistic concurrency control
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './openapi.yaml#/components/schemas/Person'
      responses:
        '200':
          description: Person updated successfully
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/Person'
        '400':
