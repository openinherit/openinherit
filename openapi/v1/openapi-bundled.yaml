          description: The offer amount in minor currency units.
        conditions:
          type: array
          items:
            type: string
          description: Conditions attached to the offer.
          examples:
            - - Subject to independent valuation
              - Conditional on vacant possession
        validUntil:
          type: string
          format: date
          description: Date the offer expires.
          examples:
            - '2025-12-31'
        offerDate:
          type: string
          format: date
          description: Date the offer was made.
          examples:
            - '2025-06-15'
        documentRef:
          type: string
          description: Reference to the document containing the offer.
          examples:
            - DOC-2025-OFFER-001
      additionalProperties: false
