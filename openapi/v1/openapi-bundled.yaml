openapi: 3.1.0
info:
  title: INHERIT — Open Estate Data Interchange Standard
  version: 1.0.0
  description: |
    INHERIT is an open data standard for estate planning information,
    supporting succession law across common law, civil law, Islamic,
    Jewish, Hindu, Japanese, and African customary legal traditions.

    This document serves two purposes:
    1. Schema bundle — all 36 JSON Schemas as OpenAPI components for
       TypeScript type generation, Zod schema generation, and SDK creation
    2. Validation endpoint — a reference endpoint for document validation

    For the full specification, visit https://openinherit.org
  license:
    name: Apache 2.0
    identifier: Apache-2.0
  contact:
    name: OpenInherit
    url: https://openinherit.org
    email: hello@openinherit.org
servers:
  - url: https://api.openinherit.org/v1
    description: Reference validation server
security: []
paths:
  /validate:
    post:
      operationId: validateDocument
      summary: Validate an INHERIT document
      description: |
        Accepts a complete INHERIT document and returns validation results
        at three conformance levels: Schema Valid, Referentially Intact,
        and Jurisdiction Complete.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/schema'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
components:
  schemas:
    InheritDocument:
      description: The top-level INHERIT document envelope
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/schema'
    Estate:
      description: The estate — links all entities together
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/estate'
    Person:
      description: Any person referenced in the estate
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/person'
    Relationship:
      description: Relationship between two people
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/relationship'
    Kinship:
      description: Family group structure
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/kinship'
    Property:
      description: Real property (land, buildings)
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/property'
    Asset:
      description: Non-property assets (bank accounts, investments, etc.)
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/asset'
    Liability:
      description: Debts, mortgages, loans
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/liability'
    Bequest:
      description: A gift in a will
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/bequest'
    Trust:
      description: Trust arrangements
      x-inherit-maturity: draft
      $ref: '#/components/schemas/trust'
    Executor:
      description: Named executor or administrator
      x-inherit-maturity: draft
      $ref: '#/components/schemas/executor'
    Guardian:
      description: Guardian appointment for minor children
      x-inherit-maturity: draft
      $ref: '#/components/schemas/guardian'
    Wish:
      description: Non-binding wishes (funeral, organ donation, etc.)
      x-inherit-maturity: draft
      $ref: '#/components/schemas/wish'
    Document:
      description: Legal documents (wills, codicils, powers of attorney)
      x-inherit-maturity: draft
      $ref: '#/components/schemas/document'
    Attestation:
      description: Witness attestation of a document
      x-inherit-maturity: draft
      $ref: '#/components/schemas/attestation'
    ProxyAuthorisation:
      description: Power of attorney or deputyship
      x-inherit-maturity: draft
      $ref: '#/components/schemas/proxy-authorisation'
    DealerInterest:
      description: Professional interest in the estate
      x-inherit-maturity: draft
      $ref: '#/components/schemas/dealer-interest'
    NonprobateTransfer:
      description: Assets that pass outside the will
      x-inherit-maturity: draft
      $ref: '#/components/schemas/nonprobate-transfer'
    Money:
      description: Monetary amounts (integer pennies + currency)
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/money'
    Address:
      description: Postal addresses
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/address'
    Jurisdiction:
      description: ISO 3166-2 jurisdiction codes
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/jurisdiction'
    Identifier:
      description: External identifiers (NI number, passport, etc.)
      x-inherit-maturity: candidate
      $ref: '#/components/schemas/identifier'
    TemporalRule:
      description: Time-bound legislation rules
      x-inherit-maturity: draft
      $ref: '#/components/schemas/temporal-rule'
    ExtensionUkEnglandWales:
      description: IHT thresholds, intestacy rules, IFPA 1975 for England & Wales
      x-inherit-maturity: draft
      $ref: '#/components/schemas/uk-england-wales'
    ExtensionUsEstate:
      description: US estate planning — community property, elective share, homestead
      x-inherit-maturity: draft
      $ref: '#/components/schemas/us-estate'
    ExtensionCanada:
      description: Canadian provincial succession rules
      x-inherit-maturity: draft
      $ref: '#/components/schemas/canada'
    ExtensionAustraliaNz:
      description: AU/NZ superannuation, family provision, Maori land
      x-inherit-maturity: draft
      $ref: '#/components/schemas/australia-nz'
    ExtensionEuSuccession:
      description: Brussels IV, European Certificate of Succession, forced heirship
      x-inherit-maturity: draft
      $ref: '#/components/schemas/eu-succession'
    ExtensionJapan:
      description: Japanese succession — koseki, iryubun, yōshi, isan bunkatsu
      x-inherit-maturity: draft
      $ref: '#/components/schemas/japan'
    ExtensionPrcChina:
      description: PRC succession — forced heirship, hukou, notarised certificates
      x-inherit-maturity: draft
      $ref: '#/components/schemas/prc-china'
    ExtensionSingaporeMalaysia:
      description: SG/MY — ISA, AMLA, CPF/EPF nominations, Distribution Act
      x-inherit-maturity: draft
      $ref: '#/components/schemas/singapore-malaysia'
    ExtensionLatinAmerica:
      description: Latin American succession — legítima, forced heirship, fourths system
      x-inherit-maturity: draft
      $ref: '#/components/schemas/latin-america'
    ExtensionIslamic:
      description: Faraid — fixed shares, residuary, awl/radd, wasiyya, waqf
      x-inherit-maturity: draft
      $ref: '#/components/schemas/islamic'
    ExtensionJewish:
      description: Halachic inheritance — bekhor, mezonot, kinyan
      x-inherit-maturity: draft
      $ref: '#/components/schemas/jewish'
    ExtensionIndiaHindu:
      description: Hindu succession — Mitakshara/Dayabhaga, HUF, stridhan
      x-inherit-maturity: draft
      $ref: '#/components/schemas/india-hindu'
    ExtensionAfricaCustomary:
      description: Customary succession — patrilineal/matrilineal, family council, lobola
      x-inherit-maturity: draft
      $ref: '#/components/schemas/africa-customary'
    ValidationResult:
      type: object
      required:
        - valid
        - conformanceLevel
        - errors
      properties:
        valid:
          type: boolean
        conformanceLevel:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
          description: |
            0 = Invalid, 1 = Schema Valid, 2 = Referentially Intact,
            3 = Jurisdiction Complete
        errors:
          type: array
          items:
            type: object
            required:
              - path
              - message
              - level
            properties:
              path:
                type: string
              message:
                type: string
              level:
                type: string
                enum:
                  - error
                  - warning
                  - info
    attestation:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/attestation.json
      title: Attestation
      description: Will execution formalities. Standalone — reused by estate, codicils, trusts, extensions. Supports written (E&W Wills Act s.9), oral (Islamic/customary), seal-based (Japanese inkan), kinyan-based (Jewish).
      type: object
      properties:
        date:
          type: string
          format: date
        witnessPersonIds:
          type: array
          items:
            type: string
            format: uuid
        method:
          type: string
          enum:
            - in_person
            - video
            - remote
            - none
            - kinyan_sudar
            - kinyan_agav
            - seal_based
            - inkan_registered
        attestationType:
          type: string
          enum:
            - written_signed
            - oral_witnessed
            - oral_community
            - seal_based
        solicitorSupervised:
          type: boolean
        testatorSignedInPresenceOfWitnesses:
          type: boolean
          $comment: Wills Act 1837 s.9(c).
        witnessesSignedInPresenceOfTestator:
          type: boolean
          $comment: Wills Act 1837 s.9(d).
        witnessConflictCheck:
          type: boolean
        witnessConflictCheckScope:
          type: string
          enum:
            - english_law
            - halachic_broad
            - shariah_standard
            - civil_law_standard
            - customary_oral
            - community_testimony
        notes:
          type: string
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    jurisdiction:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/jurisdiction.json
      title: Jurisdiction
      description: A legal jurisdiction identified by ISO 3166 codes.
      type: object
      properties:
        country:
          type: string
          pattern: ^[A-Z]{2}$
          description: ISO 3166-1 alpha-2
        subdivision:
          type: string
          pattern: ^[A-Z]{2}-[A-Z0-9]{1,6}$
          $comment: ISO 3166-2. Most codes 2-3 chars; some historic codes longer.
          description: ISO 3166-2 subdivision code (e.g. GB-SCT, US-CA)
        legalSystem:
          type: string
          enum:
            - common_law
            - civil_law
            - mixed
            - religious
            - customary
            - religious_islamic
            - religious_jewish
            - religious_hindu
            - religious_canon
            - plural
          $comment: '''plural'' for dual civil/religious systems (Malaysia, Pakistan, Israel, Nigeria). Use ''religious_*'' when identifying a specific religious legal system as an adjudicating authority.'
        name:
          type: string
          description: Human-readable jurisdiction name (e.g. 'Scotland', 'California')
      required:
        - country
      additionalProperties: false
    money:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/money.json
      $comment: 'Consumers must look up the ISO 4217 exponent for the currency code. JPY/KRW: exponent 0 (amount IS face value). KWD/BHD/OMR: exponent 3. Most currencies: exponent 2.'
      title: Money
      description: Monetary value in integer minor currency units with ISO 4217 code. Never floating point.
      type: object
      properties:
        amount:
          type: integer
          description: Value in smallest currency unit (e.g. 32500 = £325.00)
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          description: ISO 4217 three-letter code
      required:
        - amount
        - currency
      additionalProperties: false
    TestamentaryCapacity:
      type: object
      properties:
        assessed:
          type: boolean
        assessmentDate:
          type: string
          format: date
        assessorName:
          type: string
        assessorRole:
          type: string
        capacityConfirmed:
          type: boolean
        goldenRuleComplied:
          type: boolean
          $comment: The 'golden rule' (Kenward v Adams [1975]) — elderly/seriously ill testators should have a medical practitioner assess capacity.
        notes:
          type: string
      additionalProperties: false
    Codicil:
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        description:
          type: string
        attestation:
          $ref: '#/components/schemas/attestation'
        documentId:
          type: string
          format: uuid
      required:
        - id
        - date
      additionalProperties: false
    ForcedHeirship:
      type: object
      properties:
        applies:
          type: boolean
        reservedPortion:
          type: number
          minimum: 0
          maximum: 100
        disposableQuota:
          type: number
          minimum: 0
          maximum: 100
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        claimNature:
          type: string
          enum:
            - property_share
            - cash_claim
            - usufruct
            - court_discretion
        calculationBasis:
          type: string
          enum:
            - fixed
            - per_child_sliding
            - court_discretion
            - conditional
        applicableTo:
          type: string
          enum:
            - children_only
            - children_and_spouse
            - all_descendants
            - all_heirs
        deferralRule:
          type: string
        effectiveDate:
          type: string
          format: date
          $comment: 'When these forced heirship rules took effect. Swiss 2023 reform: 2023-01-01.'
        reformVersion:
          type: string
          $comment: e.g., 'Swiss Code 2023 revision', 'French loi 2006-728'.
        notes:
          type: string
      additionalProperties: false
    AdjudicatingBody:
      type: object
      properties:
        type:
          type: string
          enum:
            - secular_court
            - religious_court
            - beth_din
            - shariah_court
            - tribal_court
            - family_court
            - family_council
            - community_elders
            - partition_meeting
            - karta_decision
            - maori_land_court
            - high_court
        name:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        caseReference:
          type: string
        authoritative:
          type: boolean
      required:
        - type
      additionalProperties: false
    ParallelDistribution:
      type: object
      properties:
        system:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        description:
          type: string
        notes:
          type: string
      required:
        - system
      additionalProperties: false
    ProbateGrant:
      type: object
      properties:
        grantType:
          type: string
        grantDate:
          type: string
          format: date
        grantReference:
          type: string
        issuingCourt:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        notes:
          type: string
      additionalProperties: false
    DeathRecord:
      type: object
      properties:
        dateOfDeath:
          type: string
          format: date
        placeOfDeath:
          type: string
        deathCertificateRef:
          type: string
        domicileAtDeath:
          $ref: '#/components/schemas/jurisdiction'
        notes:
          type: string
      additionalProperties: false
    SuccessionConflict:
      type: object
      properties:
        description:
          type: string
        systems:
          type: array
          items:
            type: string
        resolutionStatus:
          type: string
          enum:
            - unresolved
            - resolved
            - pending_court
            - pending_arbitration
        notes:
          type: string
      required:
        - description
      additionalProperties: false
    estate:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/estate.json
      title: Estate
      description: The root estate record — will, intestacy, or trust-based succession plan. Contains testator details, jurisdiction, will formalities, forced heirship, probate grants, death record, multi-jurisdiction administration, and tax treaty positions.
      type: object
      $defs:
        Codicil:
          type: object
          properties:
            id:
              type: string
              format: uuid
            date:
              type: string
              format: date
            description:
              type: string
            attestation:
              $ref: '#/components/schemas/attestation'
            documentId:
              type: string
              format: uuid
          required:
            - id
            - date
          additionalProperties: false
        TestamentaryCapacity:
          type: object
          properties:
            assessed:
              type: boolean
            assessmentDate:
              type: string
              format: date
            assessorName:
              type: string
            assessorRole:
              type: string
            capacityConfirmed:
              type: boolean
            goldenRuleComplied:
              type: boolean
              $comment: The 'golden rule' (Kenward v Adams [1975]) — elderly/seriously ill testators should have a medical practitioner assess capacity.
            notes:
              type: string
          additionalProperties: false
        ForcedHeirship:
          type: object
          properties:
            applies:
              type: boolean
            reservedPortion:
              type: number
              minimum: 0
              maximum: 100
            disposableQuota:
              type: number
              minimum: 0
              maximum: 100
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            claimNature:
              type: string
              enum:
                - property_share
                - cash_claim
                - usufruct
                - court_discretion
            calculationBasis:
              type: string
              enum:
                - fixed
                - per_child_sliding
                - court_discretion
                - conditional
            applicableTo:
              type: string
              enum:
                - children_only
                - children_and_spouse
                - all_descendants
                - all_heirs
            deferralRule:
              type: string
            effectiveDate:
              type: string
              format: date
              $comment: 'When these forced heirship rules took effect. Swiss 2023 reform: 2023-01-01.'
            reformVersion:
              type: string
              $comment: e.g., 'Swiss Code 2023 revision', 'French loi 2006-728'.
            notes:
              type: string
          additionalProperties: false
        AdjudicatingBody:
          type: object
          properties:
            type:
              type: string
              enum:
                - secular_court
                - religious_court
                - beth_din
                - shariah_court
                - tribal_court
                - family_court
                - family_council
                - community_elders
                - partition_meeting
                - karta_decision
                - maori_land_court
                - high_court
            name:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            caseReference:
              type: string
            authoritative:
              type: boolean
          required:
            - type
          additionalProperties: false
        ParallelDistribution:
          type: object
          properties:
            system:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            description:
              type: string
            notes:
              type: string
          required:
            - system
          additionalProperties: false
        ProbateGrant:
          type: object
          properties:
            grantType:
              type: string
            grantDate:
              type: string
              format: date
            grantReference:
              type: string
            issuingCourt:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          additionalProperties: false
        DeathRecord:
          type: object
          properties:
            dateOfDeath:
              type: string
              format: date
            placeOfDeath:
              type: string
            deathCertificateRef:
              type: string
            domicileAtDeath:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          additionalProperties: false
        SuccessionConflict:
          type: object
          properties:
            description:
              type: string
            systems:
              type: array
              items:
                type: string
            resolutionStatus:
              type: string
              enum:
                - unresolved
                - resolved
                - pending_court
                - pending_arbitration
            notes:
              type: string
          required:
            - description
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        testatorPersonId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - draft
            - active
            - locked
            - archived
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        willType:
          type: string
          enum:
            - secular
            - religious
            - dual
            - composite
            - oral_witnessed
            - oral_customary
            - holographic
            - notarised
            - privileged_will
        extensionWillType:
          type: string
          $comment: Non-core will types (e.g. jihi_shosho for Japanese holographic wills). Extension schemas validate.
        companionEstateId:
          type: string
          format: uuid
          $comment: For dual-system estates — links secular and religious estate records.
        primaryInstrument:
          type: string
          enum:
            - will
            - revocable_trust
            - both
            - intestacy
        defaultPropertyRegime:
          type: string
          enum:
            - community_property
            - separate_property
            - equitable_distribution
            - deferred_community
            - universal_community
            - participation_in_acquisitions
            - islamic_dower
        totalEstimatedValue:
          $ref: '#/components/schemas/money'
        attestation:
          $ref: '#/components/schemas/attestation'
        testamentaryCapacity:
          $ref: '#/components/schemas/TestamentaryCapacity'
        codicils:
          type: array
          items:
            $ref: '#/components/schemas/Codicil'
        revokesDocumentIds:
          type: array
          items:
            type: string
            format: uuid
        revocationClause:
          type: boolean
        forcedHeirship:
          $ref: '#/components/schemas/ForcedHeirship'
        adjudicatingBodies:
          type: array
          items:
            $ref: '#/components/schemas/AdjudicatingBody'
        parallelDistributions:
          type: array
          items:
            $ref: '#/components/schemas/ParallelDistribution'
        probateGrant:
          $ref: '#/components/schemas/ProbateGrant'
        deathRecord:
          $ref: '#/components/schemas/DeathRecord'
        successionConflicts:
          type: array
          items:
            $ref: '#/components/schemas/SuccessionConflict'
        choiceOfLaw:
          type: object
          $comment: Brussels IV Regulation choice of law. Allows EU nationals to choose their nationality's law for succession.
          properties:
            chosenLaw:
              $ref: '#/components/schemas/jurisdiction'
            basis:
              type: string
            documentRef:
              type: string
          additionalProperties: false
        electiveShareRight:
          type: object
          $comment: US — surviving spouse's right to elect against the will.
          properties:
            available:
              type: boolean
            electedAmount:
              $ref: '#/components/schemas/money'
            statute:
              type: string
            notes:
              type: string
          additionalProperties: false
        priorMatrimonialClaim:
          type: object
          properties:
            exists:
              type: boolean
            description:
              type: string
            claimantPersonId:
              type: string
              format: uuid
            notes:
              type: string
          additionalProperties: false
        noContestClause:
          type: object
          $comment: In terrorem clause — beneficiary forfeits gift if they challenge the will.
          properties:
            present:
              type: boolean
            enforceability:
              type: string
            notes:
              type: string
          additionalProperties: false
        pretermittedHeirClaims:
          type: array
          $comment: Claims by children born/adopted after the will was made.
          items:
            type: object
            properties:
              claimantPersonId:
                type: string
                format: uuid
              status:
                type: string
              notes:
                type: string
            additionalProperties: false
        testamentaryPromises:
          type: array
          $comment: NZ — claims under the Law Reform (Testamentary Promises) Act 1949.
          items:
            type: object
            properties:
              claimantPersonId:
                type: string
                format: uuid
              promiseDescription:
                type: string
              status:
                type: string
              notes:
                type: string
            additionalProperties: false
        judicialVariationPower:
          type: object
          $comment: UK/NZ — court power to vary a will under the Inheritance (Provision for Family and Dependants) Act 1975 or equivalent.
          properties:
            available:
              type: boolean
            statute:
              type: string
            notes:
              type: string
          additionalProperties: false
        commorientesRule:
          type: object
          $comment: Rule determining order of death when people die in the same event. Varies by jurisdiction.
          properties:
            applicable:
              type: boolean
            rule:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          additionalProperties: false
        ancillaryProbate:
          type: array
          $comment: Multi-jurisdiction estate administration. Each entry represents one jurisdiction's administration.
          items:
            type: object
            properties:
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              fiduciaryPersonId:
                type: string
                format: uuid
              status:
                type: string
                enum:
                  - not_started
                  - applied
                  - granted
                  - completed
                  - waived
              grantReference:
                type: string
              localCounsel:
                type: string
              notes:
                type: string
            required:
              - jurisdiction
            additionalProperties: false
        registrations:
          type: array
          $comment: Will registries worldwide (DIFC Wills Service Centre, UK Probate Registry, etc.).
          items:
            type: object
            properties:
              registry:
                type: string
              registrationNumber:
                type: string
              jurisdictionScope:
                type: string
              registrationDate:
                type: string
                format: date
            required:
              - registry
            additionalProperties: false
        reportingCurrency:
          type: string
          pattern: ^[A-Z]{3}$
          $comment: ISO 4217 currency for probate reporting.
        conversionRates:
          type: array
          $comment: Exchange rates used for estate valuation in cross-border estates.
          items:
            type: object
            properties:
              fromCurrency:
                type: string
                pattern: ^[A-Z]{3}$
              toCurrency:
                type: string
                pattern: ^[A-Z]{3}$
              rate:
                type: number
                exclusiveMinimum: 0
              rateDate:
                type: string
                format: date
              source:
                type: string
            required:
              - fromCurrency
              - toCurrency
              - rate
              - rateDate
            additionalProperties: false
        taxTreatyPositions:
          type: array
          $comment: Bilateral tax treaty claims relevant to the estate.
          items:
            type: object
            properties:
              treaty:
                type: string
              primaryTaxingJurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              claimedCredits:
                type: string
              relevantArticle:
                type: string
              notes:
                type: string
            required:
              - treaty
            additionalProperties: false
        suggestedPractitionerNeeds:
          type: array
          items:
            type: string
          $comment: Informational. Activity codes computed from estate complexity — e.g. trust_preparation, cross_border, iht_planning. Canonical taxonomy at openinherit.org/reference/practitioner-activities.json.
        createdAt:
          type: string
          format: date
        lastModifiedAt:
          type: string
          format: date
        notes:
          type: string
      required:
        - id
        - testatorPersonId
        - status
        - jurisdiction
        - createdAt
        - lastModifiedAt
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    address:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/address.json
      $comment: All fields optional. Supports Western, Japanese (reversed), Indian (landmark-based), African (informal) addressing. An empty object is valid — some jurisdictions have no formal address system.
      title: PostalAddress
      description: A physical address. Culturally neutral — supports any global addressing convention.
      type: object
      properties:
        streetAddress:
          type: string
          description: Street number and name
        addressLine2:
          type: string
          description: Flat, suite, building, floor
        addressLocality:
          type: string
          description: City, town, village, or ward
        addressRegion:
          type: string
          description: State, prefecture, province, county
        postalCode:
          type: string
        addressCountry:
          type: string
          pattern: ^[A-Z]{2}$
          description: ISO 3166-1 alpha-2
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        landmark:
          type: string
          $comment: Common in India, Nigeria, rural areas. 'Near Meenakshi Temple' or 'Behind Shoprite, Lekki Phase 1'.
        directionNotes:
          type: string
          $comment: Free-form directions when no formal address exists. Common in rural Africa, parts of India.
        addressOrder:
          type: string
          enum:
            - western
            - japanese
            - indian
            - arabic
            - custom
          $comment: japanese = country → prefecture → city → ward → block → building (reversed from Western). Determines display order.
      additionalProperties: false
    identifier:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/identifier.json
      title: Identifier
      description: A typed external identifier. Use 'system' to namespace (e.g. 'urn:hmrc:nino').
      type: object
      properties:
        system:
          type: string
          description: Namespace URI or name
        value:
          type: string
          description: The identifier value
        type:
          type: string
          description: Type label (e.g. 'passport', 'national_insurance', 'charity_number')
      required:
        - value
      additionalProperties: false
    person:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/person.json
      title: Person
      description: A person involved in the estate. Schema.org name alignment. Any Unicode script. Supports CJK phonetic readings, chieftaincy titles, clan/lineage identifiers, dual legal personalities, and tax residency across multiple jurisdictions.
      type: object
      properties:
        id:
          type: string
          format: uuid
        givenName:
          type: string
          minLength: 1
          description: 'First/given name (Schema.org: givenName)'
        familyName:
          type: string
          minLength: 1
          $comment: Optional — Tamil naming uses a single name. Systems must handle absent familyName.
          description: 'Last/family/surname (Schema.org: familyName)'
        additionalName:
          type: string
          description: 'Middle name(s) (Schema.org: additionalName)'
        preferredName:
          type: string
          description: Name the person prefers to be called
        phoneticReading:
          type: object
          $comment: 'Required for CJK names. Japanese: furigana/romaji. Chinese: pinyin. Korean: romanisation. Ensures names can be read by non-native systems.'
          properties:
            givenName:
              type: string
            familyName:
              type: string
            fullName:
              type: string
          minProperties: 1
          additionalProperties: false
        titles:
          type: array
          $comment: Chieftaincy titles (Nigerian), honorifics (Japanese), caste/clan titles (Indian), religious titles, academic degrees.
          items:
            type: object
            properties:
              title:
                type: string
              type:
                type: string
                enum:
                  - chieftaincy
                  - traditional
                  - religious
                  - professional
                  - honorific
                  - clan
                  - academic
                  - military
                  - other
            required:
              - title
            additionalProperties: false
        clanOrLineage:
          type: string
          $comment: Tribal clan, Indian gotra/caste, family lineage. Determines inheritance rights in customary/Hindu systems.
        dateOfBirth:
          type: string
          format: date
          description: ISO 8601 date of birth
        dateOfDeath:
          type: string
          format: date
          description: ISO 8601 date of death (if deceased)
        gender:
          type: string
          enum:
            - male
            - female
            - non_binary
            - other
            - prefer_not_to_say
            - unknown
          $comment: Optional but needed for gender-dependent inheritance (Islamic faraid, Hindu succession pre-2005). Halachic/Islamic gender categories available via x-inherit-* extensions.
        domicile:
          $ref: '#/components/schemas/jurisdiction'
          $comment: Domicile (not residence/nationality) determines succession law for moveables in conflict-of-laws. A British citizen domiciled in France has moveables governed by French forced heirship.
        roles:
          type: array
          items:
            type: string
            enum:
              - testator
              - beneficiary
              - executor
              - guardian
              - trustee
              - witness
              - attorney
              - proxy
              - protector
              - enforcer
          minItems: 1
          uniqueItems: true
          $comment: Core roles define the person's function in the estate. Extension-specific roles (bekhor, karta, okpara, mutawalli) should be added via x-inherit-* blocks alongside core roles. The array is intentionally extensible — a person can be both 'executor' (core) and 'karta' (x-inherit-india-hindu). Extensions should NOT attempt to add values to this enum.
        contact:
          type: object
          properties:
            email:
              type: string
              format: email
            phone:
              type: string
              description: Phone number (E.164 recommended)
            address:
              $ref: '#/components/schemas/address'
          additionalProperties: false
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/identifier'
          description: External identifiers (passport, national ID, etc.)
        ritualName:
          type: object
          $comment: 'Structured religious name. Hebrew: ''Dovid ben Avraham''. Arabic nasab: ''Ahmed ibn Muhammad''. Hindu: gotra + name. Used for halachic documents, Shariah court filings, religious ceremonies.'
          properties:
            name:
              type: string
              description: The full ritual/religious name
            patronymic:
              type: string
              description: Patronymic element (ben/bat, ibn/bint, etc.)
            nameSystem:
              type: string
              description: 'Naming tradition: hebrew, arabic_nasab, hindu, buddhist, etc.'
          required:
            - name
          additionalProperties: false
        legalPersonalities:
          type: array
          $comment: 'A person can have different legal identities across systems. Under statutory law: property owner. Under customary law: okpara (first son) with custodial authority. Under religious law: a Kohen.'
          items:
            type: object
            properties:
              system:
                type: string
                enum:
                  - statutory
                  - customary
                  - religious
                  - traditional
              role:
                type: string
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              notes:
                type: string
            required:
              - system
              - role
            additionalProperties: false
        taxResidency:
          type: array
          $comment: Tax residency in one or more jurisdictions. Handles FATCA (US), CRS, JP/US estate tax treaty, expat tax. A person may be tax-resident in multiple jurisdictions simultaneously.
          items:
            type: object
            properties:
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
              taxpayerIdentifier:
                type: string
                $comment: SSN (US), TFN (AU), My Number (JP), NINO (UK)
              treatyPosition:
                type: string
                $comment: Relevant treaty claim, e.g., 'US-JP Estate Tax Treaty Art. 4'
              fatcaStatus:
                type: string
                enum:
                  - us_person
                  - non_us_person
                  - exempt
                  - unknown
                $comment: FATCA classification. US persons have worldwide reporting obligations.
            required:
              - jurisdiction
            additionalProperties: false
        language:
          type: string
          description: BCP 47 language tag for preferred language
        notes:
          type: string
      required:
        - id
        - givenName
        - roles
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    kinship:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/kinship.json
      title: Kinship
      description: 'A familial bond between two people. Essential for intestacy calculation — inheritance rules in every jurisdiction depend on parent-child, sibling, and other familial relationships. Direction: fromPersonId is the parent/elder, toPersonId is the child/younger (for parent-child types). Indian extensions may add PARENT_CHILD_COPARCENARY, KARTA_MEMBER. See extensions/india-hindu.json.'
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - PARENT_CHILD_BIOLOGICAL
            - PARENT_CHILD_ADOPTED
            - PARENT_CHILD_STEP
            - PARENT_CHILD_FOSTER
            - PARENT_CHILD_ACKNOWLEDGED
            - SIBLING
            - HALF_SIBLING_PATERNAL
            - HALF_SIBLING_MATERNAL
            - STEP_SIBLING
            - GRANDPARENT_GRANDCHILD
            - UNCLE_NEPHEW
            - AUNT_NEPHEW
          $comment: 'HALF_SIBLING_PATERNAL = same father, different mother. HALF_SIBLING_MATERNAL = same mother, different father. Critical for Islamic faraid — paternal half-siblings inherit differently from maternal half-siblings. UNCLE_NEPHEW/AUNT_NEPHEW: supports matrilineal African succession (maternal uncle inherits) and Islamic ta''sib hierarchy (paternal uncle''s son). PARENT_CHILD_ACKNOWLEDGED: father acknowledges a child of uncertain parentage — relevant for Islamic inheritance.'
        fromPersonId:
          type: string
          format: uuid
          description: Parent/elder person in the kinship (Person.id)
        toPersonId:
          type: string
          format: uuid
          description: Child/younger person in the kinship (Person.id)
        legalStatus:
          type: string
          enum:
            - recognised
            - contested
            - pending
            - unrecognised
          description: Legal recognition status of this familial bond
        legitimacy:
          type: string
          enum:
            - legitimate
            - illegitimate
            - legitimated
            - not_applicable
          $comment: Affects inheritance in Islamic law (illegitimate children don't inherit via faraid), some African customary systems, and pre-1970 English law. Use 'not_applicable' where the distinction has been abolished.
        adoptionDate:
          type: string
          format: date
          description: Date of adoption order (for PARENT_CHILD_ADOPTED)
        courtOrderRef:
          type: string
          description: Court order or adoption certificate reference
        notes:
          type: string
      required:
        - id
        - type
        - fromPersonId
        - toPersonId
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    Partner:
      type: object
      properties:
        personId:
          type: string
          format: uuid
          description: Reference to a Person.id
        displayLabel:
          type: string
          description: Optional non-gendered label (e.g. 'First Wife', 'Partner A')
        ordinal:
          type: integer
          minimum: 1
          description: Position in partner list (1-based)
      required:
        - personId
        - ordinal
      additionalProperties: false
    RelationshipEvent:
      type: object
      properties:
        type:
          type: string
          enum:
            - CEREMONY
            - REGISTRATION
            - ENGAGEMENT
            - MARRIAGE_CONTRACT
            - PROPERTY_REGIME_CHANGE
            - SEPARATION_INFORMAL
            - SEPARATION_LEGAL
            - DIVORCE_FILED
            - DIVORCE_FINALISED
            - FINANCIAL_ORDER
            - ANNULMENT
            - DISSOLUTION
            - DEATH_OF_PARTNER
            - RECONCILIATION
            - VOID_DECLARATION
            - MAHR_PAYMENT
            - LOBOLA_PAYMENT
        date:
          type: string
          format: date
          description: ISO 8601 date
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        notes:
          type: string
      required:
        - type
        - date
      additionalProperties: false
    JurisdictionalRecognition:
      type: object
      $comment: 'How a jurisdiction recognises this relationship. Enables modelling of civil/religious status divergence (e.g. agunah: civilly divorced but halachically married).'
      properties:
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
        recognised:
          type: boolean
        recognisedAs:
          type: string
          description: What this jurisdiction recognises it as (if different)
        notes:
          type: string
      required:
        - jurisdiction
        - recognised
      additionalProperties: false
    FinancialInstrument:
      type: object
      properties:
        type:
          type: string
          enum:
            - MAHR
            - KETUBAH
            - LOBOLA
            - PRENUPTIAL_AGREEMENT
            - POSTNUPTIAL_AGREEMENT
            - MARRIAGE_SETTLEMENT
        value:
          $ref: '#/components/schemas/money'
        status:
          type: string
          enum:
            - AGREED
            - PAID
            - PARTIALLY_PAID
            - DEFERRED
            - DISPUTED
            - WAIVED
        description:
          type: string
        documentRef:
          type: string
          description: Reference to a Document.id
        date:
          type: string
          format: date
        inheritanceImpact:
          type: string
          description: How this affects inheritance distribution
        maharDetails:
          type: object
          $comment: Required when type is MAHR. Structured mahr data for Islamic estates.
          properties:
            maharType:
              type: string
              enum:
                - prompt
                - deferred
                - combination
            recipientPersonId:
              type: string
              format: uuid
            linkedLiabilityId:
              type: string
              format: uuid
              $comment: Links to the Liability entity representing this mahr as an estate debt
          additionalProperties: false
        ketubahDetails:
          type: object
          $comment: Required when type is KETUBAH. Structured ketubah data for Jewish estates.
          properties:
            principalAmount:
              $ref: '#/components/schemas/money'
              $comment: Ikkar ketubah — standard amount (200 zuz for virgin, 100 for widow/divorcee)
            tosefetAmount:
              $ref: '#/components/schemas/money'
              $comment: Tosefet ketubah — groom's additional amount
            nedunya:
              $ref: '#/components/schemas/money'
              $comment: Dowry brought by the bride
            brideStatus:
              type: string
              enum:
                - virgin
                - widow
                - divorcee
            witnessPersonIds:
              type: array
              items:
                type: string
                format: uuid
            officiatingRabbi:
              type: string
          additionalProperties: false
        lobolaDetails:
          type: object
          $comment: Structured lobola data for African customary estates.
          properties:
            negotiatedWith:
              type: string
              $comment: Family or person lobola was negotiated with
            includesLivestock:
              type: boolean
            livestockCount:
              type: integer
              minimum: 0
          additionalProperties: false
      required:
        - type
      allOf:
        - $comment: MAHR requires maharDetails
          if:
            properties:
              type:
                const: MAHR
            required:
              - type
          then:
            required:
              - maharDetails
        - $comment: KETUBAH requires ketubahDetails
          if:
            properties:
              type:
                const: KETUBAH
            required:
              - type
          then:
            required:
              - ketubahDetails
      additionalProperties: false
    relationship:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/relationship.json
      title: Relationship
      description: Spousal/partnership relationship. N-partner support (no structural two-partner limit). Event-based timeline (status derived from events). No gendered role names. Financial instruments with MAHR/KETUBAH subtype validation. Cross-jurisdiction recognition for dual civil/religious status.
