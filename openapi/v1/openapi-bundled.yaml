                  $ref: '#/components/schemas/money'
                  $comment: Dowry brought by the bride
                  description: The nedunya — dowry brought by the bride into the marriage.
                brideStatus:
                  type: string
                  enum:
                    - virgin
                    - widow
                    - divorcee
                  $comment: 'virgin: betulah — determines the ikkar amount (200 zuz). widow: almanah — ikkar amount is 100 zuz. divorcee: gerushah — ikkar amount is 100 zuz.'
                  description: The bride's status at the time of marriage, which determines the ikkar amount.
                witnessPersonIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Person IDs of the ketubah witnesses. Under halacha, witnesses must be male, adult, and observant.
                officiatingRabbi:
                  type: string
                  description: Name of the rabbi who officiated the ceremony.
                  examples:
                    - Rabbi David Goldstein
                    - Rabbi Miriam Berkowitz
                    - Rabbi Yosef Ben-Ami
              additionalProperties: false
            lobolaDetails:
              type: object
              $comment: Structured lobola data for African customary estates.
              description: Structured lobola details for African customary marriages.
              properties:
                negotiatedWith:
                  type: string
                  $comment: Family or person lobola was negotiated with
                  description: The family or person with whom the lobola was negotiated.
                  examples:
                    - Nkosi family, Johannesburg
                    - Chief Okafor, Enugu
                    - Mensah family, Accra
                includesLivestock:
                  type: boolean
                  description: Whether the lobola includes livestock (cattle are traditional in many Southern African customs).
                  examples:
                    - true
                    - false
                livestockCount:
                  type: integer
                  minimum: 0
                  description: Number of livestock included in the lobola.
                  examples:
                    - 11
                    - 6
              additionalProperties: false
          required:
            - type
          allOf:
            - $comment: MAHR requires maharDetails
              if:
                properties:
                  type:
                    const: MAHR
                required:
                  - type
              then:
                required:
                  - maharDetails
            - $comment: KETUBAH requires ketubahDetails
              if:
                properties:
                  type:
                    const: KETUBAH
                required:
                  - type
              then:
                required:
                  - ketubahDetails
          additionalProperties: false
        JurisdictionalRecognition:
          type: object
          $comment: 'How a jurisdiction recognises this relationship. Enables modelling of civil/religious status divergence (e.g. agunah: civilly divorced but halachically married).'
          description: How a specific jurisdiction recognises (or fails to recognise) this relationship. Critical for modelling civil/religious status divergence.
          properties:
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
              description: The jurisdiction whose recognition status is recorded.
            recognised:
              type: boolean
              description: Whether this jurisdiction recognises the relationship.
              examples:
                - true
                - false
            recognisedAs:
              type: string
              description: What this jurisdiction recognises the relationship as, if different from its declared type.
              examples:
                - civil partnership
                - cohabitation
                - marriage
            notes:
              type: string
              description: Additional context on recognition.
              examples:
                - Civilly divorced but halachically married (agunah situation)
                - Same-sex marriage not recognised — treated as cohabitation
          required:
            - jurisdiction
            - recognised
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this relationship within the INHERIT document.
          examples:
            - f2a3b4c5-d6e7-8901-f234-56789abcdef0
        type:
          type: string
          enum:
            - MARRIAGE_CIVIL
            - MARRIAGE_RELIGIOUS
            - MARRIAGE_CUSTOMARY
            - MARRIAGE_COMMON_LAW
            - CIVIL_PARTNERSHIP
            - CIVIL_UNION
            - DOMESTIC_PARTNERSHIP
            - DE_FACTO
            - COHABITATION
            - ENGAGEMENT
          $comment: 'MARRIAGE_CIVIL: marriage registered with the state. MARRIAGE_RELIGIOUS: marriage conducted under religious law (use religiousSubtype for specifics). MARRIAGE_CUSTOMARY: marriage valid under customary law (e.g. African customary marriage). MARRIAGE_COMMON_LAW: common-law marriage recognised by the jurisdiction (not all do). CIVIL_PARTNERSHIP: civil partnership (UK, Germany pre-2017, etc.). CIVIL_UNION: civil union (US states, France PACS, etc.). DOMESTIC_PARTNERSHIP: domestic partnership registration. DE_FACTO: de facto or common-law relationship recognised for succession (Australia, NZ). COHABITATION: cohabitation without legal recognition — may still affect claims in some jurisdictions. ENGAGEMENT: formal engagement or betrothal — relevant for lobola and mahr negotiations. Religious subtypes (nikah, kiddushin, hindu_vivah) go in religiousSubtype. MARRIAGE_CUSTOMARY covers customary unions.'
          description: The legal form of the relationship.
          examples:
            - MARRIAGE_CIVIL
            - MARRIAGE_RELIGIOUS
            - DE_FACTO
        religiousSubtype:
          type: string
          $comment: 'Legal relationship categories recognised by specific jurisdictions, not religious labels. nikah: Islamic marriage contract — a legally binding civil contract in 50+ jurisdictions (all OIC member states, plus recognised for succession purposes in UK, US, Canada, Australia, Singapore). kiddushin: Jewish marriage — legally binding in Israel; recognised as a valid marriage for succession in UK/US/Canada where properly registered. hindu_vivah: Hindu marriage — legally binding under Hindu Marriage Act 1955 (India), recognised in UK/Singapore/Malaysia. anand_karaj: Sikh marriage — legally binding under Anand Marriage Act 1909 (India), recognised in UK/Canada. Only meaningful when type is MARRIAGE_RELIGIOUS.'
          description: The specific religious marriage form, when the type is MARRIAGE_RELIGIOUS.
          examples:
            - nikah
            - kiddushin
            - hindu_vivah
            - anand_karaj
        selfDeclaredType:
          type: string
          description: How the parties themselves describe this relationship, which may differ from the legal classification.
          examples:
            - married
            - partners
            - life companions
        partners:
          type: array
          items:
            $ref: '#/components/schemas/Partner'
          minItems: 2
          description: The people in this relationship. Minimum 2, no structural upper limit — supports polygamous marriages valid in their jurisdiction.
        events:
          type: array
          items:
            $ref: '#/components/schemas/RelationshipEvent'
          description: Chronological events determining relationship status. The authoritative status should be derived from the most recent event.
        currentStatus:
          type: string
          enum:
            - ACTIVE
            - SEPARATED_INFORMAL
            - SEPARATED_LEGAL
            - DIVORCED
            - ANNULLED
            - DISSOLVED
            - WIDOWED
            - VOID
            - PUTATIVE
          $comment: 'ACTIVE: relationship is current and subsisting. SEPARATED_INFORMAL: partners are separated without legal proceedings. SEPARATED_LEGAL: legally separated by court order or deed. DIVORCED: marriage has been dissolved by divorce. ANNULLED: marriage has been annulled (void or voidable). DISSOLVED: civil partnership has been dissolved. WIDOWED: one partner has died. VOID: marriage declared void ab initio — never legally existed. PUTATIVE: marriage is void but at least one party believed it was valid — may confer limited inheritance rights in some jurisdictions. Convenience denormalisation. The authoritative status SHOULD be derived from the most recent event in the events array. Producers MUST keep this consistent with the event timeline. Consumers SHOULD derive from events when events are present.'
          description: The current status of the relationship. A convenience denormalisation — consumers should derive from the events array when available.
          examples:
            - ACTIVE
            - DIVORCED
            - WIDOWED
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
          description: Primary jurisdiction where this relationship was formed or registered.
        jurisdictionalRecognition:
          type: array
          items:
            $ref: '#/components/schemas/JurisdictionalRecognition'
          description: How other jurisdictions recognise (or do not recognise) this relationship. Essential for cross-border estates.
        financialInstruments:
          type: array
          items:
            $ref: '#/components/schemas/FinancialInstrument'
          description: Financial instruments associated with this relationship — mahr, ketubah, lobola, prenuptial agreements, etc.
        propertyRegime:
          type: string
          enum:
            - COMMUNITY_OF_PROPERTY
            - SEPARATION_OF_PROPERTY
            - COMMUNITY_OF_ACQUESTS
            - DEFERRED_COMMUNITY
            - SEPARATE_AS_MODIFIED
            - ISLAMIC_DOWER
            - US_COMMUNITY_PROPERTY
            - US_COMMUNITY_WITH_SURVIVORSHIP
            - US_QUASI_COMMUNITY
            - HINDU_SEPARATE
          $comment: 'COMMUNITY_OF_PROPERTY: all assets jointly owned from marriage (South Africa default). SEPARATION_OF_PROPERTY: each partner owns what they acquire (England and Wales, Japan). COMMUNITY_OF_ACQUESTS: assets acquired during marriage are joint, pre-marital assets remain separate (France default). DEFERRED_COMMUNITY: assets are separate during marriage but shared on dissolution (Scandinavia, Germany). SEPARATE_AS_MODIFIED: separate property modified by prenuptial agreement. ISLAMIC_DOWER: property is separate; wife has deferred mahr claim. US_COMMUNITY_PROPERTY: 50/50 community property (CA, TX, AZ, WA, NV, NM, LA, ID, WI). US_COMMUNITY_WITH_SURVIVORSHIP: community property with right of survivorship (TX, AK, AZ, NV, WI). US_QUASI_COMMUNITY: California-specific — property acquired elsewhere treated as community on death. HINDU_SEPARATE: Hindu law — property is separate, but coparcenary property has survivorship rules.'
          description: The marital property regime governing this relationship. Determines which assets the testator may freely dispose of.
          examples:
            - SEPARATION_OF_PROPERTY
            - US_COMMUNITY_PROPERTY
            - COMMUNITY_OF_ACQUESTS
        notes:
          type: string
          description: Free-text notes about this relationship.
          examples:
            - Polygamous marriage valid under Nigerian customary law
            - Agunah situation — civilly divorced in 2020 but get (Jewish divorce) not yet given
      required:
        - id
        - type
        - partners
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    media:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/media.json
      title: Media
      description: A media attachment — photograph, video, or document scan. Used for identification, valuation, condition documentation, and provenance records.
      type: object
      properties:
        url:
          type: string
          format: uri
          description: URI pointing to the media file. May be an HTTPS URL, S3 URI, or other storage reference.
          examples:
            - https://storage.example.com/photos/ring-001.jpg
            - s3://estate-docs/assets/painting.jpg
        caption:
          type: string
          description: Human-readable description of what this media shows.
          examples:
            - Front view of the engagement ring
            - Walk-through video of the model railway layout
            - Scan of the GIA diamond certificate
        mediaType:
          type: string
          description: MIME type of the media file. Maps to Schema.org encodingFormat.
          examples:
            - image/jpeg
            - image/png
            - video/mp4
            - application/pdf
          $comment: 'Common values: image/jpeg, image/png, image/webp (photos), video/mp4, video/quicktime (videos), application/pdf (document scans, certificates).'
        viewType:
          type: string
          enum:
            - overview
            - identification
            - condition
            - provenance
            - maker_mark
            - serial_number
            - damage
            - scale_reference
            - label
            - certificate
            - receipt
            - environment
          description: The purpose of this media — what question does it answer? Enables executors and dealers to find specific documentation without scrolling through galleries.
          $comment: 'overview: general view showing the whole item in context. identification: close-up of the feature that identifies this specific item (catalogue number, hallmark, label). condition: shows current condition, wear, patina. provenance: documentation of ownership history (receipts, auction records). maker_mark: manufacturer''s mark, stamp, or signature. serial_number: close-up of serial/chassis/reference number. damage: specific damage, repairs, or defects. scale_reference: item photographed alongside a ruler or known object for size. label: product label, wine label, stamp on reverse. certificate: valuation certificate, authenticity certificate, gemological report. receipt: purchase receipt or invoice. environment: the storage environment (wine cellar temperature, gun cabinet, display case).'
          examples:
            - overview
            - identification
            - condition
            - serial_number
        takenAt:
          type: string
          format: date-time
          description: When this media was captured. Useful for establishing condition at a point in time.
          examples:
            - '2026-03-15T14:30:00Z'
        thumbnailUrl:
          type: string
          format: uri
          description: URI for a smaller preview version of the media. Maps to Schema.org thumbnail.
          examples:
            - https://storage.example.com/thumbnails/ring-001-thumb.jpg
      required:
        - url
      additionalProperties: false
    property:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/property.json
      title: Property
      description: Real estate. Supports individual ownership, communal/family property (Nigeria), HUF coparcenary (India), government-vested land (Land Use Act), US community property, and informal/unregistered holdings.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this property within the INHERIT document.
          examples:
            - d4e5f6a7-b8c9-0123-def0-123456789abc
        name:
          type: string
          minLength: 1
          description: Display name for this property — a familiar label or street address. Should be recognisable to all parties involved in the estate.
          examples:
            - Family Home
            - 42 Acacia Avenue
            - Lagos Investment Property
            - Hokkaido Farmland
            - Mumbai Flat
            - Dubai Marina Apartment
        propertyType:
          type: string
          enum:
            - detached
            - attached
            - apartment
            - land
            - commercial
            - mixed_use
            - rural
            - mobile
            - watercraft
            - other
          $comment: 'detached: standalone dwelling (UK detached house, US single-family home, JP 一戸建て). attached: dwelling sharing walls with neighbours (UK terraced/semi-detached, US townhouse/duplex). apartment: unit within a larger building (UK flat, US condo/co-op, SG HDB flat, JP マンション). land: undeveloped plot or agricultural land. commercial: office, shop, warehouse, industrial. mixed_use: combination of residential and commercial. rural: farmhouse, smallholding, rural dwelling. mobile: mobile home, park home, transportable dwelling. watercraft: houseboat, floating dwelling. other: any type not listed. For jurisdiction-specific subtypes (maisonette, bungalow, cottage, barn conversion), use the localPropertyType field in the relevant extension.'
          description: Territory-neutral property type. Use reference-data/local-term-mappings.json to display jurisdiction-appropriate labels in UIs.
          examples:
            - detached
            - apartment
            - land
            - commercial
        address:
          $ref: '#/components/schemas/address'
          description: Physical address of the property.
        estimatedValue:
          $ref: '#/components/schemas/money'
          description: Owner's estimate of the property's current market value, in minor currency units.
        professionalValuation:
          $ref: '#/components/schemas/money'
          description: Professional surveyor or valuer's assessment of the property value, in minor currency units.
        valuationDate:
          type: string
          format: date
          description: Date the most recent valuation (estimated or professional) was performed.
          examples:
            - '2024-09-15'
            - '2025-01-20'
        valuationConfidence:
          type: string
          enum:
            - estimated
            - professional
            - official
            - unknown
          $comment: 'estimated: owner''s own estimate, no professional input. professional: assessed by a qualified surveyor or valuer. official: valuation agreed with tax authority for probate, inheritance tax, or equivalent official purpose — territory-neutral term replacing ''probate''. unknown: no information on how the value was derived.'
          description: Level of confidence in the stated valuation.
          examples:
            - estimated
            - professional
        isPrimaryResidence:
          type: boolean
          $comment: Annotation only — JSON Schema 'default' does not insert values. Consuming apps must implement defaulting.
          description: Whether this is the testator's primary residence. Relevant for residence nil rate band (UK), homestead exemption (US), and similar tax reliefs.
          examples:
            - true
            - false
        ownershipType:
          type: string
          enum:
            - sole
            - joint_tenants
            - tenants_in_common
            - trust
            - tenancy_by_entirety
          $comment: 'sole: one person owns the entire property. joint_tenants: co-owners with right of survivorship — on death, the deceased''s share passes automatically to the survivor(s). tenants_in_common: co-owners without survivorship — the deceased''s share passes under the will or intestacy rules. trust: held by trustees for beneficiaries. tenancy_by_entirety: US spousal joint tenancy (PA, FL, MA, IL, OH, etc.) — survives creditors of the deceased spouse.'
          description: How ownership of this property is legally structured.
          examples:
            - sole
            - joint_tenants
            - tenants_in_common
        ownershipPercentage:
          type: number
          minimum: 0
          maximum: 100
          multipleOf: 0.01
          $comment: Capped at 2 decimal places. For legal disputes requiring higher precision, use notes.
          description: The testator's ownership share as a percentage. For joint tenants, typically 50% for two co-owners. For tenants in common, may be any split.
          examples:
            - 100
            - 50
            - 33.33
            - 25
        ownershipModel:
          type: string
          enum:
            - individual
            - joint
            - communal_family
            - huf_coparcenary
            - tribal
            - government_vested
            - trust_held
          $comment: 'individual: single person owns outright. joint: two or more co-owners. communal_family: Nigerian family land or clan property — not individually owned. huf_coparcenary: Hindu Undivided Family joint property (India) — devolves by survivorship among coparceners. tribal: indigenous/tribal communal land. government_vested: Nigerian Certificate of Occupancy — land vested in the state, occupier holds a right of occupancy. trust_held: property held by trustees.'
          description: The cultural or legal model of ownership. Goes beyond the simple legal title to capture communal and customary ownership forms.
          examples:
            - individual
            - joint
            - communal_family
        acquisitionType:
          type: string
          enum:
            - self_acquired
            - ancestral_joint
            - ancestral_severed
            - inherited
            - gifted
            - stridhan
            - communal
            - waqf_endowed
          $comment: 'self_acquired: purchased or earned by the current owner — devolves by will or intestacy. ancestral_joint: coparcenary property that has not been partitioned — devolves by survivorship. ancestral_severed: formerly joint property that has been partitioned — devolves by will or intestacy. inherited: received through inheritance. gifted: received as a gift inter vivos. stridhan: Hindu woman''s absolute property (India). communal: communal or clan property. waqf_endowed: Islamic endowment — cannot be sold or inherited.'
          description: How the property was acquired. Determines which succession law applies in India and other jurisdictions.
          examples:
            - self_acquired
            - inherited
        tenureType:
          type: string
          enum:
            - ownership
            - lease
            - communal
            - customary
            - informal
            - government_allocated
          $comment: 'ownership: outright ownership in perpetuity (UK freehold, US fee simple, AU Torrens title, JP 所有権). lease: time-limited right to occupy (UK leasehold, SG 99-year lease, HDB lease). communal: communal or clan land held by a group. customary: held under customary or traditional law (Nigerian customary right of occupancy, traditional authority grants). informal: occupation without formal title — unregistered, disputed, or undocumented. government_allocated: land allocated by government (Nigerian Certificate of Occupancy, government-vested land). For jurisdiction-specific subtypes, use the localTenureType field in the relevant extension.'
          description: Territory-neutral tenure type. Use reference-data/local-term-mappings.json to display jurisdiction-appropriate labels in UIs.
          examples:
            - ownership
            - lease
            - communal
        registrationStatus:
          type: string
          enum:
            - formally_registered
            - informally_held
            - community_acknowledged
            - disputed
            - undocumented
          $comment: 'formally_registered: registered with the national land registry or equivalent. informally_held: occupied but not formally registered. community_acknowledged: ownership recognised by the community but not the state. disputed: ownership is contested. undocumented: no documentation exists.'
          description: Whether this property is formally registered with a land authority.
          examples:
            - formally_registered
            - informally_held
        ownershipEvidence:
          type: string
          enum:
            - title_deed
            - certificate_of_occupancy
            - family_recognition
            - community_testimony
            - receipts_only
            - none
          $comment: 'title_deed: formal land registry title. certificate_of_occupancy: Nigerian Certificate of Occupancy. family_recognition: the family acknowledges ownership but no formal document exists. community_testimony: community members can attest to ownership. receipts_only: purchase receipts exist but no formal title. none: no evidence of ownership.'
          description: The type of evidence available to prove ownership. In many jurisdictions, informal evidence is the only kind available.
          examples:
            - title_deed
            - family_recognition
        applicableSuccessionLaw:
          type: object
          $comment: Which succession law governs this property. Immoveables typically governed by lex rei sitae (law where the property is situated).
          description: The succession law governing this specific property. For immoveable property, this is typically the law of the place where the property is situated (lex rei sitae).
          properties:
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
              description: Jurisdiction whose succession law governs this property.
            lawName:
              type: string
              $comment: e.g., 'Hindu Succession Act 1956', 'Japanese Civil Code'
              description: Name of the applicable law.
              examples:
                - Hindu Succession Act 1956
                - Japanese Civil Code
                - Administration of Estates Act 1925
            section:
              type: string
              $comment: e.g., 's.6 (coparcenary)'
              description: Specific section of the law that applies.
              examples:
                - s.6 (coparcenary)
                - Art. 896
                - s.46
          required:
            - jurisdiction
          additionalProperties: false
        custodianPersonId:
          type: string
          format: uuid
          $comment: 'For communal/family property: the current custodian (not owner). On death, custodianship passes by custom, not by will.'
          description: Reference to the Person.id of the current custodian of communal or family property. The custodian manages but does not own the property.
        successionRule:
          type: string
          enum:
            - testamentary
            - intestacy
            - customary_eldest_son
            - customary_family_council
            - customary_matrilineal
            - survivorship
            - not_individually_bequeathable
          $comment: 'testamentary: passes according to the will. intestacy: passes under statutory intestacy rules. customary_eldest_son: passes to the eldest son under customary law. customary_family_council: family council determines succession. customary_matrilineal: passes through the mother''s line (e.g. Akan, Minangkabau). survivorship: passes automatically to surviving co-owner(s). not_individually_bequeathable: communal property that cannot be included in a will.'
          description: How this property passes on the owner's death. May differ from the general estate succession rule.
          examples:
            - testamentary
            - survivorship
        governmentConsentRequired:
          type: boolean
          $comment: 'Nigerian Land Use Act: governor''s consent required for all transfers of rights. Some Indian states require similar for agricultural land.'
          description: Whether government or regulatory consent is required to transfer this property. Common in Nigeria (governor's consent) and for agricultural land in parts of India.
          examples:
            - true
            - false
        mobilityType:
          type: string
          enum:
            - immoveable
            - moveable
            - mixed
          $comment: 'immoveable: land and buildings. moveable: personal property (rarely applies to Property entities). mixed: property with both immoveable and moveable components. Relevant for Shia inheritance (immoveable property rules differ), French succession (lex rei sitae), and halachic bekhor rules.'
          description: Whether this property is classified as immoveable, moveable, or mixed. Determines which conflict-of-laws rules apply.
          examples:
            - immoveable
        mortgageOutstanding:
          $ref: '#/components/schemas/money'
          description: Outstanding mortgage balance in minor currency units. If the property is mortgage-free, omit this field.
        characterClassification:
          type: string
          enum:
            - community
            - separate
            - quasi_community
            - mixed
            - not_applicable
          $comment: 'community: jointly owned marital property (50/50 in US community property states — CA, TX, AZ, WA, NV, NM, LA, ID, WI). separate: individually owned, not subject to marital property claims. quasi_community: CA-specific — property acquired in a non-community state but treated as community on divorce/death. mixed: partially community and partially separate. not_applicable: jurisdiction does not distinguish community and separate property.'
          description: Marital property character classification for US community property states. Determines whether the testator may dispose of the entire property or only their half.
          examples:
            - separate
            - community
            - not_applicable
        homesteadStatus:
          type: object
          $comment: 'Homestead exemption protects primary residence from creditors and may restrict devise. Florida: unlimited value. Texas: 200 acres rural / 10 acres urban.'
          description: US homestead exemption status. Protects the primary residence from creditors and may restrict the testator's ability to devise the property.
          properties:
            isHomestead:
              type: boolean
              description: Whether this property qualifies as a homestead.
              examples:
                - true
            exemptionAmount:
              $ref: '#/components/schemas/money'
              description: Dollar value of the homestead exemption, if capped.
            exemptionUnlimited:
              type: boolean
              $comment: Florida, Texas (rural), Iowa, Kansas, Oklahoma, South Dakota.
              description: Whether the homestead exemption has no dollar cap. True in Florida, Texas (rural), and several other states.
              examples:
                - true
                - false
            deviseRestriction:
              type: boolean
              $comment: 'Florida: cannot devise homestead away from spouse/minor children.'
              description: Whether this homestead is subject to restrictions on devise — e.g. Florida prohibits devising homestead away from a surviving spouse or minor children.
              examples:
                - true
            notes:
              type: string
              description: Additional notes on homestead status.
              examples:
                - Florida unlimited homestead — devise restricted by Art. X s.4 Florida Constitution
          additionalProperties: false
        passesOutsideEstate:
          type: boolean
          $comment: True if this property passes outside probate (JTWROS, TOD deed, trust-held). NOT distributed under the will.
          description: Whether this property passes outside the probate estate — typically via joint tenancy with right of survivorship, a transfer-on-death deed, or a trust.
          examples:
            - true
            - false
        statutoryLifeEstate:
          type: object
          $comment: Statutory life estate imposed by law (Alberta Dower Act, Florida homestead devise restriction). Not the same as a testamentary life interest.
          description: A life estate imposed by statute rather than by the will. The surviving spouse or other protected person has a right to occupy for life.
          properties:
            beneficiaryPersonId:
              type: string
              format: uuid
              description: Reference to the Person.id of the life estate beneficiary.
            basis:
              type: string
              $comment: Legal basis — e.g., 'Alberta Dower Act', 'Florida Constitution Art. X s.4'
              description: The statutory basis for this life estate.
              examples:
                - Alberta Dower Act
                - Florida Constitution Art. X s.4
            conditions:
              type: string
              description: Any conditions on the life estate.
              examples:
                - Terminates on remarriage
                - Must maintain the property in habitable condition
          additionalProperties: false
        notes:
          type: string
          description: Free-text notes about this property. Use for unusual tenure arrangements, ongoing disputes, or planning considerations.
          examples:
            - Grade II listed building — consent required for any alterations
            - Boundary dispute with neighbour ongoing since 2022
        images:
          type: array
          items:
            $ref: '#/components/schemas/media'
          description: Photographs and videos of this property — exterior, interior, key rooms, any damage or features relevant to valuation.
      required:
        - id
        - name
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    asset:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/asset.json
      title: Asset
      description: 'A non-property asset: financial accounts, personal property, vehicles, digital assets, business interests, Islamic finance instruments, etc.'
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this asset within the INHERIT document.
          examples:
            - e5f6a7b8-c9d0-1234-ef01-23456789abcd
        name:
          type: string
          minLength: 1
          description: Display name for this asset. Should be specific enough to identify the item during probate.
          examples:
            - Grandmother's engagement ring
            - Barclays Current Account
            - 2019 Toyota Corolla
            - Bitcoin wallet
            - Stradivarius violin
        category:
          type: string
          enum:
            - financial
            - property_contents
            - vehicle
            - jewellery_watches
            - art
            - antiques
            - collectibles
            - musical_instruments
            - books_manuscripts
            - wine_spirits
            - clothing_textiles
            - firearms_sporting
            - digital
            - business
            - islamic_financial
            - other
          $comment: 'Top-level categories from the INHERIT Product Taxonomy (derived from the Standard Product Taxonomy, MIT licence). financial: bank accounts, savings, investments, pensions, shares, bonds, cryptocurrency, insurance. property_contents: furniture, kitchenware, electronics, tools, garden and outdoor items. vehicle: cars, motorcycles, boats, caravans, classic vehicles. jewellery_watches: jewellery, watches, precious stones, costume jewellery. art: paintings, sculptures, prints, photography, mixed media. antiques: antique furniture, ceramics, silverware, clocks. collectibles: stamps, coins, model railways, vinyl records, trading cards, memorabilia. musical_instruments: pianos, guitars, orchestral instruments, vintage instruments. books_manuscripts: rare books, first editions, manuscripts, maps. wine_spirits: wine collections, whisky, spirits, cellar contents. clothing_textiles: designer clothing, vintage fashion, textiles, rugs. firearms_sporting: firearms (require licensing), sporting equipment, fishing tackle. digital: domain names, social media accounts, subscriptions, digital media, crypto wallets. business: business interests, partnerships, intellectual property, stock compensation. islamic_financial: sukuk, takaful, Islamic deposits — internationally recognized financial instruments defined by AAOIFI standards and regulated by secular financial authorities. other: any asset not covered above. Use the subcategory field for finer classification — valid subcategories per category are listed in reference-data/category-guidance.json.'
          description: Top-level category from the INHERIT Product Taxonomy. Use the `subcategory` field for finer classification. See `reference-data/category-guidance.json` for valid subcategories, recommended identifiers, and photography guidance per category.
          examples:
            - financial
            - collectibles
            - vehicle
            - jewellery_watches
        subcategory:
          type: string
          description: 'Finer classification within the top-level category. Values are defined in reference-data/category-guidance.json but the field is freeform to accommodate jurisdiction-specific asset types. Examples: financial → ''pension'', collectibles → ''model_railways'', vehicle → ''classic_vehicle''.'
          examples:
            - engagement ring
            - ISA
            - self-invested personal pension
            - NFT
            - vintage wine
        estimatedValue:
          $ref: '#/components/schemas/money'
          description: Owner's estimate of the asset's current value, in minor currency units.
        professionalValuation:
          $ref: '#/components/schemas/money'
          description: Professional valuation of the asset, in minor currency units.
        valuationDate:
          type: string
          format: date
          description: Date of the most recent valuation.
          examples:
            - '2024-11-01'
            - '2025-02-14'
        valuationConfidence:
          type: string
          enum:
            - estimated
            - professional
            - official
            - unknown
          $comment: 'estimated: owner''s own estimate. professional: assessed by a qualified valuer. official: valuation agreed with tax authority for probate, inheritance tax, or equivalent official purpose — territory-neutral term replacing ''probate''. unknown: basis of valuation is unknown.'
          description: Level of confidence in the stated valuation.
          examples:
            - estimated
            - professional
        condition:
          type: string
          enum:
            - excellent
            - good
            - fair
            - poor
            - unknown
            - not_applicable
          $comment: 'excellent: like new or pristine. good: normal wear, fully functional. fair: showing age, may need minor repair. poor: significant wear, may need major repair. unknown: condition has not been assessed. not_applicable: condition is not relevant (e.g. bank accounts, pensions).'
          description: Physical condition of the asset. Use 'not_applicable' for financial assets where condition is meaningless.
          examples:
            - good
            - not_applicable
        quantity:
          type: integer
          minimum: 1
          description: Number of items if this represents multiple identical or similar items.
          examples:
            - 1
            - 12
            - 500
        location:
          type: string
          description: Where this asset is physically stored or held — a bank, safe, property, or institution.
          examples:
            - Barclays Bank, Manchester branch
            - Home safe
            - Bonhams storage, London
            - Coinbase exchange
        propertyId:
          type: string
          format: uuid
          description: Reference to a Property.id if this asset is located at a specific property in the estate.
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/identifier'
          description: External identifiers — serial numbers, account numbers, policy references, registration numbers, etc.
          examples:
            - - system: urn:barclays:sort-code-account
                value: 20-45-67 12345678
                type: bank_account
            - - value: 'DVLA: AB12 CDE'
                type: vehicle_registration
        images:
          type: array
          items:
            $ref: '#/components/schemas/media'
          description: Photographs, videos, and document scans of this asset. Use viewType to categorise each media item for efficient browsing by executors and dealers.
        possessionStatus:
          type: string
          enum:
            - possessed_at_death
            - receivable
            - contingent
          $comment: 'possessed_at_death: asset was in the deceased''s possession or control at death (muchzak in halacha). receivable: asset is owed to the estate but not yet received — e.g. insurance payouts, debts owed to the deceased (ra''ui in halacha). contingent: asset depends on a future event that may or may not occur. Under halacha, the bekhor''s double portion applies only to ''possessed_at_death'' (muchzak), not ''receivable'' (ra''ui). Useful for probate valuations universally.'
          description: Whether the asset was held at death, is receivable post-death, or is contingent on a future event.
          examples:
            - possessed_at_death
            - receivable
        mobilityType:
          type: string
          enum:
            - immoveable
            - moveable
            - mixed
          $comment: 'immoveable: land or buildings (rare for assets — typically use Property). moveable: personal property, financial assets, vehicles. mixed: combination. Relevant for Shia inheritance and French lex rei sitae.'
          description: Whether this asset is classified as immoveable or moveable property. Affects which conflict-of-laws rules apply in cross-border estates.
          examples:
            - moveable
        acquisitionType:
          type: string
          enum:
            - self_acquired
            - ancestral_joint
            - ancestral_severed
            - inherited
            - gifted
            - stridhan
            - communal
            - waqf_endowed
          $comment: 'self_acquired: purchased or earned by the owner. ancestral_joint: undivided coparcenary property. ancestral_severed: partitioned former joint property. inherited: received through inheritance. gifted: received as a gift. stridhan: Hindu woman''s absolute property. communal: communal or clan property. waqf_endowed: Islamic endowment.'
          description: How this asset was acquired. Determines succession rules in Indian and other customary systems.
          examples:
            - self_acquired
            - inherited
        registrationStatus:
          type: string
          enum:
            - formally_registered
            - informally_held
            - community_acknowledged
            - disputed
            - undocumented
          $comment: 'formally_registered: documented with an official authority. informally_held: possessed but not registered. community_acknowledged: community recognises ownership. disputed: ownership is contested. undocumented: no documentation exists.'
          description: Whether ownership of this asset is formally registered or documented.
          examples:
            - formally_registered
        ownershipEvidence:
          type: string
          enum:
            - title_deed
            - certificate_of_occupancy
            - family_recognition
            - community_testimony
            - receipts_only
            - none
          $comment: 'title_deed: formal ownership document. certificate_of_occupancy: Nigerian occupancy certificate. family_recognition: family acknowledges ownership. community_testimony: community can attest. receipts_only: purchase receipts only. none: no evidence available.'
          description: The type of evidence available to prove ownership of this asset.
          examples:
            - receipts_only
            - title_deed
        applicableSuccessionLaw:
          type: object
          description: The succession law governing this specific asset, if different from the general estate law.
          properties:
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
              description: Jurisdiction whose succession law governs this asset.
            lawName:
              type: string
              description: Name of the applicable law.
              examples:
                - Hindu Succession Act 1956
                - Japanese Civil Code
            section:
              type: string
              description: Specific section of the law.
              examples:
                - s.6
                - Art. 896
          required:
            - jurisdiction
          additionalProperties: false
        beneficiaryDesignation:
          type: object
          $comment: For assets with named beneficiaries (retirement accounts, life insurance, POD bank accounts). These pass OUTSIDE the estate.
          description: Named beneficiary designation for this asset. Assets with beneficiary designations pass outside the probate estate — the will does not control their distribution.
          properties:
            primaryBeneficiaryPersonIds:
              type: array
              items:
                type: string
                format: uuid
              description: Person IDs of the primary beneficiaries.
            contingentBeneficiaryPersonIds:
              type: array
              items:
                type: string
                format: uuid
              description: Person IDs of contingent beneficiaries (receive if primary beneficiaries predecease).
            designationType:
              type: string
              enum:
                - retirement_account
                - life_insurance
                - superannuation
                - pod_account
                - other
              $comment: 'retirement_account: 401(k), IRA, SIPP, etc. life_insurance: life insurance policy. superannuation: Australian superannuation fund. pod_account: payable-on-death bank account. other: any other type of beneficiary designation.'
              description: The type of beneficiary designation.
              examples:
                - life_insurance
                - retirement_account
            linkedNonprobateTransferId:
              type: string
              format: uuid
              description: Reference to the NonprobateTransfer entity that tracks this designation.
          additionalProperties: false
        digitalAccessConsent:
          type: object
          $comment: RUFADAA (Revised Uniform Fiduciary Access to Digital Assets Act) — adopted by ~47 US states. Controls whether fiduciaries can access digital assets.
          description: Digital access consent under RUFADAA or equivalent legislation. Governs whether executors and fiduciaries can access the deceased's digital accounts and assets.
          properties:
            consentGiven:
              type: boolean
              description: Whether the account holder has given consent for fiduciary access.
              examples:
                - true
            scope:
              type: string
              enum:
                - full_access
                - limited_access
                - no_access
              $comment: 'full_access: fiduciary may access all content and account data. limited_access: fiduciary may access only specified data (e.g. financial records but not personal messages). no_access: fiduciary may not access any content.'
              description: The scope of access granted to fiduciaries.
              examples:
                - full_access
                - limited_access
            designatedRecipientPersonId:
              type: string
              format: uuid
              description: Reference to the Person.id designated to receive access to this digital asset.
            onlineToolDirective:
              type: boolean
              $comment: Whether the user set access directives via the platform's own tool (takes priority under RUFADAA).
              description: Whether the user set access directives through the platform's own tool (e.g. Google Inactive Account Manager, Facebook Legacy Contact). Platform directives take priority under RUFADAA.
              examples:
                - true
                - false
          additionalProperties: false
        passesOutsideEstate:
          type: boolean
          $comment: True if this asset passes outside probate (beneficiary designation, POD, TOD). NOT distributed under the will.
          description: Whether this asset passes outside the probate estate. Beneficiary designations, POD accounts, and jointly held assets typically bypass the will.
          examples:
            - true
            - false
        notes:
          type: string
          description: Free-text notes about this asset. Use for provenance, sentimental value, special handling instructions, or anything not captured by structured fields.
          examples:
            - Belonged to great-grandmother — significant sentimental value to the family
            - Firearm requires Section 1 certificate — must be surrendered or transferred to a licence holder within 7 days of death
        description:
          type: string
          description: Structured description of the asset — what it is, its significance, and key details a dealer or executor would need. Distinct from 'notes' which is free-form.
          examples:
            - OO gauge Hornby R3456 Class 66 locomotive in EWS livery, DCC fitted, with original box and instructions
            - 18ct yellow gold solitaire engagement ring, 1.2ct round brilliant diamond, GIA certified VS1/G
        brand:
          type: string
          description: The manufacturer or brand name. Free text — implementations should offer category-aware suggestions from the category guidance reference data, but any value is valid. Brands change over time (acquisitions, rebrands) so this is not an enum.
          examples:
            - Hornby
            - Bachmann
            - Rolex
            - Cartier
            - Hardy Bros
            - Steinway
            - Hermès
            - Gibson
        model:
          type: string
          description: The specific model, product line, or range name within the brand. Combined with brand and identifiers, this uniquely describes the item to a specialist dealer.
          examples:
            - Class 66
            - Submariner Date
            - Perfect Reel
            - Model D Grand Piano
            - Birkin 25
            - Les Paul Standard
        purchaseDate:
          type: string
          format: date
          description: Date the asset was acquired by the current owner. Used for capital gains tax calculations, insurance claims, and provenance. Maps to Schema.org purchaseDate.
          examples:
            - '2015-06-20'
            - '1998-12-25'
        originalPackaging:
          type: string
          enum:
            - complete
            - partial
            - box_only
            - papers_only
            - none
            - unknown
          description: Whether original packaging, documentation, and accessories are present. Affects value by 20–40% across watches, model railways, jewellery, and many other domains.
          $comment: 'complete: original box, papers/certificates, all accessories present. partial: some original packaging elements present. box_only: original box but no papers. papers_only: certificates/papers but no box. none: no original packaging. unknown: packaging status not assessed.'
          examples:
            - complete
            - none
            - unknown
        custodian:
          type: object
          description: Third party currently holding this asset — a bank (safe deposit), storage facility (bonded wine), repairer (watch at jeweller), gallery (art on loan), or institution. The executor needs to know who to contact.
          properties:
            name:
              type: string
              description: Name of the person or organisation holding the asset.
              examples:
                - London City Bond
                - Barclays Bank, Manchester branch
                - Sotheby's (on consignment)
            contactEmail:
              type: string
              format: email
              description: Email address for the custodian.
            contactPhone:
              type: string
              description: Phone number for the custodian.
              examples:
                - +44 20 7293 5000
            relationship:
              type: string
              description: The nature of the custodial relationship.
              examples:
                - bonded storage
                - safe deposit box
                - repair/service
                - consignment
                - loan
                - pawn
            reference:
              type: string
              description: Account or reference number with the custodian.
              examples:
                - 'Account #LC-2024-5678'
                - Box 247
                - 'Repair ticket #R-4521'
          additionalProperties: false
        conditionSystem:
          type: string
          description: The grading system used for the conditionGrade value. Allows domain-specific condition assessment alongside the generic condition field.
          $comment: 'goldmine: Goldmine Grading Standard for vinyl records (M/NM/VG+/VG/G+/G/F/P). sheldon: Sheldon scale for coins (1-70, where 70 is perfect). ags: American Gem Society for gemstones (0-10). bsc: British Standards for antiques. gia: Gemological Institute of America for diamonds.'
          examples:
            - goldmine
            - sheldon
            - gia
        conditionGrade:
          type: string
          description: The specific grade within the conditionSystem. Meaningful only when conditionSystem is set.
          examples:
            - VG+
            - MS-65
            - VS1
            - Fine
        urgency:
          type: string
          enum:
            - immediate
            - within_7_days
            - within_30_days
            - none
          $comment: 'immediate: must be dealt with at once — live animals, perishable goods, firearms (7-day surrender in UK). within_7_days: urgent but not immediate — vehicles with insurance expiring, time-limited subscriptions. within_30_days: should be addressed within a month — tenanted property, business interests needing continuity. none: no time pressure — most personal possessions, financial accounts.'
          description: How urgently this asset needs attention after the testator's death. Drives the executor's priority list.
          examples:
            - immediate
            - none
        urgencyReason:
          type: string
          description: Explanation of why this asset is urgent. Particularly important for 'immediate' items.
          examples:
            - Firearm requires Section 1 certificate — must be surrendered or transferred to a licence holder within 7 days of death
            - Live animals requiring daily care
            - Perishable wine collection in temperature-controlled storage — power must be maintained
        containedInAssetId:
          type: string
          format: uuid
          description: Reference to another Asset.id if this asset is physically contained within or logically part of another asset. Enables hierarchical asset nesting — e.g. a watch inside a safe, tools inside a toolbox.
          examples:
            - a1b2c3d4-e5f6-7890-abcd-ef1234567890
        insurance:
          type: object
          description: Insurance coverage for this asset. The executor needs to know what's insured, by whom, and whether cover continues after death.
          properties:
            provider:
              type: string
              description: Name of the insurance provider.
              examples:
                - Hiscox
                - Chubb
                - NFU Mutual
                - Allianz
            policyReference:
              type: string
              description: Policy reference number.
              examples:
                - HX-2024-5678
                - CHB/ART/2024/001
            insuredValue:
              $ref: '#/components/schemas/money'
              description: The insured value in minor currency units.
            renewalDate:
              type: string
              format: date
              description: Next renewal date. Important — cover may lapse if not renewed after death.
              examples:
                - '2026-09-01'
            notes:
              type: string
              description: Additional insurance notes.
              examples:
                - Cover continues for 30 days after death per policy terms
          additionalProperties: false
        purchasedFrom:
          type: string
          description: Where the asset was purchased or acquired from. Collectors track provenance — valuable for dealers and for establishing authenticity.
          examples:
            - Rails of Sheffield
            - Christie's
            - Sotheby's
            - Private sale
            - eBay seller vintage-trains-uk
            - Car boot sale, Wrexham
        importSourceId:
          type: string
          description: Reference to an importSources entry on the root document, indicating which system this entity was imported from.
          examples:
            - src-clio-001
            - src-legacylists-export
        dataProvenance:
          type: string
          enum:
            - manual_entry
            - ai_extracted
            - ocr_scanned
            - imported
            - migrated
            - system_generated
          $comment: Per-entity override of the document-level dataProvenance. Same values as the root field.
          description: How this specific entity's data was captured. Overrides the document-level default if set.
        shareholding:
          type: object
          $comment: Category-specific sub-object for shares and shareholdings. Use when category is 'shares' or 'investment'.
          description: Detailed shareholding information — company, share class, voting rights, restrictions. Relevant for BPR (UK), stepped-up basis (US), and controlling interest calculations.
          properties:
            companyName:
              type: string
              description: Name of the company in which shares are held.
              examples:
                - Acme Ltd
                - Berkshire Hathaway Inc
                - Toyota Motor Corporation
            companyNumber:
              type: string
              description: Company registration number.
              examples:
                - '12345678'
                - DE-HRB-12345
            shareClass:
              type: string
              description: Class of shares held.
              examples:
                - Ordinary
                - Preference
                - Class A
                - Class B
            numberOfShares:
              type: integer
              minimum: 1
              description: Number of shares held.
              examples:
                - 1000
                - 50000
            totalSharesIssued:
              type: integer
              minimum: 1
              description: Total shares issued by the company (for calculating percentage ownership).
              examples:
                - 100000
                - 1000000
            votingRights:
              type: boolean
              description: Whether these shares carry voting rights.
              examples:
                - true
            restrictedTransfer:
              type: boolean
              description: Whether transfer of these shares is restricted (e.g. pre-emption rights, shareholder agreement).
              examples:
                - true
                - false
            listedExchange:
              type: string
              description: Stock exchange where shares are listed, if publicly traded. Null/absent for private companies.
              examples:
                - LSE
                - NYSE
                - TSE
                - ASX
            ticker:
              type: string
              description: Stock ticker symbol.
              examples:
                - AAPL
                - TSCO.L
                - 7203.T
            cusip:
              type: string
              description: CUSIP identifier (US/Canada). 9-character alphanumeric.
              examples:
                - '037833100'
            isin:
              type: string
              description: International Securities Identification Number.
              examples:
                - US0378331005
                - GB0031215220
          additionalProperties: false
        businessInterest:
          type: object
          $comment: Category-specific sub-object for business interests. Use when category is 'business_interest'.
          description: Detailed business interest information — partnership shares, LLP membership, sole trader business. Relevant for BPR (UK), QFOBI (US), and succession planning.
          properties:
            businessName:
              type: string
              description: Trading name of the business.
              examples:
                - Davies & Sons Builders
                - Manchester Model Supplies
            businessType:
              type: string
              enum:
                - sole_trader
                - partnership
                - llp
                - limited_company
                - plc
                - franchise
                - cooperative
                - other
              $comment: 'sole_trader: individual trading. partnership: traditional partnership. llp: limited liability partnership. limited_company: private limited company (Ltd). plc: public limited company. franchise: franchise operation. cooperative: cooperative business. other: any other structure.'
              description: Legal structure of the business.
            ownershipPercentage:
              type: number
              minimum: 0
              maximum: 100
              description: The testator's ownership percentage.
              examples:
                - 50
                - 33.33
                - 100
            controllingInterest:
              type: boolean
              description: Whether the testator holds a controlling interest. Affects BPR eligibility and valuation discounts.
              examples:
                - true
                - false
            partnershipAgreement:
              type: boolean
              description: Whether a written partnership/operating agreement exists.
              examples:
                - true
            successionProvision:
              type: string
              description: What the partnership/operating agreement says about succession on death.
              examples:
                - Surviving partners must buy out deceased's share at book value
                - Option to purchase at market value within 90 days
            annualTurnover:
              $ref: '#/components/schemas/money'
              description: Approximate annual turnover — helps with BPR qualification and valuation.
            employees:
              type: integer
              minimum: 0
              description: Number of employees.
              examples:
                - 5
                - 50
          additionalProperties: false
        pension:
          type: object
          $comment: Category-specific sub-object for pension and retirement accounts. Use when category is 'pension'.
          description: Detailed pension information — scheme type, nominated beneficiaries, death benefits. Pensions often pass outside the estate via nomination.
          properties:
            schemeType:
              type: string
              enum:
                - defined_benefit
                - defined_contribution
                - sipp
                - state_pension
                - annuity
                - drawdown
                - other
              $comment: 'defined_benefit: employer guarantees a specific retirement income. defined_contribution: value depends on contributions and investment returns. sipp: self-invested personal pension (UK). state_pension: government state pension. annuity: purchased annuity providing guaranteed income. drawdown: flexible drawdown from pension pot. other: any other pension type.'
              description: The type of pension scheme.
            provider:
              type: string
              description: Pension provider name.
              examples:
                - Aviva
                - Scottish Widows
                - Fidelity
                - Vanguard
                - LGPS
            policyReference:
              type: string
              description: Policy or membership reference number.
              examples:
                - PEN-2015-123456
            nominatedBeneficiaries:
              type: array
              items:
                type: string
                format: uuid
              description: Person IDs of nominated beneficiaries. Pension trustees usually have discretion but will consider nominations.
            nominationDate:
              type: string
              format: date
              description: Date the beneficiary nomination was last updated.
              examples:
                - '2024-01-15'
            deathBenefitType:
              type: string
              enum:
                - lump_sum
                - dependants_pension
                - drawdown_transfer
                - annuity_guarantee
                - none
              $comment: 'lump_sum: a one-off payment to beneficiaries. dependants_pension: ongoing pension payments to dependants. drawdown_transfer: pension pot transfers to beneficiary for drawdown. annuity_guarantee: guaranteed payments for remaining guarantee period. none: no death benefit (e.g. annuity with no guarantee).'
              description: Type of death benefit payable from this pension.
            crystallised:
              type: boolean
              description: 'Whether the pension has been accessed/crystallised. Affects tax treatment on death (UK: pre-75 tax-free, post-75 taxed as income).'
              examples:
                - false
                - true
            lifetimeAllowanceUsed:
              type: number
              minimum: 0
              maximum: 100
              description: Percentage of lifetime allowance used (UK). Abolished April 2024 but transitional protections remain.
              examples:
                - 45.5
          additionalProperties: false
        insurancePolicy:
          type: object
          $comment: Category-specific sub-object for life insurance and endowment policies. Use when category is 'insurance'.
          description: Life insurance policy details — type, sum assured, beneficiaries, trust status. Policies written in trust pass outside the estate.
          properties:
            policyType:
              type: string
              enum:
                - term_life
                - whole_life
                - endowment
                - critical_illness
                - income_protection
                - key_person
                - other
              $comment: 'term_life: pays out on death within term. whole_life: pays out whenever death occurs. endowment: savings + life cover, matures at set date. critical_illness: pays on diagnosis of specified illness. income_protection: replaces income during illness. key_person: business policy on key employee. other: any other type.'
              description: Type of insurance policy.
            provider:
              type: string
              description: Insurance company name.
              examples:
                - Aviva
                - Legal & General
                - Prudential
                - MetLife
            policyReference:
              type: string
              description: Policy reference number.
              examples:
                - LG-LIFE-2020-789
            sumAssured:
              $ref: '#/components/schemas/money'
              description: The amount payable on death, in minor currency units.
            writtenInTrust:
              type: boolean
              description: Whether the policy is written in trust. If true, proceeds pass outside the estate and are not subject to inheritance tax.
              examples:
                - true
                - false
            trusteeNames:
              type: array
              items:
                type: string
              description: Names of the policy trustees, if written in trust.
              examples:
                - - Sarah Davies
                  - James Davies
            beneficiaryPersonIds:
              type: array
              items:
                type: string
                format: uuid
              description: Person IDs of named beneficiaries.
            premiumFrequency:
              type: string
              enum:
                - monthly
                - annual
                - single_premium
                - paid_up
              description: How often premiums are paid.
            expiryDate:
              type: string
              format: date
              description: Policy expiry date (for term policies).
              examples:
                - '2035-06-01'
          additionalProperties: false
        coOwnership:
          type: object
          $comment: Category-specific sub-object for co-owned assets. Use when the asset has shared ownership that affects how it passes on death.
          description: Co-ownership details for assets held jointly or in common with others. Determines whether the asset passes by survivorship or under the will.
          properties:
            coOwnerPersonIds:
              type: array
              items:
                type: string
                format: uuid
              description: Person IDs of co-owners.
            ownershipType:
              type: string
              enum:
                - joint_tenants
                - tenants_in_common
                - community_property
                - partnership
                - other
              $comment: 'joint_tenants: right of survivorship — passes automatically to survivor(s). tenants_in_common: no survivorship — each owner''s share passes under their will. community_property: marital community property (US). partnership: business partnership asset. other: other arrangement.'
              description: How ownership is structured between co-owners.
            ownershipPercentage:
              type: number
              minimum: 0
              maximum: 100
              description: The testator's ownership percentage.
              examples:
                - 50
                - 33.33
            severanceDate:
              type: string
              format: date
              description: Date joint tenancy was severed to become tenants in common (if applicable).
              examples:
                - '2024-06-15'
          additionalProperties: false
        intellectualProperty:
          type: object
          $comment: Category-specific sub-object for IP assets. Use when category is 'intellectual_property'.
          description: Intellectual property details — patents, copyrights, trademarks, trade secrets. IP succession varies by jurisdiction and type.
          properties:
            ipType:
              type: string
              enum:
                - patent
                - copyright
                - trademark
                - design_right
                - trade_secret
                - database_right
                - other
              $comment: 'patent: registered invention. copyright: creative works (literary, artistic, musical). trademark: registered brand/logo. design_right: registered or unregistered design. trade_secret: confidential business information. database_right: sui generis database right (EU/UK). other: any other IP type.'
              description: Type of intellectual property.
            registrationNumber:
              type: string
              description: Registration or application number.
              examples:
                - GB2345678
                - US10,123,456
            registrationOffice:
              type: string
              description: Intellectual property office where registered.
              examples:
                - UK IPO
                - USPTO
                - EPO
                - WIPO
            expiryDate:
              type: string
              format: date
              description: Date the IP right expires.
              examples:
                - '2040-03-15'
            annualRevenue:
              $ref: '#/components/schemas/money'
              description: Approximate annual revenue generated from this IP (licensing, royalties, etc.).
            licensees:
              type: array
              items:
                type: string
              description: Current licensees of this IP.
              examples:
                - - Publisher A
                  - Manufacturer B
          additionalProperties: false
        stockCompensation:
          type: object
          $comment: Category-specific sub-object for employee stock options, RSUs, and equity compensation. Common in tech sector estates.
          description: Employee stock compensation details — options, RSUs, ESPPs. Vesting schedules and exercise windows are critical on death.
          properties:
            compensationType:
              type: string
              enum:
                - iso
                - nso
                - rsu
                - espp
                - phantom_stock
                - sar
                - other
              $comment: 'iso: incentive stock option (US tax-advantaged). nso: non-qualified stock option. rsu: restricted stock unit. espp: employee stock purchase plan. phantom_stock: phantom equity (cash settlement). sar: stock appreciation right. other: any other type.'
              description: Type of stock compensation.
            grantDate:
              type: string
              format: date
              description: Date the award was granted.
              examples:
                - '2022-03-15'
            vestingSchedule:
              type: string
              description: Description of the vesting schedule.
              examples:
                - 4-year vest with 1-year cliff
                - 3-year monthly vesting
                - Fully vested
            vestedQuantity:
              type: integer
              minimum: 0
              description: Number of shares/units currently vested.
              examples:
                - 2500
            unvestedQuantity:
              type: integer
              minimum: 0
              description: Number of shares/units not yet vested. May be forfeited on death depending on plan terms.
              examples:
                - 7500
            exercisePrice:
              $ref: '#/components/schemas/money'
              description: Strike/exercise price per share for options.
            expirationDate:
              type: string
              format: date
              description: Date the options expire. Estate typically has limited window to exercise after death.
              examples:
                - '2032-03-15'
            postDeathExerciseWindow:
              type: string
              description: Time allowed for estate to exercise options after death.
              examples:
                - 12 months from date of death
                - 90 days
                - Per plan administrator discretion
            acceleratesOnDeath:
              type: boolean
              description: Whether unvested awards accelerate (fully vest) on death.
              examples:
                - true
                - false
          additionalProperties: false
        debtReceivable:
          type: object
          $comment: Category-specific sub-object for debts owed TO the estate. The mirror of a liability — someone else owes the testator money.
          description: Details of money owed to the testator by others. These are estate assets that the executor must collect.
          properties:
            debtorName:
              type: string
              description: Name of the person or organisation that owes the debt.
              examples:
                - John Smith
                - Acme Trading Ltd
            debtorPersonId:
              type: string
              format: uuid
              description: Reference to Person.id if the debtor is in the people array.
            originalAmount:
              $ref: '#/components/schemas/money'
              description: Original amount of the debt.
            outstandingAmount:
              $ref: '#/components/schemas/money'
              description: Amount currently outstanding.
            interestRate:
              type: number
              minimum: 0
              description: Annual interest rate on the debt, as a percentage.
              examples:
                - 0
                - 3.5
                - 8
            secured:
              type: boolean
              description: Whether the debt is secured against collateral.
              examples:
                - false
            documentRef:
              type: string
              description: Reference to any loan agreement or promissory note.
              examples:
                - Promissory note dated 15 March 2023
            collectibility:
              type: string
              enum:
                - likely
                - uncertain
                - doubtful
                - uncollectible
              $comment: 'likely: debtor is solvent and able to pay. uncertain: some risk of non-payment. doubtful: significant risk of non-payment. uncollectible: debt is effectively worthless.'
              description: Likelihood of collecting this debt.
          additionalProperties: false
      required:
        - id
        - name
        - category
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    asset-collection:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/asset-collection.json
      title: Asset Collection
      description: A named group of related assets — e.g. a model railway collection, vinyl record library, or art portfolio. Lets families and dealers understand which items belong together and should be considered as a set.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this asset collection
          examples:
            - b7e2c4a1-3f8d-4e9b-a1c2-d3e4f5a6b7c8
        estateId:
          type: string
          format: uuid
          description: The estate this collection belongs to
          examples:
            - a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          minLength: 1
          description: Display name for this collection
          examples:
            - Model railway collection
            - Vinyl record library
            - Japanese woodblock prints
        description:
          type: string
          description: Context for family members and dealers about the collection's scope, provenance, or significance
          examples:
            - OO gauge collection started in 1985, mostly Hornby with some Lima coaches. Layout stored in the loft at Oakfield Road.
        category:
          type: string
          enum:
            - model_railways
            - vinyl_records
            - art
            - jewellery
            - wine
            - stamps
            - coins
            - books
            - musical_instruments
            - fishing_gear
            - handbags
            - power_tools
            - watches
            - ceramics
            - memorabilia
            - other
          $comment: Broad category for the collection. Use 'other' for niche collections (e.g. vintage typewriters, fountain pens). Individual assets within the collection may have more specific categories.
          description: The primary category of items in this collection
          examples:
            - model_railways
            - vinyl_records
            - art
        estimatedValue:
          $ref: '#/components/schemas/money'
          description: Estimated total value of the collection as a whole
          examples:
            - amount: 1500000
              currency: GBP
        valuationSource:
          type: string
          enum:
            - self_estimated
            - dealer_valuation
            - auction_estimate
            - insurance_value
          $comment: self_estimated = owner's own guess. dealer_valuation = assessed by a specialist dealer. auction_estimate = provided by an auction house. insurance_value = the insured replacement value.
          description: How the estimated value was determined
          examples:
            - dealer_valuation
        valuationDate:
          type: string
          format: date
          description: Date the valuation was performed or last updated
          examples:
            - '2025-11-15'
        disposalWishes:
          type: string
          description: Free-text guidance from the testator about what should happen to this collection — keep together, sell at auction, donate to a museum, etc.
          examples:
            - Keep together if possible. Contact Dave at Manchester Model Railway Club — he knows the right dealers. Do not sell on eBay individually.
        disposalStrategy:
          type: string
          enum:
            - keep_together
            - sell_as_collection
            - sell_individually
            - auction
            - donate
            - gift_to_person
            - dealer_bids
            - mixed
            - undecided
          $comment: 'keep_together: collection should remain intact — bequeathed to one person or institution. sell_as_collection: sell as a single lot to one buyer. sell_individually: break up and sell items separately. auction: sell through an auction house. donate: donate to a museum, institution, or charity. gift_to_person: give to a specific named person. dealer_bids: use CherishedItems-style competitive dealer bidding. mixed: combination of approaches for different parts. undecided: testator has not decided.'
          description: The testator's preferred strategy for disposing of this collection. More structured than disposalWishes.
          examples:
            - dealer_bids
            - keep_together
        minimumAcceptableValue:
          $ref: '#/components/schemas/money'
          description: The minimum total value the testator or executor will accept for the collection. Prevents fire-sale disposal. In minor currency units.
        preferredDisposalMethod:
          type: string
          enum:
            - private_sale
            - auction_house
            - dealer_network
            - online_marketplace
            - specialist_fair
            - museum_acquisition
            - other
          $comment: 'private_sale: direct sale to a known buyer. auction_house: through an established auction house (Christie''s, Bonhams, etc.). dealer_network: through specialist dealers in the collecting domain. online_marketplace: eBay, Catawiki, etc. specialist_fair: at a collecting fair or exhibition. museum_acquisition: sale or donation to a museum. other: any other method.'
          description: Preferred channel for disposing of the collection.
          examples:
            - dealer_network
            - auction_house
        specialistDealerNotes:
          type: string
          description: Notes about specialist dealers who might be interested in this collection. Names, contact details, areas of expertise.
          examples:
            - Rails of Sheffield (01onal@railsofsheffield.com) — largest UK model railway dealer. Hattons of Liverpool — strong on Bachmann/Hornby. Avoid eBay 'lot sellers' — they undervalue specialist items.
        notes:
          type: string
          description: Any additional notes about this collection
          examples:
            - Insurance policy with Hiscox, ref HX-2024-1234. Photos in Google Drive folder 'Railway Collection'.
        images:
          type: array
          items:
            $ref: '#/components/schemas/media'
          description: Overview photographs and videos of the collection as a whole — the display, the storage, the scale of the collection.
      required:
        - id
        - estateId
        - name
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    asset-interest:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/asset-interest.json
      title: Asset Interest
      description: Captures informal beneficiary interest in an asset or collection — pre-bequest soft preferences. Not legally binding. Helps the testator understand who wants what before making formal bequests.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this interest record
          examples:
            - c3d4e5f6-a7b8-9012-cdef-3456789abcde
        estateId:
          type: string
          format: uuid
          description: The estate this interest relates to
          examples:
            - a1b2c3d4-e5f6-7890-abcd-ef1234567890
        assetId:
          type:
            - string
            - 'null'
          format: uuid
          description: Reference to a specific Asset.id, if the interest is in a single asset
          examples:
            - d4e5f6a7-b8c9-0123-def4-56789abcdef0
        collectionId:
          type:
            - string
            - 'null'
          format: uuid
          description: Reference to an AssetCollection.id, if the interest is in an entire collection
          examples:
            - b7e2c4a1-3f8d-4e9b-a1c2-d3e4f5a6b7c8
        personId:
          type: string
          format: uuid
          description: The person expressing interest (must be a Person.id with a beneficiary role)
          examples:
            - e5f6a7b8-c9d0-1234-ef56-789abcdef012
        interestLevel:
          type: string
          enum:
            - mentioned
            - expressed_interest
            - strongly_wants
            - agreed
          $comment: mentioned = came up in conversation but no strong feeling. expressed_interest = person said they'd like it. strongly_wants = person has made it clear this matters to them. agreed = testator and beneficiary have informally agreed.
          description: How strongly the beneficiary has expressed interest
          examples:
            - expressed_interest
            - agreed
        sourceType:
          type: string
          enum:
            - family_conversation
            - written_request
            - chat_message
            - proxy_reported
            - testator_observed
            - manual
          $comment: family_conversation = mentioned during a family discussion. written_request = beneficiary put it in writing. chat_message = expressed via the platform's messaging. proxy_reported = a proxy relayed the interest on behalf of the beneficiary. testator_observed = testator noticed the person's attachment without them asking. manual = entered directly by the testator or proxy.
          description: How this interest was communicated or recorded
          examples:
            - family_conversation
            - testator_observed
        testatorAcknowledged:
          type: boolean
          default: false
          description: Whether the testator has seen and acknowledged this interest
          examples:
            - true
            - false
        notes:
          type: string
          description: Additional context about this interest
          examples:
            - Sarah mentioned at Christmas 2024 that she'd love Mum's engagement ring. Mum seemed pleased.
            - Haruki has always admired the woodblock print collection — discussed at Obon 2024.
            - Amara expressed strong interest in the family compound during the last family council meeting.
      required:
        - id
        - estateId
        - personId
        - interestLevel
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    liability:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/liability.json
      title: Liability
      description: A debt or financial obligation. Includes mortgages, loans, credit cards, and cultural obligations (mahr, ketubah debt, lobola) that are priority debts in certain jurisdictions.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this liability within the INHERIT document.
          examples:
            - f6a7b8c9-d0e1-2345-f012-3456789abcde
        liabilityType:
          type: string
          enum:
            - mortgage
            - personal_loan
            - credit_card
            - overdraft
            - student_loan
            - car_finance
            - hire_purchase
            - mahr
            - ketubah_debt
            - lobola
            - tax_liability
            - funeral_costs
            - care_fees
            - mezonot
            - other
          $comment: 'mortgage: secured loan against property. personal_loan: unsecured personal borrowing. credit_card: credit card balance. overdraft: bank overdraft. student_loan: education loan (may be forgiven on death in some jurisdictions). car_finance: vehicle finance agreement. hire_purchase: hire purchase agreement. mahr: Islamic deferred bridal gift — a legally recognised financial obligation that is a priority debt under Shariah law, enforceable in Shariah courts and in secular courts that recognise Islamic marriage contracts (e.g. UAE, Malaysia, Pakistan, and increasingly in UK/US family courts). ketubah_debt: Jewish marriage contract obligation — a legally recognised financial obligation under halachic law, enforceable in batei din and in secular courts where the ketubah is recognised as a binding contract (e.g. Israel; treated as a prenuptial in US/UK courts). lobola: African customary bride price — a legally recognised financial obligation under customary law, with statutory recognition under the Recognition of Customary Marriages Act 1998 (South Africa), and customary law statutes in Nigeria, Kenya, Zimbabwe, and other jurisdictions. May be partially refundable on certain events. tax_liability: income tax, capital gains tax, or other tax owed. funeral_costs: funeral and burial expenses — typically first priority debt. care_fees: care home or nursing fees owed. mezonot: Jewish widow''s maintenance obligation — a legally recognised financial obligation under halachic law, paid from the estate before distribution, enforceable in Israeli rabbinical courts and in batei din worldwide. other: any liability not covered above.'
          description: The category of liability. Cultural and religious obligations are included because they are priority debts in their respective legal systems.
          examples:
            - mortgage
            - credit_card
            - mahr
            - funeral_costs
        creditor:
          type: string
          description: Name of the creditor, institution, or person to whom the debt is owed.
          examples:
            - Barclays Bank
            - HMRC
            - Manchester City Council
            - Fatimah bint Hassan
            - Sumitomo Mitsui Banking Corporation
            - Priya Sharma
            - Chioma Okonkwo
        amount:
          $ref: '#/components/schemas/money'
          description: Outstanding balance of this liability in minor currency units.
        securedAgainst:
          type: string
          format: uuid
          description: Reference to a Property.id or Asset.id that this liability is secured against. Unsecured debts should omit this field.
        monthlyPayment:
          $ref: '#/components/schemas/money'
          description: Regular monthly payment amount in minor currency units, if applicable.
        interestRate:
          type: number
          minimum: 0
          description: Annual interest rate as a percentage (e.g. 4.5 means 4.5% per annum). Zero for interest-free debts.
          examples:
            - 4.5
            - 19.9
            - 0
            - 6.1
        startDate:
          type: string
          format: date
          description: Date the liability was incurred or the agreement began.
          examples:
            - '2020-06-01'
            - '2018-11-15'
        endDate:
          type: string
          format: date
          description: Date the liability is expected to be repaid in full, if known.
          examples:
            - '2045-06-01'
            - '2028-11-15'
        accountReference:
          type: string
          description: Account number, reference number, or policy number for this liability.
          examples:
            - MORT-2020-123456
            - 4532-XXXX-XXXX-7890
            - SL/2018/001234
        notes:
          type: string
          description: Free-text notes about this liability. Use for payment protection insurance, disputes, or special arrangements.
          examples:
            - PPI may apply — check with Barclays
            - Student loan written off on death under UK rules
            - Deferred mahr — becomes payable on death or divorce
      required:
        - id
        - liabilityType
        - amount
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    BeneficiaryOrganisation:
      type: object
      description: An organisation that receives a bequest — charity, company, trust, or unincorporated association.
      properties:
        name:
          type: string
          description: Name of the beneficiary organisation.
          examples:
            - British Red Cross
            - Manchester University
            - Médecins Sans Frontières
        type:
          type: string
          enum:
            - charity
            - company
            - unincorporated_association
            - trust
            - other
          $comment: 'charity: registered charity. company: limited company or corporation. unincorporated_association: club, society, or group without legal personality. trust: a trust entity. other: any organisation type not covered above.'
          description: The legal form of the organisation.
        registrationNumber:
          type: string
          description: Charity registration number, company number, or other official registration.
          examples:
            - '220949'
            - SC039557
            - '12345678'
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
          description: Jurisdiction where the organisation is registered.
      required:
        - name
        - type
      additionalProperties: false
    LifeInterest:
      type: object
      description: Details of a life interest — one person enjoys the asset during their lifetime, then it passes to the remainderman.
      properties:
        tenantForLifeId:
          type: string
          format: uuid
          description: Reference to the Person.id who holds the life interest.
        remaindermanId:
          type: string
          format: uuid
          description: Reference to the Person.id who receives the asset after the life interest ends.
        remaindermanClassDefinition:
          type: string
          description: Natural-language description of the remainderman class if not a named individual.
          examples:
            - All my grandchildren living at the death of the life tenant, in equal shares
        interestType:
          type: string
          enum:
            - use_and_income
            - income_only
            - use_only
            - protective
            - right_of_residence
          $comment: 'use_and_income: right to use the asset and receive any income it generates. income_only: right to income only, not physical use. use_only: right to occupy or use, but no income entitlement. protective: a protective trust — converts to discretionary trust if the life tenant attempts to assign their interest. right_of_residence: right to live in the property for life.'
          description: The scope of the life interest.
          examples:
            - use_and_income
            - right_of_residence
      required:
        - tenantForLifeId
        - interestType
      additionalProperties: false
    Substitution:
      type: object
      description: A substitute beneficiary who receives the bequest if the primary beneficiary cannot (e.g. predeceases the testator).
      properties:
        beneficiaryId:
          type: string
          format: uuid
          description: Reference to the Person.id of the substitute beneficiary.
        classDefinition:
          type: string
          description: Natural-language description of the substitute class.
          examples:
            - The children of the deceased beneficiary, in equal shares
        beneficiaryOrganisation:
          $ref: '#/components/schemas/BeneficiaryOrganisation'
          description: Substitute organisation if the substitution is to a charity or company.
        condition:
          type: string
          description: The condition that triggers this substitution.
          examples:
            - If my daughter predeceases me
            - If the primary beneficiary disclaims the gift
        perStirpes:
          type: boolean
          description: Whether the substitution is per stirpes — passing to the deceased beneficiary's descendants by representation.
          examples:
            - true
      additionalProperties: false
    PostDeathAction:
      type: object
      description: An action taken after death that modifies the bequest — disclaimer, deed of variation, appropriation, or assent.
      properties:
        type:
          type: string
          enum:
            - disclaimer
            - deed_of_variation
            - appropriation
            - assent
          $comment: 'disclaimer: beneficiary formally refuses the gift. deed_of_variation: beneficiary redirects the gift to another person (within 2 years of death in the UK for IHT purposes). appropriation: executor transfers a specific asset to satisfy the bequest. assent: executor formally vests the asset in the beneficiary.'
          description: The type of post-death action.
        date:
          type: string
          format: date
          description: Date the action was taken.
          examples:
            - '2025-12-01'
        description:
          type: string
          description: Description of the action taken.
          examples:
            - Deed of variation redirecting £50,000 to grandchildren's trust
            - Beneficiary disclaimed life interest in favour of children
        documentId:
          type: string
          format: uuid
          description: Reference to the Document entity recording this action.
      required:
        - type
      additionalProperties: false
    InheritanceResponse:
      type: object
      description: The beneficiary's response to the inheritance — acceptance, renunciation, or qualified acceptance. In civil law jurisdictions, acceptance may be required within a time limit.
      properties:
        response:
          type: string
          enum:
            - accepted
            - renounced
            - qualified_acceptance
            - pending
          $comment: 'accepted: beneficiary has accepted the inheritance. renounced: beneficiary has formally renounced — the gift lapses or passes to a substitute. qualified_acceptance: beneficiary accepted with limitations (e.g. accepting only up to the value of assets, not liabilities — common in Japan and France). pending: no response yet — may be within the statutory response period.'
          description: The beneficiary's formal response to the inheritance.
        responseDate:
          type: string
          format: date
          description: Date the response was made.
          examples:
            - '2026-01-15'
        responsePersonId:
          type: string
          format: uuid
          description: Reference to the Person.id of the respondent.
        courtFiled:
          type: boolean
          description: Whether the response was filed with a court (required in some jurisdictions).
          examples:
            - true
            - false
        deadlineDate:
          type: string
          format: date
          description: Statutory deadline for responding (e.g. 3 months in Japan, 4 months in France).
          examples:
            - '2026-03-30'
      required:
        - response
      additionalProperties: false
    bequest:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/bequest.json
      title: Bequest
      description: A disposition of property or money in a will. Supports 7 core types (specific, pecuniary, demonstrative, general, residuary, life_interest, class) and extension types via extensionType (e.g. wasiyya, halachic_matanah).
      type: object
      $defs:
        BeneficiaryOrganisation:
          type: object
          description: An organisation that receives a bequest — charity, company, trust, or unincorporated association.
          properties:
            name:
              type: string
              description: Name of the beneficiary organisation.
              examples:
                - British Red Cross
                - Manchester University
                - Médecins Sans Frontières
            type:
              type: string
              enum:
                - charity
                - company
                - unincorporated_association
                - trust
                - other
              $comment: 'charity: registered charity. company: limited company or corporation. unincorporated_association: club, society, or group without legal personality. trust: a trust entity. other: any organisation type not covered above.'
              description: The legal form of the organisation.
            registrationNumber:
              type: string
              description: Charity registration number, company number, or other official registration.
              examples:
                - '220949'
                - SC039557
                - '12345678'
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
              description: Jurisdiction where the organisation is registered.
          required:
            - name
            - type
          additionalProperties: false
        LifeInterest:
          type: object
          description: Details of a life interest — one person enjoys the asset during their lifetime, then it passes to the remainderman.
          properties:
            tenantForLifeId:
              type: string
              format: uuid
              description: Reference to the Person.id who holds the life interest.
            remaindermanId:
              type: string
              format: uuid
              description: Reference to the Person.id who receives the asset after the life interest ends.
            remaindermanClassDefinition:
              type: string
              description: Natural-language description of the remainderman class if not a named individual.
              examples:
                - All my grandchildren living at the death of the life tenant, in equal shares
            interestType:
              type: string
              enum:
                - use_and_income
                - income_only
                - use_only
                - protective
                - right_of_residence
              $comment: 'use_and_income: right to use the asset and receive any income it generates. income_only: right to income only, not physical use. use_only: right to occupy or use, but no income entitlement. protective: a protective trust — converts to discretionary trust if the life tenant attempts to assign their interest. right_of_residence: right to live in the property for life.'
              description: The scope of the life interest.
              examples:
                - use_and_income
                - right_of_residence
          required:
            - tenantForLifeId
            - interestType
          additionalProperties: false
        Substitution:
          type: object
          description: A substitute beneficiary who receives the bequest if the primary beneficiary cannot (e.g. predeceases the testator).
          properties:
            beneficiaryId:
              type: string
              format: uuid
              description: Reference to the Person.id of the substitute beneficiary.
            classDefinition:
              type: string
              description: Natural-language description of the substitute class.
              examples:
                - The children of the deceased beneficiary, in equal shares
            beneficiaryOrganisation:
              $ref: '#/components/schemas/BeneficiaryOrganisation'
              description: Substitute organisation if the substitution is to a charity or company.
            condition:
              type: string
              description: The condition that triggers this substitution.
              examples:
                - If my daughter predeceases me
                - If the primary beneficiary disclaims the gift
            perStirpes:
              type: boolean
              description: Whether the substitution is per stirpes — passing to the deceased beneficiary's descendants by representation.
              examples:
                - true
          additionalProperties: false
        PostDeathAction:
          type: object
          description: An action taken after death that modifies the bequest — disclaimer, deed of variation, appropriation, or assent.
          properties:
            type:
              type: string
              enum:
                - disclaimer
                - deed_of_variation
                - appropriation
                - assent
              $comment: 'disclaimer: beneficiary formally refuses the gift. deed_of_variation: beneficiary redirects the gift to another person (within 2 years of death in the UK for IHT purposes). appropriation: executor transfers a specific asset to satisfy the bequest. assent: executor formally vests the asset in the beneficiary.'
              description: The type of post-death action.
            date:
              type: string
              format: date
              description: Date the action was taken.
              examples:
                - '2025-12-01'
            description:
              type: string
              description: Description of the action taken.
              examples:
                - Deed of variation redirecting £50,000 to grandchildren's trust
                - Beneficiary disclaimed life interest in favour of children
            documentId:
              type: string
              format: uuid
              description: Reference to the Document entity recording this action.
          required:
            - type
          additionalProperties: false
        InheritanceResponse:
          type: object
          description: The beneficiary's response to the inheritance — acceptance, renunciation, or qualified acceptance. In civil law jurisdictions, acceptance may be required within a time limit.
          properties:
            response:
              type: string
              enum:
                - accepted
                - renounced
                - qualified_acceptance
                - pending
              $comment: 'accepted: beneficiary has accepted the inheritance. renounced: beneficiary has formally renounced — the gift lapses or passes to a substitute. qualified_acceptance: beneficiary accepted with limitations (e.g. accepting only up to the value of assets, not liabilities — common in Japan and France). pending: no response yet — may be within the statutory response period.'
              description: The beneficiary's formal response to the inheritance.
            responseDate:
              type: string
              format: date
              description: Date the response was made.
              examples:
                - '2026-01-15'
            responsePersonId:
              type: string
              format: uuid
              description: Reference to the Person.id of the respondent.
            courtFiled:
              type: boolean
              description: Whether the response was filed with a court (required in some jurisdictions).
              examples:
                - true
                - false
            deadlineDate:
              type: string
              format: date
              description: Statutory deadline for responding (e.g. 3 months in Japan, 4 months in France).
              examples:
                - '2026-03-30'
          required:
            - response
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this bequest within the INHERIT document.
          examples:
            - a7b8c9d0-e1f2-3456-a789-0123456789ab
        bequestType:
          type: string
          enum:
            - specific
            - pecuniary
            - demonstrative
            - general
            - residuary
            - life_interest
            - class
          $comment: 'specific: a named item to a named person (e.g. ''my engagement ring to my daughter''). pecuniary: a fixed cash sum (e.g. ''£10,000 to my son''). demonstrative: a cash sum from a specified fund (e.g. ''£5,000 from my Barclays savings account''). general: from the general estate, not a specific item. residuary: the remainder after all other gifts and debts are paid. life_interest: right to use or benefit during lifetime, then passes to a remainderman. class: to a category of people (e.g. ''my grandchildren equally'').'
          description: The category of bequest.
          examples:
            - specific
            - pecuniary
            - residuary
        extensionType:
          type: string
          $comment: Non-core bequest types (e.g. wasiyya, halachic_matanah). When set, extension schemas handle validation.
          description: Extension-specific bequest type not covered by the core enum. Validated by the relevant extension schema.
          examples:
            - wasiyya
            - halachic_matanah
            - sadaqah_jariyah
        beneficiaryId:
          type: string
          format: uuid
          description: Reference to the Person.id of the individual beneficiary.
        beneficiaryOrganisation:
          $ref: '#/components/schemas/BeneficiaryOrganisation'
          description: Organisation receiving this bequest, if not an individual.
        classDefinition:
          type: string
          $comment: Natural-language description of the class of beneficiaries (e.g. 'All my grandchildren living at my death').
          description: Natural-language definition of the beneficiary class. Required for class bequests. Must be precise enough for executors to identify all members.
          examples:
            - All my grandchildren living at my death
            - My children in equal shares
            - The children of my late brother Ahmed
            - The descendants of my sister Lakshmi
            - The children of my late uncle Kwame
        lifeInterest:
          $ref: '#/components/schemas/LifeInterest'
          description: Life interest details, required when type is 'life_interest'.
        amount:
          $ref: '#/components/schemas/money'
          description: Cash amount for pecuniary and demonstrative bequests, in minor currency units.
        sharePercentage:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage share of the residuary estate or a specified fund.
          examples:
            - 50
            - 25
            - 33.33
        description:
          type: string
          description: Free-text description of the bequest — what is being given.
          examples:
            - My engagement ring and matching necklace
            - The entire contents of my wine cellar
            - All my shares in Acme Ltd
        sourceAssetId:
          type: string
          format: uuid
          $comment: For demonstrative bequests — the asset from which the amount should be paid.
          description: Reference to the Asset.id from which a demonstrative bequest should be paid.
        conditions:
          type: array
          items:
            type: string
          $comment: Conditions that must be met before the bequest takes effect.
          description: Conditions precedent that must be satisfied before the beneficiary receives this bequest.
          examples:
            - - Beneficiary must have attained the age of 25
            - - Beneficiary must be married at the date of my death
        substitutions:
          type: array
          items:
            $ref: '#/components/schemas/Substitution'
          description: Substitute beneficiaries in case the primary beneficiary cannot receive the gift.
        hotchpot:
          type: boolean
          $comment: Whether lifetime gifts to the beneficiary should be brought into account when calculating their share.
          description: Whether lifetime gifts (advances) to the beneficiary are brought into account when calculating their share. Common in intestacy and some wills.
          examples:
            - true
            - false
        distributionMethod:
          type: string
          enum:
            - per_capita
            - per_stirpes
            - modified_per_stirpes
            - per_capita_at_each_generation
            - halachic_yerusha
          $comment: 'per_capita: each beneficiary receives an equal share. per_stirpes: shares pass by representation — a predeceased beneficiary''s share goes to their descendants. modified_per_stirpes: like per_stirpes but sharing begins at the first generation with living members. per_capita_at_each_generation: shares at each generation divided equally among living members and descendants of deceased members. halachic_yerusha: Jewish inheritance rules (firstborn double share, patrilineal only).'
          description: How the bequest is distributed among multiple beneficiaries.
          examples:
            - per_stirpes
            - per_capita
        predeceaseRule:
          type: string
          enum:
            - lapse
            - per_stirpes
            - substitution
            - accrual
            - statutory_default
          $comment: 'lapse: gift fails if the beneficiary predeceases the testator — falls into the residuary estate. per_stirpes: passes to the predeceased beneficiary''s issue by representation. substitution: passes to a named substitute beneficiary. accrual: redistributed among surviving co-beneficiaries of the same gift. statutory_default: the jurisdiction''s default rule applies (e.g. s.33 Wills Act 1837 in England and Wales).'
          description: What happens if the beneficiary dies before the testator.
          examples:
            - per_stirpes
            - lapse
        constrainedBy:
          type: string
          enum:
            - testamentary_freedom
            - customary_rule
            - forced_heirship
            - religious_rule
            - coparcenary_survivorship
          $comment: 'testamentary_freedom: testator may dispose of this gift freely. customary_rule: customary law constrains or overrides this bequest. forced_heirship: civil law forced heirship rules constrain this bequest. religious_rule: religious law constrains this bequest (e.g. wasiyya limited to one-third). coparcenary_survivorship: Hindu coparcenary property passes by survivorship, not by will.'
          description: Which legal principle constrains this bequest, if any.
          examples:
            - testamentary_freedom
            - forced_heirship
        customaryOverride:
          type: boolean
          $comment: Whether customary/religious law overrides testamentary freedom for this bequest.
          description: Whether customary or religious law overrides the testator's freedom to dispose of this gift as they wish.
          examples:
            - false
            - true
        postDeathActions:
          type: array
          items:
            $ref: '#/components/schemas/PostDeathAction'
          description: Post-death actions that modified this bequest — disclaimers, deeds of variation, appropriations.
        inheritanceResponse:
          $ref: '#/components/schemas/InheritanceResponse'
          description: The beneficiary's formal response to this inheritance, if applicable.
        hotchpotTransferIds:
          type: array
          items:
            type: string
            format: uuid
          description: References to lifetime transfer IDs that should be brought into account (hotchpot) when calculating this beneficiary's entitlement. Links bequests to prior gifts — if the testator gave the beneficiary £50,000 during their lifetime, this bequest may be reduced accordingly.
          examples:
            - - f1234567-89ab-4cde-8012-3456789abcde
        notes:
          type: string
          description: Free-text notes about this bequest. Use for context, testator intent, or special instructions to executors.
          examples:
            - This ring has been in the family for four generations — please ensure it stays in the family
            - If the charity has merged or changed name, the executor should identify the successor organisation
      required:
        - id
        - bequestType
      allOf:
        - $comment: Core types (specific, pecuniary, demonstrative, general, residuary) require beneficiaryId OR beneficiaryOrganisation. When extensionType is set, extension schema handles validation.
          if:
            properties:
              bequestType:
                enum:
                  - specific
                  - pecuniary
                  - demonstrative
                  - general
                  - residuary
            required:
              - bequestType
            not:
              required:
                - extensionType
          then:
            anyOf:
              - required:
                  - beneficiaryId
              - required:
                  - beneficiaryOrganisation
        - $comment: Class bequests require classDefinition.
          if:
            properties:
              bequestType:
                const: class
            required:
              - bequestType
          then:
            required:
              - classDefinition
        - $comment: Life interest bequests require lifeInterest object.
          if:
            properties:
              bequestType:
                const: life_interest
            required:
              - bequestType
          then:
            required:
              - lifeInterest
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    TrustAppointee:
      type: object
      description: A person appointed to a governance role in the trust — trustee, protector, or enforcer.
      properties:
        personId:
          type: string
          format: uuid
          description: Reference to the Person.id of the appointee.
        role:
          type: string
          enum:
            - trustee
            - protector
            - enforcer
          $comment: 'trustee: manages trust assets and administers the trust. protector: oversees trustees and may have consent or veto powers. enforcer: enforces purpose trust terms — required for Cayman STAR trusts.'
          description: The governance role this person holds in the trust.
      required:
        - personId
        - role
      additionalProperties: false
    TrustBeneficiary:
      type: object
      description: A beneficiary of the trust — may be a named individual, a class, or an organisation.
      properties:
        personId:
          type: string
          format: uuid
          description: Reference to the Person.id of the beneficiary, if a named individual.
        classDefinition:
          type: string
          description: Natural-language description of the beneficiary class.
          examples:
            - All my grandchildren and their descendants
            - Any person the trustees may add to the class
        organisationName:
          type: string
          description: Name of the organisation beneficiary.
          examples:
            - British Red Cross
            - Cambridge University
        interestType:
          type: string
          enum:
            - income
            - capital
            - both
            - discretionary
          $comment: 'income: entitled to income generated by trust assets only. capital: entitled to capital distributions only. both: entitled to both income and capital. discretionary: trustees have discretion over what and when to distribute.'
          description: The nature of this beneficiary's interest in the trust.
      required:
        - interestType
      additionalProperties: false
    trust:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/trust.json
      title: Trust
      description: A trust instrument — testamentary or inter vivos. Covers discretionary, bare, life interest, charitable, nil rate band, waqf (Islamic endowment), and offshore structures with governance features (reserved powers, flee clauses, protector powers).
      type: object
      $defs:
        TrustAppointee:
          type: object
          description: A person appointed to a governance role in the trust — trustee, protector, or enforcer.
          properties:
            personId:
              type: string
              format: uuid
              description: Reference to the Person.id of the appointee.
            role:
              type: string
              enum:
                - trustee
                - protector
                - enforcer
              $comment: 'trustee: manages trust assets and administers the trust. protector: oversees trustees and may have consent or veto powers. enforcer: enforces purpose trust terms — required for Cayman STAR trusts.'
              description: The governance role this person holds in the trust.
          required:
            - personId
            - role
          additionalProperties: false
        TrustBeneficiary:
          type: object
          description: A beneficiary of the trust — may be a named individual, a class, or an organisation.
          properties:
            personId:
              type: string
              format: uuid
              description: Reference to the Person.id of the beneficiary, if a named individual.
            classDefinition:
              type: string
              description: Natural-language description of the beneficiary class.
              examples:
                - All my grandchildren and their descendants
                - Any person the trustees may add to the class
            organisationName:
              type: string
              description: Name of the organisation beneficiary.
              examples:
                - British Red Cross
                - Cambridge University
            interestType:
              type: string
              enum:
                - income
                - capital
                - both
                - discretionary
              $comment: 'income: entitled to income generated by trust assets only. capital: entitled to capital distributions only. both: entitled to both income and capital. discretionary: trustees have discretion over what and when to distribute.'
              description: The nature of this beneficiary's interest in the trust.
          required:
            - interestType
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this trust within the INHERIT document.
          examples:
            - b8c9d0e1-f2a3-4567-b890-123456789abc
        name:
          type: string
          description: Name of the trust, as it appears in the trust instrument.
          examples:
            - The Davies Family Trust
            - NRB Discretionary Trust
            - Al-Rahman Waqf
            - Tanaka Family Trust
            - Sharma Children's Trust
            - Okonkwo Education Trust
        trustType:
          type: string
          enum:
            - discretionary
            - life_interest
            - bare
            - accumulation_and_maintenance
            - disabled_persons
            - charitable
            - nil_rate_band
            - waqf
            - other
          $comment: 'discretionary: trustees have full discretion over distributions — most flexible, used for IHT planning (UK). life_interest: income/use to one person for life, then capital passes to remainderman. bare: beneficiary has absolute right to trust property — often for minors until age 18. accumulation_and_maintenance: accumulates income for minors until they reach a specified age. disabled_persons: trust for a disabled person — special IHT treatment. charitable: trust established for charitable purposes — exempt from IHT and CGT. nil_rate_band: UK-specific — absorbs the nil rate band for IHT purposes. waqf: Islamic endowment — perpetual, irrevocable, income for charitable or family purposes. other: any trust type not covered above.'
          description: The category of trust.
          examples:
            - discretionary
            - nil_rate_band
            - waqf
        trustees:
          type: array
          items:
            $ref: '#/components/schemas/TrustAppointee'
          minItems: 1
          description: Persons appointed as trustees, protectors, or enforcers of this trust.
        beneficiaries:
          type: array
          items:
            $ref: '#/components/schemas/TrustBeneficiary'
          minItems: 1
          description: Beneficiaries of the trust — named individuals, classes, or organisations.
        settlor:
          type: string
          format: uuid
          description: Reference to the Person.id of the settlor (the person who created and funded the trust).
        isTestamentary:
          type: boolean
          description: Whether the trust is created by the will (testamentary) or was established during the settlor's lifetime (inter vivos).
          examples:
            - true
            - false
        createdDate:
          type: string
          format: date
          description: Date the trust instrument was executed.
          examples:
            - '2020-04-15'
            - '2024-11-01'
        creationType:
          type: string
          enum:
            - testamentary
            - inter_vivos_revocable
            - inter_vivos_irrevocable
          $comment: 'testamentary: created by the will, takes effect on death. inter_vivos_revocable: created during lifetime, can be revoked by the settlor (common in US estate planning). inter_vivos_irrevocable: created during lifetime, cannot be revoked.'
          description: How the trust was created.
          examples:
            - testamentary
            - inter_vivos_revocable
        revocability:
          type: string
          enum:
            - revocable
            - irrevocable
            - perpetual
          $comment: 'revocable: can be revoked by the settlor. irrevocable: cannot be revoked — common for asset protection. perpetual: no end date — waqf and certain Cayman STAR trusts. Distinct from creationType. A trust created as inter_vivos_revocable may become irrevocable on the settlor''s death.'
          description: Whether the trust can be revoked, and whether it is perpetual.
          examples:
            - irrevocable
            - perpetual
        perpetual:
          type: boolean
          $comment: True for waqf and certain offshore perpetual trusts.
          description: Whether the trust is perpetual (has no fixed end date). Waqf endowments and certain offshore trusts are perpetual by nature.
          examples:
            - true
            - false
        vestingAge:
          type: integer
          minimum: 0
          description: Age at which the beneficiary's interest vests absolutely (for A&M trusts and bare trusts for minors).
          examples:
            - 18
            - 21
            - 25
        vestingDate:
          type: string
          format: date
          description: Fixed date on which the trust vests, if not age-based.
          examples:
            - '2040-01-01'
        vestingConditions:
          type: array
          items:
            type: string
          description: Conditions that must be met for the trust to vest.
          examples:
            - - Beneficiary must have graduated from university
            - - Beneficiary must be in stable employment
        contingentInterests:
          type: array
          items:
            type: string
          description: Interests in the trust that are contingent on future events.
          examples:
            - - If the life tenant dies without issue, capital passes to the charity
            - - On the youngest child reaching 25, the trust winds up
        trustPeriod:
          type: string
          description: The trust period or perpetuity period, if applicable. In England and Wales, the statutory perpetuity period is 125 years (Perpetuities and Accumulations Act 2009).
          examples:
            - 125 years from date of settlement
            - 80 years
            - Perpetual (waqf)
        governingLaw:
          $ref: '#/components/schemas/jurisdiction'
          description: The jurisdiction whose law governs this trust.
        reservedPowers:
          type: array
          $comment: Powers retained by the settlor or granted to a third party. Common in BVI VISTA trusts, Jersey trusts, and Cayman STAR trusts.
          description: Powers reserved by the settlor or granted to a third party. Offshore trusts frequently include reserved powers over investment or distributions.
          items:
            type: object
            properties:
              powerType:
                type: string
                enum:
                  - investment
                  - distribution
                  - amendment
                  - revocation
                  - addition_of_beneficiaries
                  - removal_of_trustees
                  - change_of_governing_law
                $comment: 'investment: power to direct or veto investment decisions. distribution: power to direct distributions. amendment: power to amend trust terms. revocation: power to revoke the trust. addition_of_beneficiaries: power to add new beneficiaries. removal_of_trustees: power to remove and appoint trustees. change_of_governing_law: power to change the trust''s governing jurisdiction.'
                description: The type of reserved power.
              heldByPersonId:
                type: string
                format: uuid
                description: Reference to the Person.id who holds this power.
              conditions:
                type: string
                description: Any conditions on the exercise of this power.
                examples:
                  - May only be exercised with protector consent
                  - Requires 30 days written notice
            required:
              - powerType
            additionalProperties: false
        fleeClause:
          type: object
          $comment: Clause allowing automatic change of trust situs if triggering events occur (e.g., change of law, political instability). Standard in offshore trusts.
          description: A flee clause allowing automatic or discretionary change of trust situs when triggering events occur. Standard in offshore trust planning.
          properties:
            present:
              type: boolean
              description: Whether the trust contains a flee clause.
              examples:
                - true
            triggerEvents:
              type: array
              items:
                type: string
              description: Events that trigger the flee clause.
              examples:
                - - Change of law adverse to trust beneficiaries
                  - Political instability
                  - Exchange control imposition
            destinationJurisdiction:
              $ref: '#/components/schemas/jurisdiction'
              description: The jurisdiction the trust flees to when triggered.
            automaticOrDiscretionary:
              type: string
              enum:
                - automatic
                - discretionary
              $comment: 'automatic: trust moves automatically on trigger event. discretionary: trustee decides whether to move.'
              description: Whether the flee is triggered automatically or at trustee discretion.
          additionalProperties: false
        protectorPowers:
          type: array
          $comment: Specific powers held by the trust protector. Cayman STAR trusts REQUIRE an enforcer. Jersey/Guernsey trusts commonly have protectors.
          description: Powers held by the trust protector or enforcer. Offshore trusts commonly use protectors to oversee trustees.
          items:
            type: object
            properties:
              powerType:
                type: string
                enum:
                  - consent_to_distribution
                  - remove_trustee
                  - appoint_trustee
                  - change_governing_law
                  - veto_investment
                  - add_beneficiary
                  - exclude_beneficiary
                  - enforce_purpose
                $comment: 'consent_to_distribution: trustee must obtain protector consent before distributing. remove_trustee: power to remove a trustee. appoint_trustee: power to appoint a replacement trustee. change_governing_law: power to change the trust''s governing law. veto_investment: power to veto investment decisions. add_beneficiary: power to add persons to the beneficiary class. exclude_beneficiary: power to remove persons from the beneficiary class. enforce_purpose: enforce the trust''s stated purpose (Cayman STAR enforcer role).'
                description: The type of protector or enforcer power.
              protectorPersonId:
                type: string
                format: uuid
                description: Reference to the Person.id who holds this power.
              exerciseConditions:
                type: string
                description: Conditions on how this power may be exercised.
                examples:
                  - Must act in the best interests of the beneficiaries
                  - Requires written resolution
            required:
              - powerType
              - protectorPersonId
            additionalProperties: false
        jurisdictionalRecognition:
          type: array
          $comment: How different jurisdictions recognise this trust. Critical for offshore trusts used by HK/Singapore/Geneva clients.
          description: How different jurisdictions recognise (or fail to recognise) this trust. Critical for cross-border trust structures.
          items:
            type: object
            properties:
              jurisdiction:
                $ref: '#/components/schemas/jurisdiction'
                description: The jurisdiction whose recognition status is recorded.
              recognised:
                type: boolean
                description: Whether this jurisdiction recognises the trust.
                examples:
                  - true
                  - false
              recognisedAs:
                type: string
                $comment: e.g., 'transparent for tax' or 'opaque entity'
                description: How the jurisdiction characterises the trust for legal and tax purposes.
                examples:
                  - transparent for tax
                  - opaque entity
                  - fiducie
              hagueTrustConventionApplies:
                type: boolean
                $comment: Switzerland ratified; France did not.
                description: Whether the Hague Trust Convention applies in this jurisdiction — determines automatic recognition of foreign trusts.
                examples:
                  - true
                  - false
              notes:
                type: string
                description: Additional context on recognition in this jurisdiction.
                examples:
                  - France treats as a fiducie — different tax implications
                  - Switzerland recognises under Hague Convention
            required:
              - jurisdiction
              - recognised
            additionalProperties: false
        assetProtectionFeatures:
          type: object
          $comment: For Cook Islands, Nevis, BVI, and domestic US asset protection trusts.
          description: Asset protection features of the trust. Relevant for Cook Islands, Nevis, BVI, and domestic US asset protection trusts (Delaware, Nevada, South Dakota).
          properties:
            selfSettled:
              type: boolean
              $comment: True if the settlor is also a beneficiary. Affects creditor claims.
              description: Whether the settlor is also a beneficiary. Self-settled trusts face greater creditor vulnerability in most jurisdictions.
              examples:
                - true
                - false
            spendthriftClause:
              type: boolean
              description: Whether the trust contains a spendthrift clause preventing beneficiaries from assigning their interest.
              examples:
                - true
            fraudulentTransferLookback:
              type: string
              $comment: Lookback period for fraudulent transfer claims (e.g., '2 years' for Cook Islands, '6 years' for BVI).
              description: The statutory lookback period for fraudulent transfer claims in the trust's jurisdiction.
              examples:
                - 2 years
                - 6 years
                - 4 years
            domesticationDate:
              type: string
              format: date
              $comment: If an offshore trust was domesticated (moved onshore).
              description: Date the trust was domesticated (moved from offshore to onshore jurisdiction), if applicable.
              examples:
                - '2023-06-01'
          additionalProperties: false
        notes:
          type: string
          description: Free-text notes about this trust. Use for trustee succession plans, special investment mandates, or other non-structured information.
          examples:
            - Trust was established to hold the family's BVI property portfolio
            - Waqf income designated for educational scholarships in perpetuity
      required:
        - id
        - name
        - trustType
        - trustees
        - beneficiaries
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    executor:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/executor.json
      title: Executor
      description: A person appointed to administer an estate. Includes professional executors, administrators (intestacy), and administrators with will annexed.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this executor appointment within the INHERIT document.
          examples:
            - c9d0e1f2-a3b4-5678-c901-23456789abcd
        personId:
          type: string
          format: uuid
          description: Reference to the Person.id of the appointed executor or administrator.
        role:
          type: string
          enum:
            - primary
            - secondary
            - substitute
            - administrator
            - administrator_with_will_annexed
          $comment: 'primary: the first-named executor who acts unless unable or unwilling. secondary: acts alongside the primary executor or takes over if the primary cannot act. substitute: named as a replacement if the primary and secondary cannot act. administrator: appointed by the court when there is no will (intestacy). administrator_with_will_annexed: appointed by the court when the will exists but the named executor cannot or will not act.'
          description: The executor's role in the estate administration.
          examples:
            - primary
            - substitute
            - administrator
        isProfessional:
          type: boolean
          description: Whether this executor is a professional (solicitor, accountant, trust corporation). Professional executors typically charge fees.
          examples:
            - true
            - false
        firmName:
          type: string
          description: Name of the professional firm, if the executor is acting in a professional capacity.
          examples:
            - Irwin Mitchell LLP
            - Evelyn Partners
            - National Westminster Bank Trustee Services
            - Nishimura & Asahi
            - Anjarwalla & Khanna LLP
            - Shardul Amarchand Mangaldas
        grantType:
          type: string
          enum:
            - grant_of_probate
            - letters_of_administration
            - letters_of_administration_with_will_annexed
            - succession_certificate
            - certificate_of_inheritance
            - court_appointment
            - resealing
            - european_certificate_of_succession
          $comment: 'grant_of_probate: E&W/AU/NZ — court confirms the executor named in the will. letters_of_administration: E&W — court appoints an administrator when there is no will. letters_of_administration_with_will_annexed: E&W — court appoints an administrator when the named executor cannot act. succession_certificate: IN/PK — Indian Succession Act s.372, entitles holder to collect assets. certificate_of_inheritance: DE (Erbschein), JP (相続証明書), FR (Acte de notoriété) — certifies inheritance rights. court_appointment: generic court appointment of administrator (various jurisdictions). resealing: a foreign grant is recognised by a local court (common in Commonwealth jurisdictions). european_certificate_of_succession: EU document proving an heir''s or executor''s status under the Brussels IV Regulation.'
          description: The type of grant issued by the court authorising this person to act. Includes territory-neutral alternatives for non-Commonwealth jurisdictions.
          examples:
            - grant_of_probate
            - letters_of_administration
            - succession_certificate
            - certificate_of_inheritance
        grantDate:
          type: string
          format: date
          description: Date the grant was issued.
          examples:
            - '2025-08-01'
        grantReference:
          type: string
          description: Court reference number for the grant.
          examples:
            - PRO-2025-654321
        issuingCourt:
          type: string
          description: Name of the court or registry that issued the grant.
          examples:
            - Leeds District Probate Registry
            - Supreme Court of Victoria
            - Surrogate's Court, New York County
            - Tokyo Family Court
            - Lagos High Court
            - Bombay High Court
        notes:
          type: string
          description: Free-text notes about this executor appointment — reservations, renunciations, or special circumstances.
          examples:
            - Power reserved to the secondary executor
            - Executor renounced — administrator with will annexed appointed
      required:
        - id
        - personId
        - role
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    guardian:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/guardian.json
      title: Guardian
      description: A guardian appointment for a minor child. Supports testamentary, court-appointed, shariah court, community-appointed, and religious court appointments. Guardianship structures include individual, collective, rotating, and family council determined.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this guardian appointment within the INHERIT document.
          examples:
            - d0e1f2a3-b4c5-6789-d012-3456789abcde
        personId:
          type: string
          format: uuid
          description: Reference to the Person.id of the guardian being appointed.
        childPersonId:
          type: string
          format: uuid
          description: Reference to the Person.id of the child this guardian is appointed for.
        role:
          type: string
          enum:
            - primary
            - secondary
            - substitute
          $comment: 'primary: the first-choice guardian. secondary: acts alongside the primary or takes over if primary cannot act. substitute: named replacement if primary and secondary cannot act.'
          description: The guardian's priority in the appointment.
          examples:
            - primary
            - substitute
        appointmentType:
          type: string
          enum:
            - testamentary
            - parental_responsibility
            - court_appointed
            - shariah_court_appointed
            - community_appointed
            - religious_court_appointed
          $comment: 'testamentary: appointed by the parent in their will. parental_responsibility: appointed by a parent with parental responsibility under statute (e.g. Children Act 1989 s.5). court_appointed: appointed by a secular court. shariah_court_appointed: appointed by a Shariah court — Islamic guardianship (hadanah/wilayah). community_appointed: appointed by a community body (e.g. family council in West Africa). religious_court_appointed: appointed by a religious court other than Shariah (e.g. beth din).'
          description: How this guardian was appointed.
          examples:
            - testamentary
            - court_appointed
        guardianshipStructure:
          type: string
          enum:
            - individual
            - collective
            - rotating
            - family_council_determined
          $comment: 'individual: one named guardian. collective: multiple guardians acting jointly. rotating: guardianship rotates among family members (common in some African customary systems). family_council_determined: a family council determines the guardian — the will names the mechanism rather than the person.'
          description: The structure of the guardianship arrangement.
          examples:
            - individual
            - collective
        familyCouncilDecisionRef:
          type: string
          $comment: Reference to a family council decision document or record.
          description: Reference to the family council decision that appointed this guardian, if the appointment was council-determined.
          examples:
            - FC/2025/001 — Ogbuagu family council decision of 15 March 2025
        conditions:
          type: string
          description: Conditions on the guardianship — when it takes effect, any restrictions, or circumstances under which it lapses.
          examples:
            - Takes effect only if both parents die before the child reaches 18
            - Guardian must maintain the child's existing school placement
        notes:
          type: string
          description: Free-text notes about this guardianship appointment.
          examples:
            - Guardian lives in Canada — may need to apply for child's visa
            - Both parents wish the child to be raised in the Islamic faith
            - Guardian Auntie Lakshmi confirmed — child to continue at current school in Mumbai
            - Kwame Mensah agreed to act as guardian — family council approved
      required:
        - id
        - personId
        - childPersonId
        - role
        - appointmentType
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    wish:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/wish.json
      title: Wish
      description: A non-binding (or culturally/religiously binding) wish — funeral, letter of wishes, care instructions, pet care, digital estate, distribution preferences.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this wish within the INHERIT document.
          examples:
            - e1f2a3b4-c5d6-7890-e123-456789abcdef
        wishType:
          type: string
          enum:
            - funeral
            - letter
            - care
            - distribution
            - digital
            - pets
            - general
          $comment: 'funeral: wishes about funeral arrangements — burial vs cremation, ceremony type, music, readings. letter: a letter of wishes to executors or family — guidance on how to exercise discretion. care: care instructions for a dependant (elderly parent, disabled family member). distribution: preferences about how specific items should be distributed informally. digital: instructions for digital accounts and online presence. pets: care arrangements for animals. general: any wish not covered by the other categories.'
          description: The category of wish. Wishes may be non-binding in law but culturally or religiously obligatory.
          examples:
            - funeral
            - letter
            - pets
        title:
          type: string
          description: A short descriptive title for this wish.
          examples:
            - Funeral wishes
            - Letter to my executors
            - Care of my dog Biscuit
            - Digital accounts instructions
        content:
          type: string
          description: The full text content of the wish. May be lengthy for letters of wishes.
          examples:
            - I wish to be cremated and my ashes scattered at Coniston Water
            - Please ensure my cat Mochi is rehomed with my sister Akiko
            - Burial in accordance with Islamic rites — contact Imam Hassan at the East London Mosque
            - Please ensure my dog is cared for by my nephew Tendai
        bindingNature:
          type: string
          enum:
            - non_binding
            - culturally_obligatory
            - religiously_obligatory
            - legally_binding
          $comment: 'non_binding: carries no legal force — guidance only. culturally_obligatory: expected to be followed under cultural norms (e.g. African burial customs). religiously_obligatory: required under religious law (e.g. Islamic burial within 24 hours, Jewish tahara). legally_binding: enforceable by law in the relevant jurisdiction (rare for wishes — most are advisory).'
          description: The legal or moral force of this wish. Most wishes are non-binding but may carry significant cultural or religious weight.
          examples:
            - non_binding
            - religiously_obligatory
        addresseePersonId:
          type: string
          format: uuid
          description: Reference to the Person.id this wish is addressed to — typically an executor, guardian, or family member.
        relatedAssetId:
          type: string
          format: uuid
          description: Reference to an Asset.id this wish relates to (e.g. a pet, a digital account, a specific item).
        notes:
          type: string
          description: Additional notes about this wish.
          examples:
            - Written in consultation with Imam Hassan — follows Hanafi funeral practice
            - Updated after acquiring second dog in 2024
      required:
        - id
        - wishType
        - title
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    document:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/document.json
      title: Document
      description: A document associated with an estate — wills, codicils, trust deeds, and religious documents (shtar_chov, ketubah_document, nikah_nama, etc.). Type is a free string (minLength 1) to accommodate jurisdiction-specific and religious document types.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this document within the INHERIT document.
          examples:
            - b4c5d6e7-f8a9-0123-b456-789abcdef012
        type:
          type: string
          minLength: 1
          $comment: 'Free string — common values include: will, codicil, trust_deed, grant_of_probate, death_certificate, shtar_chov, ketubah_document, nikah_nama, waqfiyyah, deed_of_variation, power_of_attorney.'
          description: The type of document. Free-form text to accommodate the enormous variety of estate-related documents across jurisdictions and legal traditions.
          examples:
            - will
            - codicil
            - trust_deed
            - grant_of_probate
            - death_certificate
            - nikah_nama
            - ketubah_document
            - deed_of_variation
        title:
          type: string
          description: Human-readable title of the document.
          examples:
            - Last Will and Testament of James Davies
            - First Codicil dated 15 June 2024
            - Nikah Nama — Ahmed and Fatimah
            - 遺言書 — 田中裕子
            - Will of Amara Okonkwo
            - Testament de Priya Sharma
        fileFormat:
          type: string
          $comment: File extension or format identifier (e.g. pdf, docx, jpg).
          description: File format or extension. Use lowercase without a leading dot.
          examples:
            - pdf
            - docx
            - jpg
            - png
            - tiff
        storageRef:
          type: string
          description: Storage reference — an S3 URI, file path, external system reference, or document management system identifier.
          examples:
            - s3://estate-docs/wills/davies-2024.pdf
            - DMS/2024/EST/001234
            - /vault/wills/tanaka-2025.pdf
        fileSizeBytes:
          type: integer
          minimum: 0
          description: File size in bytes. Zero for metadata-only entries where the document content is stored externally.
          examples:
            - 245760
            - 1048576
            - 0
        mimeType:
          type: string
          description: MIME type of the document file.
          examples:
            - application/pdf
            - image/jpeg
            - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        createdDate:
          type: string
          format: date
          description: Date the document was created or executed.
          examples:
            - '2024-06-15'
            - '2025-01-20'
        notes:
          type: string
          description: Free-text notes about this document. Use for provenance, authenticity concerns, or handling instructions.
          examples:
            - Original held by Irwin Mitchell LLP, Manchester
            - Certified copy — original lost in 2020 house fire
        entityType:
          type: string
          description: 'The type of entity this document relates to. Combined with entityId, creates a contextual link: ''this PDF is the valuation certificate for asset X''.'
          examples:
            - asset
            - property
            - person
            - estate
            - asset-collection
        entityId:
          type: string
          format: uuid
          description: The ID of the entity this document relates to. Combined with entityType, links the document to its subject.
          examples:
            - a1b2c3d4-0000-4000-a000-000000000001
        images:
          type: array
          items:
            $ref: '#/components/schemas/media'
          description: Scans or photographs of this document — useful when the original is a physical paper document.
      required:
        - id
        - type
        - title
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    nonprobate-transfer:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/nonprobate-transfer.json
      title: Nonprobate Transfer
      description: Assets that pass outside the probate estate — revocable trusts, TOD deeds, POD accounts, JTWROS, beneficiary designations, superannuation/CPF/EPF nominations.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this nonprobate transfer within the INHERIT document.
          examples:
            - c5d6e7f8-a9b0-1234-c567-89abcdef0123
        transferType:
          type: string
          enum:
            - revocable_trust
            - tod_deed
            - pod_account
            - jtwros
            - tenancy_by_entirety
            - beneficiary_designation
            - life_insurance_nomination
            - superannuation_nomination
            - cpf_nomination
            - epf_nomination
            - mandatory_savings_nomination
          $comment: 'revocable_trust: assets in a revocable (living) trust pass to beneficiaries outside probate. tod_deed: transfer-on-death deed — property transfers automatically on death (US states). pod_account: payable-on-death bank account. jtwros: joint tenancy with right of survivorship — deceased''s share passes automatically to survivor(s). tenancy_by_entirety: US spousal joint tenancy — creditor-protected. beneficiary_designation: named beneficiary on a financial account. life_insurance_nomination: named beneficiary on a life insurance policy. superannuation_nomination: Australian superannuation death benefit nomination. cpf_nomination: Singapore Central Provident Fund nomination. epf_nomination: Malaysian Employees Provident Fund nomination. mandatory_savings_nomination: generic for other national provident fund nominations.'
          description: The mechanism by which this asset passes outside the probate estate.
          examples:
            - jtwros
            - life_insurance_nomination
            - superannuation_nomination
        designationType:
          type: string
          description: More specific description of the transfer mechanism.
          examples:
            - JTWROS bank account
            - TOD deed on investment property
            - Binding death benefit nomination
        description:
          type: string
          description: Free-text description of the nonprobate transfer.
          examples:
            - Joint bank account with spouse — passes by survivorship
            - Life insurance policy with Aviva — daughter named as sole beneficiary
        trustId:
          type: string
          format: uuid
          description: Reference to a Trust.id if this transfer is via a revocable trust.
        propertyId:
          type: string
          format: uuid
          description: Reference to a Property.id if this transfer relates to real estate (e.g. TOD deed, JTWROS property).
        assetIds:
          type: array
          items:
            type: string
            format: uuid
          description: References to Asset.id(s) that pass via this nonprobate transfer.
        beneficiaryPersonIds:
          type: array
          items:
            type: string
            format: uuid
          description: Person IDs of the primary beneficiaries or surviving owners who receive the asset.
        contingentBeneficiaryPersonIds:
          type: array
          items:
            type: string
            format: uuid
          description: Person IDs of contingent beneficiaries who receive if the primary beneficiaries predecease.
        survivingOwnerPersonIds:
          type: array
          items:
            type: string
            format: uuid
          description: Person IDs of surviving joint owners for JTWROS and tenancy by entirety transfers.
        passesOutsideEstate:
          type: boolean
          description: Confirmation that this asset passes outside the probate estate. Should always be true for nonprobate transfers.
          examples:
            - true
        bindingNomination:
          type: boolean
          $comment: Whether the nomination is binding on the fund trustee. Australian super nominations may be binding or non-binding.
          description: Whether the beneficiary nomination is legally binding on the fund trustee. Australian superannuation nominations may be binding (valid for 3 years) or non-binding (trustee has discretion).
          examples:
            - true
            - false
        nominationExpiryDate:
          type: string
          format: date
          description: Date the nomination expires, if applicable. Australian binding nominations expire after 3 years and must be renewed.
          examples:
            - '2027-06-15'
        recordingReference:
          type: string
          description: Recording or filing reference for the transfer instrument (e.g. county recorder reference for a TOD deed).
          examples:
            - RECORDER-2024-TOD-001234
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
          description: Jurisdiction governing this nonprobate transfer.
        notes:
          type: string
          description: Free-text notes about this nonprobate transfer.
          examples:
            - Binding nomination renewed March 2024 — expires March 2027
            - TOD deed recorded in Los Angeles County
      required:
        - id
        - transferType
        - passesOutsideEstate
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    ConsentRecord:
      type: object
      description: Record of the testator's consent to proxy authorisation. Supports formal, informal, and culturally appropriate consent methods.
      properties:
        consentGiven:
          type: boolean
          description: Whether the testator has given consent for the proxy to act on their behalf.
          examples:
            - true
        consentDate:
          type: string
          format: date
          description: Date consent was given.
          examples:
            - '2025-03-15'
        consentMethod:
          type: string
          enum:
            - in_person_verbal
            - in_person_written
            - video_recorded
            - witnessed_verbal
            - phone_recorded
            - assumed_cultural_norm
          $comment: 'in_person_verbal: verbal consent given face to face. in_person_written: written consent signed in person. video_recorded: consent recorded via video. witnessed_verbal: verbal consent in the presence of witnesses. phone_recorded: consent given and recorded over the telephone. assumed_cultural_norm: consent assumed under cultural norms where explicit consent is not customary (e.g. eldest son acts for the family). Use with caution — document the cultural basis.'
          description: The method by which consent was obtained.
          examples:
            - in_person_written
            - witnessed_verbal
        witnesses:
          type: array
          description: Witnesses to the consent, if any.
          items:
            type: object
            properties:
              personId:
                type: string
                format: uuid
                description: Reference to the Person.id of the witness.
              role:
                type: string
                $comment: Provenance — e.g. 'family_elder', 'solicitor', 'community_leader', 'imam'.
                description: The role or capacity in which the person witnessed the consent.
                examples:
                  - solicitor
                  - family_elder
                  - community_leader
                  - imam
              witnessedDate:
                type: string
                format: date
                description: Date this person witnessed the consent.
                examples:
                  - '2025-03-15'
            required:
              - personId
            additionalProperties: false
        documentRef:
          type: string
          description: Reference to a document recording the consent.
          examples:
            - DOC-2025-CONSENT-001
        notes:
          type: string
          description: Additional notes about the consent.
          examples:
            - Consent given in the presence of solicitor and two family elders
      required:
        - consentGiven
      additionalProperties: false
    proxy-authorisation:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/proxy-authorisation.json
      title: Proxy Authorisation
      description: Authorises a proxy to act on behalf of a testator — information gathering, communication, negotiation, or full decision-making. Includes consent record with cultural consent methods.
      type: object
      $defs:
        ConsentRecord:
          type: object
          description: Record of the testator's consent to proxy authorisation. Supports formal, informal, and culturally appropriate consent methods.
          properties:
            consentGiven:
              type: boolean
              description: Whether the testator has given consent for the proxy to act on their behalf.
              examples:
                - true
            consentDate:
              type: string
              format: date
              description: Date consent was given.
              examples:
                - '2025-03-15'
            consentMethod:
              type: string
              enum:
                - in_person_verbal
                - in_person_written
                - video_recorded
                - witnessed_verbal
                - phone_recorded
                - assumed_cultural_norm
              $comment: 'in_person_verbal: verbal consent given face to face. in_person_written: written consent signed in person. video_recorded: consent recorded via video. witnessed_verbal: verbal consent in the presence of witnesses. phone_recorded: consent given and recorded over the telephone. assumed_cultural_norm: consent assumed under cultural norms where explicit consent is not customary (e.g. eldest son acts for the family). Use with caution — document the cultural basis.'
              description: The method by which consent was obtained.
              examples:
                - in_person_written
                - witnessed_verbal
            witnesses:
              type: array
              description: Witnesses to the consent, if any.
              items:
                type: object
                properties:
                  personId:
                    type: string
                    format: uuid
                    description: Reference to the Person.id of the witness.
                  role:
                    type: string
                    $comment: Provenance — e.g. 'family_elder', 'solicitor', 'community_leader', 'imam'.
                    description: The role or capacity in which the person witnessed the consent.
                    examples:
                      - solicitor
                      - family_elder
                      - community_leader
                      - imam
                  witnessedDate:
                    type: string
                    format: date
                    description: Date this person witnessed the consent.
                    examples:
                      - '2025-03-15'
                required:
                  - personId
                additionalProperties: false
            documentRef:
              type: string
              description: Reference to a document recording the consent.
              examples:
                - DOC-2025-CONSENT-001
            notes:
              type: string
              description: Additional notes about the consent.
              examples:
                - Consent given in the presence of solicitor and two family elders
          required:
            - consentGiven
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this proxy authorisation within the INHERIT document.
          examples:
            - d6e7f8a9-b0c1-2345-d678-9abcdef01234
        proxyPersonId:
          type: string
          format: uuid
          description: Reference to the Person.id of the authorised proxy.
        testatorPersonId:
          type: string
          format: uuid
          description: Reference to the Person.id of the testator granting the authorisation.
        scope:
          type: string
          enum:
            - full
            - information_gathering
            - communication
            - negotiation
            - decision_making
          $comment: 'full: proxy may act in all capacities. information_gathering: proxy may only gather information about the estate. communication: proxy may communicate with professionals and family on the testator''s behalf. negotiation: proxy may negotiate with dealers, professionals, and other parties. decision_making: proxy may make binding decisions on the testator''s behalf.'
          description: The scope of authority granted to the proxy.
          examples:
            - information_gathering
            - full
        consentRecord:
          $ref: '#/components/schemas/ConsentRecord'
          description: Record of the testator's consent to this proxy authorisation.
        dealerNegotiationPermitted:
          type: boolean
          description: Whether the proxy is specifically authorised to negotiate with dealers and third parties interested in estate assets.
          examples:
            - true
            - false
        startDate:
          type: string
          format: date
          description: Date from which the proxy authorisation is effective.
          examples:
            - '2025-03-15'
        expiryDate:
          type: string
          format: date
          description: Date on which the proxy authorisation expires, if time-limited.
          examples:
            - '2026-03-15'
        revocationDate:
          type: string
          format: date
          description: Date the proxy authorisation was revoked by the testator, if applicable.
          examples:
            - '2025-09-01'
        auditTrailEnabled:
          type: boolean
          description: Whether all actions taken by the proxy should be logged for audit purposes.
          examples:
            - true
        notes:
          type: string
          description: Free-text notes about this proxy authorisation.
          examples:
            - Proxy is testator's daughter — authorised to liaise with Bonhams regarding the art collection
            - Revoked after family disagreement — replaced by new proxy authorisation
      required:
        - id
        - proxyPersonId
        - testatorPersonId
        - scope
        - consentRecord
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    Comparable:
      type: object
      description: A comparable sale or listing used to support the valuation. Capturing comparables with screenshots and metadata creates an auditable evidence trail for executors, HMRC, and probate courts.
      properties:
        url:
          type: string
          format: uri
          description: Link to the comparable sale or listing.
          examples:
            - https://www.ebay.co.uk/itm/123456789
            - https://www.sothebys.com/en/buy/auction/2025/lot-42
        screenshotUrl:
          type: string
          format: uri
          description: Screenshot of the listing at the time it was captured. Listings are often removed after sale — the screenshot preserves the evidence.
          examples:
            - https://storage.example.com/comparables/ebay-123456789.png
        title:
          type: string
          description: Description of the comparable item.
          examples:
            - Hornby R3456 Class 66 EWS DCC Fitted — mint, boxed
            - 18ct gold solitaire diamond ring, 1.1ct, VS2/H
        salePrice:
          $ref: '#/components/schemas/money'
          description: The sale price of the comparable item, in minor currency units.
        saleDate:
          type: string
          format: date
          description: Date the comparable item sold.
          examples:
            - '2025-01-15'
            - '2024-11-20'
        platform:
          type: string
          description: Where the comparable sold — marketplace, auction house, or dealer.
          examples:
            - eBay
            - Sotheby's
            - Bonhams
            - Catawiki
            - 1stDibs
            - The Saleroom
            - Rightmove
            - Zoopla
        capturedAt:
          type: string
          format: date
          description: Date the comparable was captured or recorded. Important because market values shift and stale comparables lose evidential weight.
          examples:
            - '2025-02-01'
            - '2025-03-10'
        matchConfidence:
          type: string
          enum:
            - exact
            - close
            - approximate
            - weak
          $comment: 'exact: same item, same condition, same era — direct comparison. close: very similar item with minor differences (e.g. different colourway, slightly different specification). approximate: broadly similar item — same category and era but notable differences. weak: loosely related — useful for establishing a price range but not a direct comparison.'
          description: How closely the comparable matches the item being valued.
          examples:
            - close
            - approximate
        matchFactors:
          type: array
          items:
            type: string
          description: What makes this item comparable — the specific attributes that justify the comparison.
          examples:
            - - same manufacturer
              - same era
              - similar condition
              - original box
            - - same carat weight
              - similar clarity grade
              - same metal
        matchNotes:
          type: string
          description: Free-text notes explaining the comparison — differences, adjustments, or caveats.
          examples:
            - Slightly lower carat weight (1.1ct vs 1.2ct) but same clarity — adjust upward ~8%
            - US sale — add 5% for UK market premium on this brand
      additionalProperties: false
    valuation:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/valuation.json
      title: Valuation
      description: A valuation of an estate asset, property, or asset collection. Supports multiple valuations per entity over time — owner estimates, professional valuations, AI analyses, dealer offers, and probate-agreed figures.
      type: object
      $defs:
        Comparable:
          type: object
          description: A comparable sale or listing used to support the valuation. Capturing comparables with screenshots and metadata creates an auditable evidence trail for executors, HMRC, and probate courts.
          properties:
            url:
              type: string
              format: uri
              description: Link to the comparable sale or listing.
              examples:
                - https://www.ebay.co.uk/itm/123456789
                - https://www.sothebys.com/en/buy/auction/2025/lot-42
            screenshotUrl:
              type: string
              format: uri
              description: Screenshot of the listing at the time it was captured. Listings are often removed after sale — the screenshot preserves the evidence.
              examples:
                - https://storage.example.com/comparables/ebay-123456789.png
            title:
              type: string
              description: Description of the comparable item.
              examples:
                - Hornby R3456 Class 66 EWS DCC Fitted — mint, boxed
                - 18ct gold solitaire diamond ring, 1.1ct, VS2/H
            salePrice:
              $ref: '#/components/schemas/money'
              description: The sale price of the comparable item, in minor currency units.
            saleDate:
              type: string
              format: date
              description: Date the comparable item sold.
              examples:
                - '2025-01-15'
                - '2024-11-20'
            platform:
              type: string
              description: Where the comparable sold — marketplace, auction house, or dealer.
              examples:
                - eBay
                - Sotheby's
                - Bonhams
                - Catawiki
                - 1stDibs
                - The Saleroom
                - Rightmove
                - Zoopla
            capturedAt:
              type: string
              format: date
              description: Date the comparable was captured or recorded. Important because market values shift and stale comparables lose evidential weight.
              examples:
                - '2025-02-01'
                - '2025-03-10'
            matchConfidence:
              type: string
              enum:
                - exact
                - close
                - approximate
                - weak
              $comment: 'exact: same item, same condition, same era — direct comparison. close: very similar item with minor differences (e.g. different colourway, slightly different specification). approximate: broadly similar item — same category and era but notable differences. weak: loosely related — useful for establishing a price range but not a direct comparison.'
              description: How closely the comparable matches the item being valued.
              examples:
                - close
                - approximate
            matchFactors:
              type: array
              items:
                type: string
              description: What makes this item comparable — the specific attributes that justify the comparison.
              examples:
                - - same manufacturer
                  - same era
                  - similar condition
                  - original box
                - - same carat weight
                  - similar clarity grade
                  - same metal
            matchNotes:
              type: string
              description: Free-text notes explaining the comparison — differences, adjustments, or caveats.
              examples:
                - Slightly lower carat weight (1.1ct vs 1.2ct) but same clarity — adjust upward ~8%
                - US sale — add 5% for UK market premium on this brand
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this valuation within the INHERIT document.
          examples:
            - a1b2c3d4-e5f6-7890-abcd-ef0123456789
        entityType:
          type: string
          enum:
            - asset
            - property
            - asset_collection
          $comment: 'asset: a valuation of a single Asset. property: a valuation of a Property. asset_collection: a valuation of an AssetCollection as a whole (which may differ from the sum of individual asset valuations).'
          description: The type of entity being valued.
          examples:
            - asset
            - property
        entityId:
          type: string
          format: uuid
          description: Reference to the entity being valued — an Asset.id, Property.id, or AssetCollection.id.
          examples:
            - e5f6a7b8-c9d0-1234-ef01-23456789abcd
        valuedAmount:
          $ref: '#/components/schemas/money'
          description: The valuation amount, in minor currency units.
        valuationDate:
          type: string
          format: date
          description: Date the valuation was performed or assessed.
          examples:
            - '2025-01-15'
            - '2025-03-28'
        provider:
          type: string
          description: Who performed the valuation — the name of the person, firm, or service.
          examples:
            - Bonhams
            - RICS Surveyor — John Smith FRICS
            - HMRC Shares & Assets Valuation
            - OpenInherit AI
            - Estate owner
        providerType:
          type: string
          enum:
            - owner
            - professional_valuer
            - auction_house
            - dealer
            - insurance_assessor
            - tax_authority
            - ai_estimate
            - other
          $comment: 'owner: the asset owner''s own estimate. professional_valuer: a qualified valuer (RICS, ASA, IVSC-accredited). auction_house: valuation by an auction house (Bonhams, Christie''s, Sotheby''s). dealer: valuation by a specialist dealer. insurance_assessor: valuation for insurance purposes. tax_authority: valuation agreed with or imposed by a tax authority (HMRC, IRS). ai_estimate: automated valuation by an AI or algorithmic model. other: any other type of valuer.'
          description: The type of person or organisation that provided the valuation.
          examples:
            - professional_valuer
            - auction_house
            - ai_estimate
        method:
          type: string
          enum:
            - comparable_sales
            - replacement_cost
            - income_approach
            - market_listing
            - insurance_schedule
            - ai_analysis
            - expert_opinion
            - other
          $comment: 'comparable_sales: based on recent sales of similar items — the most common method for personal property and real estate. replacement_cost: cost to replace the item with an equivalent — common for insurance valuations. income_approach: value based on income the asset generates (rental yield, dividend income) — common for investment properties and business interests. market_listing: value derived from current market listings for similar items. insurance_schedule: value stated on an existing insurance schedule or policy. ai_analysis: automated valuation using AI, machine learning, or algorithmic models. expert_opinion: professional judgement by a qualified expert without formal methodology. other: any other valuation method.'
          description: The valuation methodology used.
          examples:
            - comparable_sales
            - expert_opinion
            - ai_analysis
        valuationPurpose:
          type: string
          enum:
            - current_estimate
            - date_of_death
            - insurance
            - official
            - tax_return
            - dealer_offer
            - ai_estimate
            - pre_sale
            - probate
          $comment: 'current_estimate: a current market value estimate for planning purposes. date_of_death: valuation as at the date of death — required for IHT and estate tax. insurance: valuation for insurance cover (often replacement cost, which may exceed market value). official: valuation agreed with or imposed by an official body. tax_return: valuation for inclusion on a tax return. dealer_offer: a valuation implicit in a dealer''s offer to purchase. ai_estimate: an automated estimate for initial triage and planning. pre_sale: valuation in anticipation of sale. probate: valuation submitted for and accepted by the probate court.'
          description: The purpose for which this valuation was obtained.
          examples:
            - date_of_death
            - insurance
            - probate
        confidence:
          type: string
          enum:
            - high
            - medium
            - low
            - unknown
          $comment: 'high: strong evidential basis — professional valuation, multiple close comparables, or agreed with tax authority. medium: reasonable basis but some uncertainty — fewer comparables, older data, or owner estimate with domain knowledge. low: limited evidence — rough estimate, weak comparables, or unfamiliar category. unknown: confidence has not been assessed.'
          description: Confidence level in this valuation.
          examples:
            - high
            - medium
        comparables:
          type: array
          items:
            $ref: '#/components/schemas/Comparable'
          description: Comparable sales or listings used to support this valuation. Building a library of comparables strengthens the evidential basis for probate, tax, and insurance purposes.
        notes:
          type: string
          description: Free-text notes about this valuation — methodology details, caveats, market conditions, or disagreements with other valuations.
          examples:
            - RICS Red Book valuation — market value basis. Assumes vacant possession.
            - AI estimate based on 47 eBay sold listings over the past 90 days. Excludes outliers above £500.
            - Owner estimate — collected model railways for 30 years, knowledgeable about market values in this niche.
      required:
        - id
        - entityType
        - entityId
        - valuedAmount
        - valuationDate
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    lifetime-transfer:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/lifetime-transfer.json
      title: Lifetime Transfer
      description: A gift or transfer made during the testator's lifetime, relevant for tax calculations such as the UK 7-year rule, US unified gift/estate tax, and similar lookback provisions in other jurisdictions.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this lifetime transfer within the INHERIT document.
          examples:
            - d4e5f6a7-b8c9-0123-d456-789abcdef012
        transferDate:
          type: string
          format: date
          description: Date the transfer was made.
          examples:
            - '2020-03-15'
            - '2023-11-01'
        donorPersonId:
          type: string
          format: uuid
          description: Reference to the Person.id of the donor (typically the testator).
        doneePersonIds:
          type: array
          items:
            type: string
            format: uuid
          description: Person IDs of the recipients of the transfer.
        transferType:
          type: string
          enum:
            - gift
            - potentially_exempt_transfer
            - chargeable_lifetime_transfer
            - gift_with_reservation
            - failed_pet
            - settlement
            - advancement
            - loan_forgiveness
            - sale_at_undervalue
            - gift_of_shares
            - other
          $comment: 'gift: outright gift. potentially_exempt_transfer: UK PET (exempt if donor survives 7 years). chargeable_lifetime_transfer: UK CLT (into trust). gift_with_reservation: donor retains benefit. failed_pet: PET where donor died within 7 years. settlement: transfer into a settlement/trust. advancement: advance of inheritance. loan_forgiveness: debt written off. sale_at_undervalue: deliberate deprivation. gift_of_shares: transfer of company shares. other: any other type.'
          description: The category of lifetime transfer.
          examples:
            - gift
            - potentially_exempt_transfer
            - chargeable_lifetime_transfer
        value:
          $ref: '#/components/schemas/money'
          description: Value of the transfer at the date it was made, in minor currency units.
        assetId:
          type: string
          format: uuid
          description: Reference to the Asset.id of the asset transferred, if it is still recorded in the document.
        propertyId:
          type: string
          format: uuid
          description: Reference to the Property.id of the property transferred.
        valuationId:
          type: string
          format: uuid
          description: Reference to a Valuation entity providing a formal valuation of the transferred asset.
        exemptionsClaimed:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - annual_exemption
                  - small_gift
                  - marriage_gift
                  - normal_expenditure
                  - business_property_relief
                  - agricultural_property_relief
                  - spouse_exemption
                  - charity_exemption
                  - taper_relief
                  - annual_exclusion
                  - lifetime_exemption
                  - gift_splitting
                  - other
                $comment: 'annual_exemption: UK annual exemption (currently GBP 3,000 per tax year). small_gift: UK small gifts exemption (GBP 250 per recipient per tax year). marriage_gift: UK exemption for gifts in consideration of marriage or civil partnership. normal_expenditure: UK exemption for gifts from surplus income as part of normal expenditure. business_property_relief: UK BPR — relief on transfers of qualifying business assets. agricultural_property_relief: UK APR — relief on transfers of qualifying agricultural property. spouse_exemption: transfers between spouses or civil partners (exempt in most jurisdictions). charity_exemption: transfers to qualifying charities. taper_relief: UK taper relief reducing IHT on failed PETs between 3 and 7 years. annual_exclusion: US annual gift tax exclusion (per donee per year). lifetime_exemption: US unified lifetime gift/estate tax exemption. gift_splitting: US election to split gifts between spouses. other: any other exemption or relief not covered above.'
                description: The type of exemption or relief claimed against this transfer.
                examples:
                  - annual_exemption
                  - spouse_exemption
                  - annual_exclusion
              amount:
                $ref: '#/components/schemas/money'
                description: Amount of the exemption claimed, in minor currency units.
              notes:
                type: string
                description: Free-text notes about this exemption claim.
                examples:
                  - Used remaining GBP 1,500 of annual exemption carried forward from previous tax year
                  - Gift splitting election filed jointly with spouse on Form 709
            required:
              - type
            additionalProperties: false
          description: Exemptions and reliefs claimed against this transfer to reduce its taxable value.
        taxReturnFiled:
          type: boolean
          description: Whether a gift tax return or similar filing has been submitted for this transfer.
          examples:
            - true
            - false
        taxPaid:
          $ref: '#/components/schemas/money'
          description: Amount of tax paid on this transfer, in minor currency units.
        lookbackRelevant:
          type: boolean
          description: Whether this transfer falls within the jurisdiction's lookback period for tax purposes (e.g. 7 years in the UK, 3 years in the US for certain gifts).
          examples:
            - true
            - false
        lookbackYearsRemaining:
          type: number
          minimum: 0
          description: Years remaining in the lookback period. In the UK, this counts down from 7 — a PET made 4 years before death has 3 years remaining.
          examples:
            - 7
            - 3.5
            - 0
        taperReliefPercentage:
          type: number
          minimum: 0
          maximum: 100
          description: UK taper relief percentage reducing the IHT charge on failed PETs and CLTs. Ranges from 0% (3 years or less before death) to 40% reduction (6-7 years before death).
          examples:
            - 0
            - 20
            - 40
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
          description: Jurisdiction governing this lifetime transfer.
        notes:
          type: string
          description: Free-text notes about this lifetime transfer.
          examples:
            - Gift of family home to daughter — donor continued to live in the property, so gift with reservation rules apply
            - PET made 5 years before death — taper relief reduces IHT by 40%
      required:
        - id
        - transferDate
        - donorPersonId
        - transferType
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    InterestedParty:
      type: object
      description: A third party expressing interest in purchasing or acquiring estate assets.
      properties:
        personId:
          type: string
          format: uuid
          description: Reference to a Person.id if the interested party is an individual in the people array.
        name:
          type: string
          description: Name of the interested party — individual or organisation.
          examples:
            - Christie's
            - Savills
            - Dr Heinrich Müller
            - Bonhams
            - Galerie Tanaka, Tokyo
            - Rahul Mehta Fine Art
            - Al-Futtaim Auction House
        type:
          type: string
          enum:
            - art_dealer
            - antique_dealer
            - property_investor
            - auction_house
            - gallery
            - private_collector
            - museum
            - institution
            - charity
            - developer
            - fund_manager
            - family_office
            - estate_agent
            - legal_practice
            - other
          $comment: 'art_dealer: professional art dealer. antique_dealer: dealer in antiques and collectibles. property_investor: individual or company interested in purchasing property. auction_house: auction house (Christie''s, Sotheby''s, Bonhams). gallery: art gallery interested in acquiring works. private_collector: individual collector. museum: museum interested in acquisition or donation. institution: academic or cultural institution. charity: charitable organisation interested in a bequest or donation. developer: property developer. fund_manager: investment fund manager. family_office: family office managing wealth. estate_agent: estate agent or realtor. legal_practice: law firm or legal practice acting for a buyer — territory-neutral term replacing ''solicitor_firm''. other: any other type of interested party.'
          description: The type of interested party.
