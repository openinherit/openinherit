        - type
        - partners
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    property:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/property.json
      title: Property
      description: Real estate. Supports individual ownership, communal/family property (Nigeria), HUF coparcenary (India), government-vested land (Land Use Act), US community property, and informal/unregistered holdings.
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          description: Display name (e.g. 'Family Home', '42 Acacia Avenue')
        propertyType:
          type: string
          enum:
            - detached_house
            - semi_detached_house
            - terraced_house
            - flat
            - maisonette
            - bungalow
            - cottage
            - farmhouse
            - barn_conversion
            - land
            - commercial
            - mixed_use
            - houseboat
            - mobile_home
            - other
        address:
          $ref: '#/components/schemas/address'
        estimatedValue:
          $ref: '#/components/schemas/money'
        professionalValuation:
          $ref: '#/components/schemas/money'
        valuationDate:
          type: string
          format: date
        valuationConfidence:
          type: string
          enum:
            - estimated
            - professional
            - probate
            - unknown
        isPrimaryResidence:
          type: boolean
          $comment: Annotation only — JSON Schema 'default' does not insert values. Consuming apps must implement defaulting.
        ownershipType:
          type: string
          enum:
            - sole
            - joint_tenants
            - tenants_in_common
            - trust
            - tenancy_by_entirety
          $comment: tenancy_by_entirety = US spousal joint tenancy (PA, FL, MA, IL, OH, etc.). Survives creditors of the deceased spouse.
        ownershipPercentage:
          type: number
          minimum: 0
          maximum: 100
          multipleOf: 0.01
          $comment: Capped at 2 decimal places. For legal disputes requiring higher precision, use notes.
        ownershipModel:
          type: string
          enum:
            - individual
            - joint
            - communal_family
            - huf_coparcenary
            - tribal
            - government_vested
            - trust_held
          $comment: communal_family = Nigerian family land, clan property. huf_coparcenary = Hindu Undivided Family joint property (India). government_vested = Nigerian Certificate of Occupancy. tribal = indigenous/tribal communal land.
        acquisitionType:
          type: string
          enum:
            - self_acquired
            - ancestral_joint
            - ancestral_severed
            - inherited
            - gifted
            - stridhan
            - communal
            - waqf_endowed
          $comment: Determines which succession law applies in India. ancestral_joint = coparcenary (devolves by survivorship). self_acquired = succession (devolves by will/intestacy). stridhan = Hindu woman's absolute property.
        tenureType:
          type: string
          enum:
            - freehold
            - leasehold
            - certificate_of_occupancy
            - customary_right_of_occupancy
            - communal
            - government_allocated
            - traditional_authority_granted
            - informal_unregistered
          $comment: 'Nigerian Land Use Act 1978: all urban land vested in state governor — you hold a Certificate of Occupancy, not freehold.'
        registrationStatus:
          type: string
          enum:
            - formally_registered
            - informally_held
            - community_acknowledged
            - disputed
            - undocumented
        ownershipEvidence:
          type: string
          enum:
            - title_deed
            - certificate_of_occupancy
            - family_recognition
            - community_testimony
            - receipts_only
            - none
        applicableSuccessionLaw:
          type: object
          $comment: Which succession law governs this property. Immoveables typically governed by lex rei sitae (law where the property is situated).
          properties:
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            lawName:
              type: string
              $comment: e.g., 'Hindu Succession Act 1956', 'Japanese Civil Code'
            section:
              type: string
              $comment: e.g., 's.6 (coparcenary)'
          required:
            - jurisdiction
          additionalProperties: false
        custodianPersonId:
          type: string
          format: uuid
          $comment: 'For communal/family property: the current custodian (not owner). On death, custodianship passes by custom, not by will.'
        successionRule:
          type: string
          enum:
            - testamentary
            - intestacy
            - customary_eldest_son
            - customary_family_council
            - customary_matrilineal
            - survivorship
            - not_individually_bequeathable
          $comment: How this property passes on death. 'not_individually_bequeathable' = communal property that cannot be included in a will.
        governmentConsentRequired:
          type: boolean
          $comment: 'Nigerian Land Use Act: governor''s consent required for all transfers of rights. Some Indian states require similar for agricultural land.'
        mobilityType:
          type: string
          enum:
            - immoveable
            - moveable
            - mixed
          $comment: Relevant for Shia inheritance (immoveable property rules differ), French succession (lex rei sitae), and halachic bekhor rules.
        mortgageOutstanding:
          $ref: '#/components/schemas/money'
        characterClassification:
          type: string
          enum:
            - community
            - separate
            - quasi_community
            - mixed
            - not_applicable
          $comment: 'US community property states (CA, TX, AZ, WA, NV, NM, LA, ID, WI): community = 50/50. quasi_community = CA-specific (property acquired in a non-community state but treated as community on divorce/death). ''not_applicable'' for jurisdictions without this distinction.'
        homesteadStatus:
          type: object
          $comment: 'Homestead exemption protects primary residence from creditors and may restrict devise. Florida: unlimited value. Texas: 200 acres rural / 10 acres urban.'
          properties:
            isHomestead:
              type: boolean
            exemptionAmount:
              $ref: '#/components/schemas/money'
            exemptionUnlimited:
              type: boolean
              $comment: Florida, Texas (rural), Iowa, Kansas, Oklahoma, South Dakota.
            deviseRestriction:
              type: boolean
              $comment: 'Florida: cannot devise homestead away from spouse/minor children.'
            notes:
              type: string
          additionalProperties: false
        passesOutsideEstate:
          type: boolean
          $comment: True if this property passes outside probate (JTWROS, TOD deed, trust-held). NOT distributed under the will.
        statutoryLifeEstate:
          type: object
          $comment: Statutory life estate imposed by law (Alberta Dower Act, Florida homestead devise restriction). Not the same as a testamentary life interest.
          properties:
            beneficiaryPersonId:
              type: string
              format: uuid
            basis:
              type: string
              $comment: Legal basis — e.g., 'Alberta Dower Act', 'Florida Constitution Art. X s.4'
            conditions:
              type: string
          additionalProperties: false
        notes:
          type: string
      required:
        - id
        - name
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    Photo:
      type: object
      properties:
        url:
          type: string
          format: uri
        caption:
          type: string
      required:
        - url
      additionalProperties: false
    asset:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/asset.json
      title: Asset
      description: 'A non-property asset: financial accounts, personal property, vehicles, digital assets, business interests, Islamic finance instruments, etc.'
      type: object
      $defs:
        Photo:
          type: object
          properties:
            url:
              type: string
              format: uri
            caption:
              type: string
          required:
            - url
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          description: Display name for this asset
        category:
          type: string
          enum:
            - bank_account
            - savings_account
            - investment
            - pension
            - shares
            - premium_bonds
            - cryptocurrency
            - insurance
            - vehicle
            - jewellery
            - art
            - antiques
            - collectibles
            - furniture
            - electronics
            - musical_instruments
            - books
            - clothing
            - kitchenware
            - sports_equipment
            - firearms
            - wine_and_spirits
            - tools
            - garden_and_outdoor
            - business_interest
            - intellectual_property
            - domain_name
            - social_media_account
            - digital_subscription
            - sukuk
            - takaful
            - islamic_deposit
            - other
          $comment: sukuk = Islamic bond. takaful = Islamic insurance. islamic_deposit = Shariah-compliant deposit.
        subcategory:
          type: string
        estimatedValue:
          $ref: '#/components/schemas/money'
        professionalValuation:
          $ref: '#/components/schemas/money'
        valuationDate:
          type: string
          format: date
        valuationConfidence:
          type: string
          enum:
            - estimated
            - professional
            - probate
            - unknown
        condition:
          type: string
          enum:
            - excellent
            - good
            - fair
            - poor
            - unknown
            - not_applicable
          $comment: Use 'not_applicable' for financial assets.
        quantity:
          type: integer
          minimum: 1
        location:
          type: string
          description: Where this asset is stored or held
        propertyId:
          type: string
          format: uuid
          description: Reference to a Property.id if located at a property
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/identifier'
          description: Serial numbers, account numbers, policy refs, etc.
        photos:
          type: array
          items:
            $ref: '#/components/schemas/Photo'
        possessionStatus:
          type: string
          enum:
            - possessed_at_death
            - receivable
            - contingent
          $comment: Distinguishes assets held at death from those receivable after (insurance payouts, debts owed). Under halacha, the bekhor's double portion applies only to 'possessed_at_death' (muchzak), not 'receivable' (ra'ui). Useful for probate valuations universally.
        mobilityType:
          type: string
          enum:
            - immoveable
            - moveable
            - mixed
          $comment: Relevant for Shia inheritance and French lex rei sitae.
        acquisitionType:
          type: string
          enum:
            - self_acquired
            - ancestral_joint
            - ancestral_severed
            - inherited
            - gifted
            - stridhan
            - communal
            - waqf_endowed
        registrationStatus:
          type: string
          enum:
            - formally_registered
            - informally_held
            - community_acknowledged
            - disputed
            - undocumented
        ownershipEvidence:
          type: string
          enum:
            - title_deed
            - certificate_of_occupancy
            - family_recognition
            - community_testimony
            - receipts_only
            - none
        applicableSuccessionLaw:
          type: object
          properties:
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            lawName:
              type: string
            section:
              type: string
          required:
            - jurisdiction
          additionalProperties: false
        beneficiaryDesignation:
          type: object
          $comment: For assets with named beneficiaries (retirement accounts, life insurance, POD bank accounts). These pass OUTSIDE the estate.
          properties:
            primaryBeneficiaryPersonIds:
              type: array
              items:
                type: string
                format: uuid
            contingentBeneficiaryPersonIds:
              type: array
              items:
                type: string
                format: uuid
            designationType:
              type: string
              enum:
                - retirement_account
                - life_insurance
                - superannuation
                - pod_account
                - other
            linkedNonprobateTransferId:
              type: string
              format: uuid
          additionalProperties: false
        digitalAccessConsent:
          type: object
          $comment: RUFADAA (Revised Uniform Fiduciary Access to Digital Assets Act) — adopted by ~47 US states. Controls whether fiduciaries can access digital assets.
          properties:
            consentGiven:
              type: boolean
            scope:
              type: string
              enum:
                - full_access
                - limited_access
                - no_access
            designatedRecipientPersonId:
              type: string
              format: uuid
            onlineToolDirective:
              type: boolean
              $comment: Whether the user set access directives via the platform's own tool (takes priority under RUFADAA).
          additionalProperties: false
        passesOutsideEstate:
          type: boolean
          $comment: True if this asset passes outside probate (beneficiary designation, POD, TOD). NOT distributed under the will.
        notes:
          type: string
      required:
        - id
        - name
        - category
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    liability:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/liability.json
      title: Liability
      description: A debt or financial obligation. Includes mortgages, loans, credit cards, and cultural obligations (mahr, ketubah debt, lobola) that are priority debts in certain jurisdictions.
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - mortgage
            - personal_loan
            - credit_card
            - overdraft
            - student_loan
            - car_finance
            - hire_purchase
            - mahr
            - ketubah_debt
            - lobola
            - tax_liability
            - funeral_costs
            - care_fees
            - mezonot
            - other
          $comment: mahr = Islamic deferred bridal gift (priority debt). ketubah_debt = Jewish marriage contract obligation. lobola = African customary bride price. mezonot = Jewish widow's maintenance obligation.
        creditor:
          type: string
          description: Name of the creditor or institution
        amount:
          $ref: '#/components/schemas/money'
          description: Outstanding balance
        securedAgainst:
          type: string
          format: uuid
          description: Reference to a Property.id or Asset.id this liability is secured against
        monthlyPayment:
          $ref: '#/components/schemas/money'
        interestRate:
          type: number
          minimum: 0
          description: Annual interest rate as percentage (e.g. 4.5 = 4.5%)
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        accountReference:
          type: string
          description: Account or reference number
        notes:
          type: string
      required:
        - id
        - type
        - amount
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    BeneficiaryOrganisation:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - charity
            - company
            - unincorporated_association
            - trust
            - other
        registrationNumber:
          type: string
        jurisdiction:
          $ref: '#/components/schemas/jurisdiction'
      required:
        - name
        - type
      additionalProperties: false
    LifeInterest:
      type: object
      properties:
        tenantForLifeId:
          type: string
          format: uuid
        remaindermanId:
          type: string
          format: uuid
        remaindermanClassDefinition:
          type: string
        interestType:
          type: string
          enum:
            - use_and_income
            - income_only
            - use_only
            - protective
            - right_of_residence
      required:
        - tenantForLifeId
        - interestType
      additionalProperties: false
    Substitution:
      type: object
      properties:
        beneficiaryId:
          type: string
          format: uuid
        classDefinition:
          type: string
        beneficiaryOrganisation:
          $ref: '#/components/schemas/BeneficiaryOrganisation'
        condition:
          type: string
        perStirpes:
          type: boolean
      additionalProperties: false
    PostDeathAction:
      type: object
      properties:
        type:
          type: string
          enum:
            - disclaimer
            - deed_of_variation
            - appropriation
            - assent
        date:
          type: string
          format: date
        description:
          type: string
        documentId:
          type: string
          format: uuid
      required:
        - type
      additionalProperties: false
    InheritanceResponse:
      type: object
      properties:
        response:
          type: string
          enum:
            - accepted
            - renounced
            - qualified_acceptance
            - pending
        responseDate:
          type: string
          format: date
        responsePersonId:
          type: string
          format: uuid
        courtFiled:
          type: boolean
        deadlineDate:
          type: string
          format: date
      required:
        - response
      additionalProperties: false
    bequest:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/bequest.json
      title: Bequest
      description: A disposition of property or money in a will. Supports 7 core types (specific, pecuniary, demonstrative, general, residuary, life_interest, class) and extension types via extensionType (e.g. wasiyya, halachic_matanah).
      type: object
      $defs:
        BeneficiaryOrganisation:
          type: object
          properties:
            name:
              type: string
            type:
              type: string
              enum:
                - charity
                - company
                - unincorporated_association
                - trust
                - other
            registrationNumber:
              type: string
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
          required:
            - name
            - type
          additionalProperties: false
        LifeInterest:
          type: object
          properties:
            tenantForLifeId:
              type: string
              format: uuid
            remaindermanId:
              type: string
              format: uuid
            remaindermanClassDefinition:
              type: string
            interestType:
              type: string
              enum:
                - use_and_income
                - income_only
                - use_only
                - protective
                - right_of_residence
          required:
            - tenantForLifeId
            - interestType
          additionalProperties: false
        Substitution:
          type: object
          properties:
            beneficiaryId:
              type: string
              format: uuid
            classDefinition:
              type: string
            beneficiaryOrganisation:
              $ref: '#/components/schemas/BeneficiaryOrganisation'
            condition:
              type: string
            perStirpes:
              type: boolean
          additionalProperties: false
        PostDeathAction:
          type: object
          properties:
            type:
              type: string
              enum:
                - disclaimer
                - deed_of_variation
                - appropriation
                - assent
            date:
              type: string
              format: date
            description:
              type: string
            documentId:
              type: string
              format: uuid
          required:
            - type
          additionalProperties: false
        InheritanceResponse:
          type: object
          properties:
            response:
              type: string
              enum:
                - accepted
                - renounced
                - qualified_acceptance
                - pending
            responseDate:
              type: string
              format: date
            responsePersonId:
              type: string
              format: uuid
            courtFiled:
              type: boolean
            deadlineDate:
              type: string
              format: date
          required:
            - response
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - specific
            - pecuniary
            - demonstrative
            - general
            - residuary
            - life_interest
            - class
        extensionType:
          type: string
          $comment: Non-core bequest types (e.g. wasiyya, halachic_matanah). When set, extension schemas handle validation.
        beneficiaryId:
          type: string
          format: uuid
        beneficiaryOrganisation:
          $ref: '#/components/schemas/BeneficiaryOrganisation'
        classDefinition:
          type: string
          $comment: Natural-language description of the class of beneficiaries (e.g. 'All my grandchildren living at my death').
        lifeInterest:
          $ref: '#/components/schemas/LifeInterest'
        amount:
          $ref: '#/components/schemas/money'
        sharePercentage:
          type: number
          minimum: 0
          maximum: 100
        description:
          type: string
        sourceAssetId:
          type: string
          format: uuid
          $comment: For demonstrative bequests — the asset from which the amount should be paid.
        conditions:
          type: array
          items:
            type: string
          $comment: Conditions that must be met before the bequest takes effect.
        substitutions:
          type: array
          items:
            $ref: '#/components/schemas/Substitution'
        hotchpot:
          type: boolean
          $comment: Whether lifetime gifts to the beneficiary should be brought into account when calculating their share.
        distributionMethod:
          type: string
          enum:
            - per_capita
            - per_stirpes
            - modified_per_stirpes
            - per_capita_at_each_generation
            - halachic_yerusha
        predeceaseRule:
          type: string
          enum:
            - lapse
            - per_stirpes
            - substitution
            - accrual
            - statutory_default
          $comment: What happens if the beneficiary predeceases the testator. lapse = gift fails. per_stirpes = passes to beneficiary's issue. substitution = passes to named substitute. accrual = redistributed among surviving co-beneficiaries. statutory_default = jurisdiction's default rule applies.
        constrainedBy:
          type: string
          enum:
            - testamentary_freedom
            - customary_rule
            - forced_heirship
            - religious_rule
            - coparcenary_survivorship
        customaryOverride:
          type: boolean
          $comment: Whether customary/religious law overrides testamentary freedom for this bequest.
        postDeathActions:
          type: array
          items:
            $ref: '#/components/schemas/PostDeathAction'
        inheritanceResponse:
          $ref: '#/components/schemas/InheritanceResponse'
        notes:
          type: string
      required:
        - id
        - type
      allOf:
        - $comment: Core types (specific, pecuniary, demonstrative, general, residuary) require beneficiaryId OR beneficiaryOrganisation. When extensionType is set, extension schema handles validation.
          if:
            properties:
              type:
                enum:
                  - specific
                  - pecuniary
                  - demonstrative
                  - general
                  - residuary
            required:
              - type
            not:
              required:
                - extensionType
          then:
            anyOf:
              - required:
                  - beneficiaryId
              - required:
                  - beneficiaryOrganisation
        - $comment: Class bequests require classDefinition.
          if:
            properties:
              type:
                const: class
            required:
              - type
          then:
            required:
              - classDefinition
        - $comment: Life interest bequests require lifeInterest object.
          if:
            properties:
              type:
                const: life_interest
            required:
              - type
          then:
            required:
              - lifeInterest
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    TrustAppointee:
      type: object
      properties:
        personId:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - trustee
            - protector
            - enforcer
      required:
        - personId
        - role
      additionalProperties: false
    TrustBeneficiary:
      type: object
      properties:
        personId:
          type: string
          format: uuid
        classDefinition:
          type: string
        organisationName:
          type: string
        interestType:
          type: string
          enum:
            - income
            - capital
            - both
            - discretionary
      required:
        - interestType
      additionalProperties: false
    trust:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/trust.json
      title: Trust
      description: A trust instrument — testamentary or inter vivos. Covers discretionary, bare, life interest, charitable, nil rate band, waqf (Islamic endowment), and offshore structures with governance features (reserved powers, flee clauses, protector powers).
      type: object
      $defs:
        TrustAppointee:
          type: object
          properties:
            personId:
              type: string
              format: uuid
            role:
              type: string
              enum:
                - trustee
                - protector
                - enforcer
          required:
            - personId
            - role
          additionalProperties: false
        TrustBeneficiary:
          type: object
          properties:
            personId:
              type: string
              format: uuid
            classDefinition:
              type: string
            organisationName:
              type: string
            interestType:
              type: string
              enum:
                - income
                - capital
                - both
                - discretionary
          required:
            - interestType
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum:
            - discretionary
            - life_interest
            - bare
            - accumulation_and_maintenance
            - disabled_persons
            - charitable
            - nil_rate_band
            - waqf
            - other
        trustees:
          type: array
          items:
            $ref: '#/components/schemas/TrustAppointee'
          minItems: 1
        beneficiaries:
          type: array
          items:
            $ref: '#/components/schemas/TrustBeneficiary'
          minItems: 1
        settlor:
          type: string
          format: uuid
        isTestamentary:
          type: boolean
        createdDate:
          type: string
          format: date
        creationType:
          type: string
          enum:
            - testamentary
            - inter_vivos_revocable
            - inter_vivos_irrevocable
        revocability:
          type: string
          enum:
            - revocable
            - irrevocable
            - perpetual
          $comment: Distinct from creationType. A trust created as inter_vivos_revocable may become irrevocable on the settlor's death. perpetual = waqf and certain Cayman STAR trusts.
        perpetual:
          type: boolean
          $comment: True for waqf and certain offshore perpetual trusts.
        vestingAge:
          type: integer
          minimum: 0
        vestingDate:
          type: string
          format: date
        vestingConditions:
          type: array
          items:
            type: string
        contingentInterests:
          type: array
          items:
            type: string
        trustPeriod:
          type: string
        governingLaw:
          $ref: '#/components/schemas/jurisdiction'
        reservedPowers:
          type: array
          $comment: Powers retained by the settlor or granted to a third party. Common in BVI VISTA trusts, Jersey trusts, and Cayman STAR trusts.
          items:
            type: object
            properties:
              powerType:
                type: string
                enum:
                  - investment
                  - distribution
                  - amendment
                  - revocation
                  - addition_of_beneficiaries
                  - removal_of_trustees
                  - change_of_governing_law
              heldByPersonId:
                type: string
                format: uuid
              conditions:
                type: string
            required:
              - powerType
            additionalProperties: false
        fleeClause:
          type: object
          $comment: Clause allowing automatic change of trust situs if triggering events occur (e.g., change of law, political instability). Standard in offshore trusts.
          properties:
            present:
              type: boolean
            triggerEvents:
              type: array
              items:
                type: string
            destinationJurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            automaticOrDiscretionary:
              type: string
              enum:
                - automatic
                - discretionary
          additionalProperties: false
        protectorPowers:
          type: array
          $comment: Specific powers held by the trust protector. Cayman STAR trusts REQUIRE an enforcer. Jersey/Guernsey trusts commonly have protectors.
          items:
            type: object
            properties:
              powerType:
                type: string
                enum:
                  - consent_to_distribution
                  - remove_trustee
                  - appoint_trustee
