            - Hampstead property portfolio
            - Japanese woodblock print collection
        assetIds:
          type: array
          items:
            type: string
            format: uuid
          description: Asset IDs that make up this collection.
        propertyIds:
          type: array
          items:
            type: string
            format: uuid
          description: Property IDs that make up this collection.
        notes:
          type: string
          description: Additional notes about the collection interest.
          examples:
            - Interested in acquiring the complete collection, not individual pieces
      anyOf:
        - required:
            - assetIds
        - required:
            - propertyIds
      additionalProperties: false
    OfferDetails:
