          $comment: Extension data blocks. Each can contain any structure incl. arrays. Extension schema validates.
      unevaluatedProperties: false
    temporal-rule:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/temporal-rule.json
      $comment: Wraps any jurisdiction rule value with temporal legislation tracking. Use this for tax thresholds, exemption amounts, forced heirship fractions, and any value that changes when legislation changes. Enables historical lookback (what was the threshold when this gift was made?) and forward planning (what will the threshold be after the announced reform?).
      title: TemporalRule
      description: A jurisdiction rule value with effective dates, legislative status, and change history.
      type: object
      properties:
        value:
          description: The actual rule value. Can be a number (tax rate, threshold amount in minor units), boolean (rule applies/doesn't), string (enum value, fraction), or object (complex rule).
          type:
            - number
            - boolean
            - string
            - object
          $comment: JSON Schema 'number' includes integers. Do not add 'integer' separately — oneOf would fail because a value like 50 matches both.
        effectiveFrom:
          type: string
          format: date
          description: ISO 8601 date when this value came/comes into effect
        effectiveUntil:
          oneOf:
            - type: string
              format: date
            - type: 'null'
          description: ISO 8601 date when this value was/will be superseded. null = currently in effect.
          $comment: null = no known end date (current rule). A date = superseded on that date.
        status:
          type: string
          enum:
            - enacted
            - royal_assent
            - bill_stage
            - consultation
            - announced
          $comment: enacted = in force. royal_assent = passed but not yet commenced. bill_stage = in parliamentary/congressional process. consultation = proposed, seeking feedback. announced = government has announced intent but no legislation drafted.
        predecessorValue:
          description: The previous value of this rule, for computing deltas. null if this is the first known value.
          type:
            - number
            - boolean
            - string
            - object
            - 'null'
          $comment: Same type flexibility as 'value', plus null for the first known value.
        legislativeReference:
          type: string
          $comment: e.g. 'Finance Act 2027 s.12', 'Swiss Civil Code Art. 471 (2023 revision)', 'Inheritance Tax Act 1984 s.7'
        notes:
          type: string
      required:
        - value
        - effectiveFrom
        - status
      additionalProperties: false
    uk-england-wales:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/extensions/uk-england-wales.json
      title: UK England & Wales Extension
      description: IHT thresholds, intestacy rules, IFPA 1975 eligibility, and legislative changes for England & Wales estates. Temporal-rule wrapping on key values.
      type: object
      properties:
        intestacyStatutoryLegacy:
          $ref: '#/components/schemas/temporal-rule'
          $comment: 'Statutory legacy amount under Administration of Estates Act 1925. As of 2023: £322,000.'
        nilRateBand:
          $ref: '#/components/schemas/temporal-rule'
          $comment: IHT nil-rate band. Frozen at £325,000 since 2009.
        residenceNilRateBand:
          $ref: '#/components/schemas/temporal-rule'
          $comment: RNRB (main residence). Currently £175,000.
        transferableNilRateBand:
          type: boolean
          $comment: Whether the unused NRB of a predeceased spouse is available for transfer.
        transferableNilRateBandPercentage:
          type: number
          minimum: 0
          maximum: 100
          $comment: Percentage of the predeceased spouse's NRB available for transfer.
        inheritanceTaxRate:
          $ref: '#/components/schemas/temporal-rule'
          $comment: Main IHT rate. Currently 40%.
        cohabitantRights:
          type: object
          properties:
            applicable:
              type: boolean
            statute:
              type: string
            notes:
              type: string
          additionalProperties: false
        ifpa1975Eligible:
          type: array
          items:
            type: object
            properties:
              personId:
                type: string
                format: uuid
              category:
                type: string
                enum:
                  - spouse
                  - former_spouse
                  - child
                  - child_of_family
                  - maintained_person
                  - cohabitant
              notes:
                type: string
            required:
              - personId
              - category
            additionalProperties: false
          $comment: Persons eligible to claim under Inheritance (Provision for Family and Dependants) Act 1975.
        legislativeChanges:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              status:
                type: string
                enum:
                  - enacted
                  - royal_assent
                  - bill_stage
                  - consultation
                  - announced
              effectiveDate:
                type: string
                format: date
              notes:
                type: string
            required:
              - description
              - status
            additionalProperties: false
      minProperties: 1
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    us-estate:
      $schema: https://openinherit.org/v1/dialect.json
