            additionalProperties: false
          $comment: 'Maps each executor to the local E&W grant type. limited_grant: grant limited in scope (e.g. foreign property excluded). de_bonis_non: grant for unadministered estate when original executor dies.'
        legislativeChanges:
          type: array
