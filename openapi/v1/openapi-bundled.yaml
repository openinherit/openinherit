              description: Date the offer expires.
              examples:
                - '2025-12-31'
            offerDate:
              type: string
              format: date
              description: Date the offer was made.
              examples:
                - '2025-06-15'
            documentRef:
              type: string
              description: Reference to the document containing the offer.
              examples:
                - DOC-2025-OFFER-001
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this dealer interest record within the INHERIT document.
          examples:
            - e7f8a9b0-c1d2-3456-e789-abcdef012345
        interestedParty:
          $ref: '#/components/schemas/InterestedParty'
          description: The third party expressing interest in estate assets.
        assets:
          type: array
          items:
            $ref: '#/components/schemas/AssetInterestItem'
          description: Specific assets or properties the interested party wants to acquire.
        collection:
          $ref: '#/components/schemas/CollectionInterest'
          description: Interest in a collection of assets as a whole.
        offerStatus:
          type: string
          enum:
            - standing_interest
            - verbal_offer
            - written_offer
            - formal_valuation
            - conditional_offer
            - accepted
            - declined
            - expired
            - withdrawn
          $comment: 'standing_interest: general interest registered, no specific offer. verbal_offer: informal verbal offer made. written_offer: formal written offer submitted. formal_valuation: independent valuation commissioned as part of negotiation. conditional_offer: offer subject to conditions. accepted: offer accepted by the testator or executor. declined: offer declined. expired: offer has passed its validity date. withdrawn: offer withdrawn by the interested party.'
          description: Current status of the offer or expression of interest.
          examples:
            - standing_interest
            - written_offer
            - accepted
        offerDetails:
          $ref: '#/components/schemas/OfferDetails'
          description: Details of a specific offer, if one has been made.
        testatorDisposition:
          type: string
          enum:
            - willing_to_sell
            - prefer_not_to_sell
            - hold_for_executor
            - deferred_to_family
            - promised_to_institution
            - undecided
          $comment: 'willing_to_sell: testator is open to selling. prefer_not_to_sell: testator would rather not sell but hasn''t ruled it out. hold_for_executor: testator defers to executor''s judgement after death. deferred_to_family: decision deferred to family. promised_to_institution: item informally promised to a museum, gallery, or institution. undecided: testator has not expressed a preference.'
          description: The testator's disposition towards selling this asset.
          examples:
            - willing_to_sell
            - hold_for_executor
        linkedBequestId:
          type: string
          format: uuid
          description: Reference to a Bequest.id if this asset is also subject to a bequest. A dealer interest and a bequest may conflict.
        privacyLevel:
          type: string
          enum:
            - testator_only
            - proxy_visible
            - executor_visible
            - all_parties
          $comment: 'testator_only: only the testator can see this dealer interest. proxy_visible: the testator and authorised proxy can see it. executor_visible: the testator, proxy, and executor can see it. all_parties: visible to all parties with access to the estate data.'
          description: Who may see this dealer interest record. Privacy is critical — the testator may not want family to know about dealer approaches.
          examples:
            - proxy_visible
            - executor_visible
        communicationInitiatedBy:
          type: string
          enum:
            - buyer
            - testator
            - proxy
            - executor
          $comment: 'buyer: the interested party initiated contact. testator: the testator reached out to the interested party. proxy: the proxy initiated contact on behalf of the testator. executor: the executor initiated contact post-death.'
          description: Who initiated the communication about this potential transaction.
          examples:
            - buyer
            - proxy
        managedByProxyId:
          type: string
          format: uuid
          description: Reference to the ProxyAuthorisation.id that governs this dealer interest — the proxy managing the negotiation.
        notes:
          type: string
          description: Free-text notes about this dealer interest.
          examples:
            - Christie's approached via family friend — informal valuation suggests £120,000-£150,000
            - Testator does not want this disclosed to the family during their lifetime
      required:
        - id
        - interestedParty
        - offerStatus
        - privacyLevel
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    completeness:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/completeness.json
      $comment: Reusable completeness scoring definition. Producers compute a weighted checklist score against a jurisdiction and estate status combination. Consumers can display progress, flag gaps, and compare readiness across estates.
      title: Completeness
      description: A completeness score derived from a weighted checklist of estate data categories, scoped to a specific jurisdiction and estate status.
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall completeness percentage, calculated from the weighted checklist items.
          examples:
            - 72
            - 100
            - 0
            - 45
        maxScore:
          type: integer
          minimum: 0
          description: Maximum possible score for this jurisdiction and estate status combination. May be less than 100 if certain categories are not applicable.
          examples:
            - 100
            - 85
            - 92
        jurisdiction:
          type: string
          description: ISO 3166-1 alpha-2 country code or ISO 3166-2 subdivision code identifying which jurisdiction this scoring applies to.
          examples:
            - GB
            - US
            - GB-SCT
            - AU-NSW
        estateStatus:
          type: string
          description: The estate status this completeness score was calculated against. Different statuses may require different data, affecting which checklist items are applicable.
          examples:
            - pre_death_planning
            - grant_application
            - administration
        calculatedAt:
          type: string
          format: date-time
          description: ISO 8601 date-time when this completeness score was computed.
          examples:
            - '2026-03-28T14:30:00Z'
        checklist:
          type: array
          description: The individual items assessed to produce the overall score. Each item belongs to a category, has a relative weight, and a status indicating whether the data is present.
          items:
            type: object
            properties:
              category:
                type: string
                enum:
                  - personal_details
                  - assets_and_valuations
                  - liabilities
                  - beneficiaries
                  - executors
                  - guardians
                  - tax_information
                  - legal_documents
                  - lifetime_transfers
                  - pension_and_insurance
                $comment: 'personal_details: testator identity, addresses, marital status. assets_and_valuations: real property, financial accounts, personal possessions, and their valuations. liabilities: mortgages, loans, debts, guarantees. beneficiaries: named beneficiaries and their shares or bequests. executors: appointed executors and their contact details. guardians: guardians for minor children. tax_information: tax residency, reference numbers, prior returns. legal_documents: wills, codicils, trusts, powers of attorney. lifetime_transfers: gifts, settlements, and transfers within the lookback period. pension_and_insurance: pension schemes, life insurance policies, death-in-service benefits.'
                description: The data category this checklist item belongs to.
                examples:
                  - personal_details
                  - assets_and_valuations
                  - tax_information
              item:
                type: string
                description: A human-readable label describing what was checked.
                examples:
                  - Testator date of birth
                  - Property valuations within 12 months
                  - IHT nil-rate band utilization
              weight:
                type: integer
                minimum: 1
                description: Relative importance of this item. Higher weights contribute more to the overall score.
                examples:
                  - 1
                  - 3
                  - 5
                  - 10
              status:
                type: string
                enum:
                  - complete
                  - incomplete
                  - not_applicable
                  - unknown
                $comment: 'complete: the required data is present and valid. incomplete: the data is missing or insufficient. not_applicable: this item does not apply to the current jurisdiction or estate status. unknown: the system cannot determine whether the data is present.'
                description: Whether the data for this item is present and sufficient.
                examples:
                  - complete
                  - incomplete
                  - not_applicable
              details:
                type: string
                description: Optional explanation of the status, such as what is missing or why the item is not applicable.
                examples:
                  - No valuation on file for 3 of 5 properties
                  - Guardians not required — no minor children
            required:
              - category
              - item
              - weight
              - status
            additionalProperties: false
      required:
        - score
        - maxScore
        - checklist
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    tax-position:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/tax-position.json
      $comment: Reusable tax position summary. Producers calculate the estimated tax liability for a given jurisdiction, accounting for exemptions and lifetime transfers. This is always an estimate — the disclaimer field is required to make that clear.
      title: TaxPosition
      description: An estimated tax position for an estate in a specific jurisdiction, including gross and net values, available exemptions, and estimated liability.
      type: object
      properties:
        jurisdiction:
          type: string
          description: ISO 3166-1 alpha-2 country code or ISO 3166-2 subdivision code identifying the tax jurisdiction.
          examples:
            - GB
            - US
            - GB-SCT
            - DE
            - AU-NSW
        calculatedAt:
          type: string
          format: date-time
          description: ISO 8601 date-time when this tax position was computed.
          examples:
            - '2026-03-28T14:30:00Z'
        grossEstateValue:
          $ref: '#/components/schemas/money'
          description: Total gross value of the estate before deducting liabilities, in minor currency units.
        netEstateValue:
          $ref: '#/components/schemas/money'
          description: Net estate value after deducting liabilities, in minor currency units.
        lifetimeTransfersInLookback:
          $ref: '#/components/schemas/money'
          description: Total value of lifetime transfers (gifts, settlements) made within the lookback period, in minor currency units.
        lookbackPeriod:
          type: string
          description: The lookback period for lifetime transfers in this jurisdiction, expressed as a human-readable duration.
          examples:
            - 7 years
            - 5 years
            - 3 years
        availableExemptions:
          type: array
          description: Tax exemptions and reliefs that may reduce the taxable estate. Each entry describes one exemption, its value, and whether it has been applied.
          items:
            type: object
            properties:
              name:
                type: string
                description: The name of the exemption or relief.
                examples:
                  - Nil-rate band
                  - Residence nil-rate band
                  - Spouse exemption
                  - Agricultural property relief
                  - Business property relief
                  - Unified credit
              amount:
                $ref: '#/components/schemas/money'
                description: The monetary value of this exemption, in minor currency units.
              applied:
                type: boolean
                description: Whether this exemption has been applied in the current calculation.
                examples:
                  - true
                  - false
              notes:
                type: string
                description: Additional context about eligibility, conditions, or partial application of this exemption.
                examples:
                  - Tapered due to estate value exceeding £2m
                  - Transferred nil-rate band from predeceased spouse
            required:
              - name
            additionalProperties: false
        taxableEstate:
          $ref: '#/components/schemas/money'
          description: The estate value subject to tax after applying exemptions, in minor currency units.
        estimatedLiability:
          $ref: '#/components/schemas/money'
          description: The estimated tax due, in minor currency units. This is an estimate and should not be treated as a final liability.
        effectiveRate:
          type: number
          minimum: 0
          maximum: 100
          description: The effective tax rate as a percentage of the gross estate value.
          examples:
            - 0
            - 16.4
            - 40
        warnings:
          type: array
          description: Data gaps, simplifying assumptions, or other caveats that may affect the accuracy of this estimate.
          items:
            type: string
          examples:
            - - No valuation on file for 2 properties — using purchase price
              - Lifetime transfers may be incomplete — only gifts over £3,000 recorded
        disclaimer:
          type: string
          description: A mandatory disclaimer stating that this is an estimate and not professional tax advice.
          examples:
            - Estimated for planning purposes only. This is not tax advice. Consult a qualified tax advisor.
      required:
        - jurisdiction
        - calculatedAt
        - grossEstateValue
        - disclaimer
      patternProperties:
        ^x-inherit-: {}
      unevaluatedProperties: false
    schema:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/schema.json
      $comment: '$ref resolution convention: all $ref paths are resolved relative to the schema''s $id URI, NOT filesystem paths. Core schemas use relative paths (e.g., ''common/money.json'' resolves to ''https://openinherit.org/v1/common/money.json''). Extension schemas use ''../common/money.json'' (resolves relative to their $id in the extensions/ directory). All schemas MUST be registered with the validator before $ref resolution will work.'
      title: INHERIT v1 Root Schema
      description: Root entry point for an INHERIT v1 estate data interchange document. Contains a single estate and arrays of all entity types.
      type: object
      properties:
        inherit:
          type: string
          const: https://openinherit.org/v1/schema.json
          description: Schema identifier — must always be 'https://openinherit.org/v1/schema.json'. Used by consumers to identify this as an INHERIT v1 document.
          examples:
            - https://openinherit.org/v1/schema.json
        version:
          type: integer
          const: 1
          description: Major version number of the INHERIT schema. Always 1 for v1 documents.
          examples:
            - 1
        schemaVersion:
          type: string
          description: Semver version of the INHERIT schema this document was created against. Enables consumers to detect compatibility and handle graceful degradation.
          pattern: ^\d+\.\d+\.\d+$
          examples:
            - 1.0.0
            - 1.1.0
            - 1.2.3
        exportedAt:
          type: string
          format: date
          description: Date this document was exported from the producing system.
          examples:
            - '2025-03-27'
        exportedBy:
          type: object
          description: The person who exported or prepared this document.
          properties:
            name:
              type: string
              description: Name of the person who exported the document.
              examples:
                - James Davies
                - Priya Sharma
                - Yuki Tanaka
                - Fatima Al-Hassan
                - Kwame Mensah
            email:
              type: string
              format: email
              description: Email address of the person who exported the document.
              examples:
                - james.davies@example.com
            organisationName:
              type: string
              description: Organisation the exporter works for.
              examples:
                - Irwin Mitchell LLP
                - MyFamilyInherits.com
          additionalProperties: false
        generator:
          type: object
          description: The software that generated this INHERIT document.
          properties:
            name:
              type: string
              description: Name of the generating software.
              examples:
                - MyFamilyInherits
                - LegacyLists WillWriter Pro
                - INHERIT CLI
            version:
              type: string
              description: Version of the generating software.
              examples:
                - 2.1.0
                - 1.0.0-beta.3
            url:
              type: string
              description: URL of the generating software or organisation.
              examples:
                - https://www.myfamilyinherits.com
                - https://www.legacylists.com
          required:
            - name
          additionalProperties: false
        estate:
          $ref: '#/components/schemas/estate'
          description: The single estate record for this document.
        people:
          type: array
          items:
            $ref: '#/components/schemas/person'
          description: All people involved in the estate — testator, beneficiaries, executors, witnesses, guardians, etc.
        kinships:
          type: array
          items:
            $ref: '#/components/schemas/kinship'
          description: Familial bonds between people in the estate. Essential for intestacy calculations.
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/relationship'
          description: Spousal and partnership relationships. Determines marital property rights and surviving spouse claims.
        properties:
          type: array
          items:
            $ref: '#/components/schemas/property'
          description: Real estate owned or partly owned by the testator.
        assets:
          type: array
          items:
            $ref: '#/components/schemas/asset'
          description: Non-property assets — financial accounts, personal property, vehicles, digital assets, etc.
        assetCollections:
          type: array
          items:
            $ref: '#/components/schemas/asset-collection'
          description: Named groups of related assets — collections (model railways, art, wine, etc.) that have collective significance and value.
        assetInterests:
          type: array
          items:
            $ref: '#/components/schemas/asset-interest'
          description: Informal beneficiary interest in specific assets or collections, captured before formal bequest allocation.
        liabilities:
          type: array
          items:
            $ref: '#/components/schemas/liability'
          description: Debts and financial obligations of the estate, including cultural obligations (mahr, ketubah debt).
        bequests:
          type: array
          items:
            $ref: '#/components/schemas/bequest'
          description: Dispositions of property or money in the will.
        trusts:
          type: array
          items:
            $ref: '#/components/schemas/trust'
          description: Trusts — testamentary or inter vivos — associated with the estate.
        executors:
          type: array
          items:
            $ref: '#/components/schemas/executor'
          description: Persons appointed to administer the estate.
        guardians:
          type: array
          items:
            $ref: '#/components/schemas/guardian'
          description: Guardian appointments for minor children.
        wishes:
          type: array
          items:
            $ref: '#/components/schemas/wish'
          description: Non-binding (or culturally binding) wishes — funeral, letters, pet care, digital estate.
        documents:
          type: array
          items:
            $ref: '#/components/schemas/document'
          description: Documents associated with the estate — wills, codicils, trust deeds, certificates.
        nonprobateTransfers:
          type: array
          items:
            $ref: '#/components/schemas/nonprobate-transfer'
          description: Assets that pass outside the probate estate — JTWROS, TOD deeds, beneficiary designations.
        proxyAuthorisations:
          type: array
          items:
            $ref: '#/components/schemas/proxy-authorisation'
          description: Authorisations for proxies to act on behalf of the testator.
        valuations:
          type: array
          items:
            $ref: '#/components/schemas/valuation'
          description: Valuations of assets, properties, and collections. Multiple valuations per entity are supported — owner estimates, professional valuations, AI estimates, dealer offers.
        lifetimeTransfers:
          type: array
          items:
            $ref: '#/components/schemas/lifetime-transfer'
          description: Gifts and transfers made during the testator's lifetime. Critical for inheritance tax calculations — UK 7-year rule, US unified gift/estate tax, etc.
        dealerInterests:
          type: array
          items:
            $ref: '#/components/schemas/dealer-interest'
          description: Third-party interest in estate assets — dealers, investors, collectors.
        dataProvenance:
          type: string
          enum:
            - manual_entry
            - ai_extracted
            - ocr_scanned
            - imported
            - migrated
            - system_generated
          $comment: 'manual_entry: data entered by hand by a person. ai_extracted: extracted by an AI model (e.g. INHERIT Scanner). ocr_scanned: extracted via optical character recognition. imported: imported from another system (Clio, LEAP, etc.). migrated: migrated from a legacy format or previous version. system_generated: generated by software without human input.'
          description: Default data provenance for all entities in this document. Individual entities may override this with their own provenance. Tracks how the data was originally captured.
          examples:
            - manual_entry
            - ai_extracted
        importSources:
          type: array
          description: Systems from which data was imported into this document. Enables audit trail and source tracking.
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier for this import source, referenced by importSourceId on entities.
                examples:
                  - src-clio-001
                  - src-paper-file
              systemName:
                type: string
                description: Name of the source system.
                examples:
                  - Clio Manage
                  - LEAP Legal Software
                  - Paper file
                  - Previous solicitor's firm
                  - LegacyLists
              importDate:
                type: string
                format: date
                description: Date the data was imported from this source.
                examples:
                  - '2026-03-15'
              importMethod:
                type: string
                enum:
                  - api
                  - file_upload
                  - manual_copy
                  - ai_extraction
                  - ocr
                  - migration_script
                $comment: 'api: imported via API integration. file_upload: imported from an uploaded file (CSV, JSON, etc.). manual_copy: manually copied from the source. ai_extraction: extracted by an AI model from documents or images. ocr: extracted via optical character recognition from scanned documents. migration_script: automated migration from a legacy system.'
                description: How the data was imported from this source.
              notes:
                type: string
                description: Additional context about the import.
                examples:
                  - 'Migrated from Clio matter #12345 — assets and liabilities only'
            required:
              - id
              - systemName
            additionalProperties: false
        completeness:
          $ref: '#/components/schemas/completeness'
          description: Estate completeness score — jurisdiction-aware checklist tracking what data has been captured, what's missing, and how complete the estate plan is.
        taxPosition:
          $ref: '#/components/schemas/tax-position'
          description: Estimated tax position summary computed from valuations, lifetime transfers, exemptions, and jurisdiction-specific thresholds. Always includes a disclaimer — this is informational, not tax advice.
        recommendedActions:
          type: array
          description: Recommended next actions generated from data gaps, urgency flags, incomplete transfer history, missing valuations, and estate status. Actions adapt to the current lifecycle stage.
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier for this action.
                examples:
                  - act-001
                  - act-val-shares
              category:
                type: string
                enum:
                  - completeness
                  - tax_planning
                  - legal_requirement
                  - valuation
                  - transfer_history
                  - beneficiary_review
                  - document_update
                $comment: 'completeness: filling data gaps. tax_planning: optimizing tax position. legal_requirement: meeting statutory obligations. valuation: getting or updating valuations. transfer_history: documenting lifetime gifts. beneficiary_review: reviewing nominations and designations. document_update: updating legal documents.'
                description: Category of the recommended action.
              priority:
                type: string
                enum:
                  - critical
                  - high
                  - medium
                  - low
                $comment: 'critical: must address immediately — legal deadline or compliance risk. high: should address soon — significant financial or legal impact. medium: address when convenient — improves estate plan quality. low: nice to have — marginal improvement.'
                description: Priority level for this action.
              title:
                type: string
                description: Short action title.
                examples:
                  - Get professional valuation for share portfolio
                  - Update pension nomination
                  - Document lifetime gifts in lookback period
              description:
                type: string
                description: Detailed explanation of what to do and why.
              status:
                type: string
                enum:
                  - pending
                  - in_progress
                  - completed
                  - dismissed
                $comment: 'pending: not yet started. in_progress: being worked on. completed: done. dismissed: user chose not to act on this.'
                description: Current status of this action.
              triggeredBy:
                type: string
                description: What data gap or condition generated this action.
                examples:
                  - Asset 'Barclays shares' has estimatedValue > £50,000 but no professional valuation
                  - No executor appointed
                  - Pension has no nominated beneficiary
              relatedEntityType:
                type: string
                description: Entity type this action relates to.
                examples:
                  - asset
                  - person
                  - estate
                  - bequest
              relatedEntityId:
                type: string
                format: uuid
                description: ID of the specific entity this action relates to.
            required:
              - id
              - category
              - priority
              - title
              - status
            additionalProperties: false
        conformance:
          type: object
          description: Machine-readable conformance certificate — records the validation level, schema version, completeness score, and provenance summary at time of validation.
          properties:
            level:
              type: string
              enum:
                - level_1
                - level_2
                - level_3
              $comment: 'level_1: structural validity — document parses and validates against JSON Schema. level_2: referential integrity — all cross-references resolve. level_3: jurisdiction complete — all required fields for the estate''s jurisdiction are present.'
              description: Conformance level achieved.
            validatedAt:
              type: string
              format: date-time
              description: When the validation was performed.
              examples:
                - '2026-03-28T14:00:00Z'
            validatedBy:
              type: string
              description: Name of the tool that performed the validation.
              examples:
                - INHERIT Web Validator
                - MyFamilyInherits v2.1
                - openinherit-cli
            schemaVersion:
              type: string
              description: INHERIT schema version this document was validated against.
              examples:
                - 1.2.0
            completenessScore:
              type: integer
              minimum: 0
              maximum: 100
              description: Completeness score at time of validation.
            entityCounts:
              type: object
              description: Count of entities per type at time of validation.
              additionalProperties:
                type: integer
              examples:
                - people: 5
                  properties: 2
                  assets: 12
                  bequests: 4
                  executors: 2
            provenanceSummary:
              type: object
              description: Count of entities by data provenance source.
              additionalProperties:
                type: integer
              examples:
                - manual_entry: 15
                  ai_extracted: 8
                  imported: 3
            warnings:
              type: array
              items:
                type: string
              description: Validation warnings — non-blocking issues that may need attention.
              examples:
                - - 2 assets have estimated but no professional valuation
                  - Lifetime transfer history covers only 5 of 7 required lookback years
          required:
            - level
            - validatedAt
            - validatedBy
            - schemaVersion
          additionalProperties: false
        extensions:
          type: array
          items:
            type: string
          $comment: URIs of extension schemas applied to this document.
          description: URIs of extension schemas applied to this document. Consumers should load and validate against these extensions.
          examples:
            - - https://openinherit.org/v1/extensions/hindu-succession/hindu-succession.json
              - https://openinherit.org/v1/extensions/islamic-succession/islamic-succession.json
      required:
        - inherit
        - version
        - estate
        - people
        - kinships
        - relationships
        - properties
        - assets
        - liabilities
        - bequests
        - trusts
        - executors
        - guardians
        - wishes
        - documents
        - nonprobateTransfers
        - proxyAuthorisations
        - dealerInterests
      patternProperties:
        ^x-inherit-:
          $comment: Extension data blocks. Each can contain any structure incl. arrays. Extension schema validates.
      unevaluatedProperties: false
    temporal-rule:
      $schema: https://openinherit.org/v1/dialect.json
      $id: https://openinherit.org/v1/common/temporal-rule.json
      $comment: Wraps any jurisdiction rule value with temporal legislation tracking. Use this for tax thresholds, exemption amounts, forced heirship fractions, and any value that changes when legislation changes. Enables historical lookback (what was the threshold when this gift was made?) and forward planning (what will the threshold be after the announced reform?).
      title: TemporalRule
      description: A jurisdiction rule value with effective dates, legislative status, and change history.
      type: object
      properties:
        value:
          description: The actual rule value — a number (tax rate, threshold in minor units), boolean (rule applies or not), string (enum value, fraction), or object (complex rule). The consumer must interpret this in context.
          type:
            - number
            - boolean
            - string
            - object
          $comment: JSON Schema 'number' includes integers. Do not add 'integer' separately — oneOf would fail because a value like 50 matches both.
          examples:
            - 32500000
            - true
            - '0.75'
            - per_child_sliding
        effectiveFrom:
          type: string
          format: date
          description: The date from which this rule value takes effect. For enacted legislation, this is the commencement date, not the date of royal assent.
          examples:
            - '2023-01-01'
            - '2024-04-06'
            - '2027-01-01'
        effectiveUntil:
          oneOf:
            - type: string
              format: date
            - type: 'null'
          description: The date this rule value was or will be superseded. Null means it is currently in effect with no known end date.
          $comment: null = no known end date (current rule). A date = superseded on that date.
          examples:
            - '2024-04-05'
            - null
        status:
          type: string
          enum:
            - enacted
            - royal_assent
            - bill_stage
            - consultation
            - announced
          $comment: 'enacted: in force and legally binding. royal_assent: passed by legislature but not yet commenced. bill_stage: currently progressing through parliament or congress. consultation: proposed rule under public consultation. announced: government has stated intent but no formal legislation exists.'
          description: The legislative status of this rule. Only 'enacted' rules are legally binding — all others are prospective.
          examples:
            - enacted
            - bill_stage
        predecessorValue:
          description: The previous value of this rule, for computing deltas and understanding the direction of change. Null if this is the first known value.
          type:
            - number
            - boolean
            - string
            - object
            - 'null'
          $comment: Same type flexibility as 'value', plus null for the first known value.
          examples:
            - 25000000
            - null
        legislativeReference:
          type: string
          $comment: e.g. 'Finance Act 2027 s.12', 'Swiss Civil Code Art. 471 (2023 revision)', 'Inheritance Tax Act 1984 s.7'
          description: Citation for the legislation that establishes this rule value. Include act name, section, and year.
          examples:
            - Inheritance Tax Act 1984 s.7
            - Swiss Civil Code Art. 471 (2023 revision)
            - Finance Act 2027 s.12
        notes:
          type: string
          description: Free-text commentary on this rule value — transitional provisions, known ambiguities, or political context.
          examples:
            - Frozen at this level since 2009 — widely expected to increase in next Budget
      required:
        - value
        - effectiveFrom
        - status
      additionalProperties: false
