                - LOBOLA_PAYMENT
            date:
              type: string
              format: date
              description: ISO 8601 date
            jurisdiction:
              $ref: '#/components/schemas/jurisdiction'
            notes:
              type: string
          required:
            - type
            - date
          additionalProperties: false
        FinancialInstrument:
          type: object
          properties:
            type:
