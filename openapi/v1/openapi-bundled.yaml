            - recognised
          additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - MARRIAGE_CIVIL
            - MARRIAGE_RELIGIOUS
            - MARRIAGE_CUSTOMARY
            - MARRIAGE_COMMON_LAW
            - CIVIL_PARTNERSHIP
            - CIVIL_UNION
            - DOMESTIC_PARTNERSHIP
            - DE_FACTO
            - COHABITATION
            - ENGAGEMENT
