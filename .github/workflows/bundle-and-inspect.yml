name: Bundle Schema & Generate Graph

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'v1/**'

jobs:
  bundle-and-inspect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bundle schema
        run: pnpm run bundle:schema

      - name: Generate graph data
        run: pnpm run graph:data

      - name: Create PR with artefacts
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate bundled schema and graph data"
          title: "chore: regenerate bundled schema and graph data"
          body: "Automated update of `dist/` artefacts after schema changes."
          branch: chore/regenerate-dist
          add-paths: dist/
          delete-branch: true
