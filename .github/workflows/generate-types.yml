name: Generate Types

on:
  push:
    branches:
      - main
    paths:
      - 'v1/**'
      - 'openapi/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bundle OpenAPI spec
        run: pnpm run bundle

      - name: Generate TypeScript types
        run: pnpm run generate

      - name: Create PR with generated output
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate TypeScript types from schema changes"
          title: "chore: regenerate TypeScript types from schema changes"
          body: "Automated update of generated types and bundled OpenAPI spec after schema/API changes."
          branch: chore/regenerate-types
          add-paths: |
            generated/
            openapi/v1/openapi-bundled.yaml
          delete-branch: true
